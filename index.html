<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>沧州风云</title>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel2:#1c2230; --line:#2a3340;
    --txt:#e6edf3; --dim:#8b98a8; --gold:#ffcc4d; --red:#ff5b5b;
    --green:#3fb950; --blue:#58a6ff; --pink:#ff8ecb; --purple:#bc8cff;
    --accent:#ff7a3c;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
    -webkit-text-size-adjust:100%; overscroll-behavior:none;}
  body{display:flex; justify-content:center; min-height:100vh; min-height:100dvh;}
  #app{width:100%; max-width:480px; min-height:100vh; min-height:100dvh;
    background:linear-gradient(180deg,#0d1117 0%, #11151d 100%);
    display:flex; flex-direction:column; position:relative;}

  /* 顶部状态栏 */
  #topbar{position:sticky; top:0; z-index:20; background:rgba(13,17,23,.96);
    backdrop-filter:blur(8px); border-bottom:1px solid var(--line); padding:8px 10px;}
  .ach{display:flex; gap:6px; align-items:center; font-size:12px; color:var(--gold);
    font-weight:700; margin-bottom:6px; flex-wrap:wrap;}
  .ach .badge{background:var(--panel2); border:1px solid var(--line); border-radius:999px;
    padding:2px 9px; color:var(--txt); font-weight:600;}
  /* 醒目的当前地点/学期 */
  #placebar{font-size:15px; font-weight:800; letter-spacing:.5px; color:var(--accent);
    background:linear-gradient(90deg, rgba(255,122,60,.18), rgba(255,122,60,.02));
    border:1px solid #3a2a1a; border-left:3px solid var(--accent); border-radius:8px;
    padding:8px 11px; margin-bottom:6px; display:flex; align-items:center; gap:8px;}
  #placebar .term{margin-left:auto; font-size:13px; color:var(--gold); font-weight:800;
    background:#1c1a10; border:1px solid #4a3f1a; border-radius:999px; padding:2px 10px;}
  #placebar:empty{display:none;}
  /* 紧凑数值面板 */
  .stats{display:grid; grid-template-columns:repeat(4,1fr); gap:4px;}
  .stat{background:var(--panel); border:1px solid var(--line); border-radius:6px;
    padding:3px 4px 4px; text-align:center;}
  .stat .lbl{font-size:8.5px; color:var(--dim); margin-bottom:1px;}
  .stat .val{font-size:11px; font-weight:700; line-height:1.1;}
  .stat{position:relative; overflow:visible;}
  .stat .dl{display:inline-block; margin-left:4px; padding:1px 6px 2px; border-radius:8px;
    font-size:10px; font-weight:900; color:#fff; vertical-align:middle; line-height:1.3;
    animation:dlIn .55s cubic-bezier(.2,.9,.3,1) both;}
  .stat .dl.up{background:linear-gradient(180deg,#46c95a,#2f9b43); box-shadow:0 0 9px rgba(63,185,80,.65);}
  .stat .dl.down{background:linear-gradient(180deg,#ff6b6b,#d83b3b); box-shadow:0 0 9px rgba(255,91,91,.65);}
  @keyframes dlIn{0%{opacity:0; transform:translateY(-9px) scale(.4);}55%{transform:translateY(0) scale(1.28);}100%{opacity:1; transform:scale(1);}}
  .stat.chg-up{animation:glowUp 1.9s ease;}
  .stat.chg-down{animation:glowDown 1.9s ease;}
  @keyframes glowUp{0%,100%{box-shadow:none;}30%{box-shadow:0 0 0 1px rgba(63,185,80,.85),0 0 14px rgba(63,185,80,.55);}}
  @keyframes glowDown{0%,100%{box-shadow:none;}30%{box-shadow:0 0 0 1px rgba(255,91,91,.85),0 0 14px rgba(255,91,91,.55);}}
  .stat.bg-green{background:rgba(63,185,80,.16); border-color:#2e6b38;}
  .stat.bg-yellow{background:rgba(255,204,77,.14); border-color:#6b5a1a;}
  .stat.bg-red{background:rgba(255,91,91,.16); border-color:#6b2a2a;}
  .bar{height:3px; background:#000; border-radius:3px; margin-top:2px; overflow:hidden;}
  .bar > i{display:block; height:100%; border-radius:3px; transition:width .4s;}

  /* 主区域 */
  #screen{flex:1; padding:16px 14px 24px; display:flex; flex-direction:column; gap:14px;}
  .loc{font-size:12px; letter-spacing:2px; color:var(--accent); font-weight:700;}
  h1.title{font-size:30px; margin:0; letter-spacing:6px; background:linear-gradient(90deg,#ffcc4d,#ff7a3c);
    -webkit-background-clip:text; background-clip:text; color:transparent; font-weight:900;}
  .narr{background:var(--panel); border:1px solid var(--line); border-left:3px solid var(--accent);
    border-radius:10px; padding:13px 14px; line-height:1.7; font-size:15px; white-space:pre-wrap;}
  .narr.sys{border-left-color:var(--blue); color:var(--dim); font-size:13px;}
  .narr.good{border-left-color:var(--green);}
  .narr.bad{border-left-color:var(--red);}

  .choices{display:flex; flex-direction:column; gap:10px; margin-top:4px;}
  button.choice{appearance:none; border:1px solid var(--line); background:var(--panel2);
    color:var(--txt); padding:14px; border-radius:12px; font-size:15px; font-weight:600;
    text-align:left; cursor:pointer; transition:.15s; line-height:1.4;}
  button.choice:active{transform:scale(.98); background:#283042;}
  button.choice .sub{display:block; font-size:12px; color:var(--dim); font-weight:400; margin-top:3px;}
  button.choice.gold{border-color:var(--gold); background:linear-gradient(180deg,#2a2410,#1c1a10);}
  button.choice.danger{border-color:#5a2424;}
  button.choice:disabled{opacity:.4;}

  /* 分配器 */
  .alloc{background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:12px;}
  .alloc .row{display:flex; align-items:center; gap:8px; padding:7px 0;}
  .alloc .row .nm{flex:0 0 96px; font-size:14px;}
  .alloc .row .nm small{display:block; color:var(--dim); font-size:10px;}
  .alloc input[type=range]{flex:1; accent-color:var(--accent); height:24px;}
  .alloc .amt{flex:0 0 42px; text-align:right; font-weight:700; font-size:14px; color:var(--gold);}
  .pool{display:flex; justify-content:space-between; font-size:13px; padding:6px 2px;
    border-top:1px dashed var(--line); margin-top:6px;}
  .pool b{font-size:16px;}

  /* 学分滑块 */
  .credit-pick{text-align:center; background:var(--panel); border:1px solid var(--line);
    border-radius:12px; padding:14px;}
  .credit-pick .big{font-size:44px; font-weight:900; color:var(--gold);}
  .credit-pick input[type=range]{width:100%; accent-color:var(--gold); height:30px;}

  /* 战斗 */
  #battle{display:flex; flex-direction:column; gap:12px;}
  .fighter{background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:10px;}
  .fighter .top{display:flex; justify-content:space-between; font-weight:700; font-size:14px;}
  .hpbar{height:14px; background:#000; border-radius:7px; overflow:hidden; margin-top:6px;}
  .hpbar > i{display:block; height:100%; background:linear-gradient(90deg,#ff5b5b,#ff8e3c); transition:width .35s;}
  .orient{text-align:center; font-size:13px; color:var(--dim); padding:6px;}
  .bigbtn{padding:20px; font-size:18px; font-weight:800; border-radius:14px; border:2px solid var(--accent);
    background:linear-gradient(180deg,#2a1c10,#1a1410); color:var(--gold); cursor:pointer;}
  .bigbtn:active{transform:scale(.97);}
  .blog{font-size:12px; color:var(--dim); max-height:120px; overflow-y:auto; line-height:1.6;
    background:#0a0d12; border-radius:8px; padding:8px 10px;}

  /* 轮盘 */
  .wheelwrap{display:flex; flex-direction:column; align-items:center; gap:10px;}
  .wheel-cont{position:relative; width:260px; height:260px;}
  .pointer{position:absolute; top:-4px; left:50%; transform:translateX(-50%); z-index:5;
    width:0; height:0; border-left:12px solid transparent; border-right:12px solid transparent;
    border-top:22px solid var(--gold); filter:drop-shadow(0 2px 2px #000);}
  canvas#wheel{border-radius:50%; box-shadow:0 0 0 6px var(--panel2),0 0 0 8px var(--line); transition:transform 4.5s cubic-bezier(.17,.67,.2,1);}

  .float{position:fixed; bottom:18px; left:50%; transform:translateX(-50%);
    background:#000; color:#fff; padding:9px 16px; border-radius:999px; font-size:13px;
    opacity:0; transition:.3s; z-index:50; pointer-events:none; max-width:90%;}
  .float.show{opacity:.95;}
  .delta{font-weight:700;}
  .up{color:var(--green);} .down{color:var(--red);}
  .toolbar{display:flex; gap:8px; justify-content:center; padding:6px 0 14px;}
  .toolbar button{background:transparent; border:1px solid var(--line); color:var(--dim);
    font-size:11px; padding:5px 12px; border-radius:999px; cursor:pointer;}
  .hint{font-size:11px; color:var(--dim); text-align:center;}

  /* ---------- 高考放榜计分板 ---------- */
  .gk-board{background:var(--panel); border:1px solid var(--line); border-radius:14px;
    padding:14px 18px; margin:8px 0; min-height:60px;}
  .gk-row{display:flex; justify-content:space-between; align-items:baseline;
    padding:7px 4px; border-bottom:1px dashed rgba(255,255,255,.08); font-size:17px;
    opacity:0; transform:translateY(10px) scale(.9);}
  .gk-row:last-child{border-bottom:none;}
  .gk-row.show{animation:gkPop .5s cubic-bezier(.2,.8,.3,1.2) both;}
  .gk-row span{color:var(--dim);} .gk-row b{font-weight:900; color:var(--blue); font-size:20px;}
  @keyframes gkPop{0%{opacity:0; transform:translateY(12px) scale(.7);}
    60%{transform:translateY(0) scale(1.18);}100%{opacity:1; transform:scale(1);}}

  /* ---------- 角色选择落地页 ---------- */
  .landing #topbar, .landing .toolbar{ display:none !important; }
  .hero{ text-align:center; padding:7vh 6px 2vh; }
  .hero .logo{ font-size:46px; font-weight:900; letter-spacing:6px; line-height:1.1;
    background:linear-gradient(120deg,#ffcc4d,#ff7a3c,#ff5b8d);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    filter:drop-shadow(0 2px 14px rgba(255,150,60,.4)); animation:heroIn .8s ease both; }
  .hero .tag{ color:var(--dim); font-size:13px; margin-top:12px; line-height:1.8; animation:heroIn .8s .15s ease both; }
  .hero .pick-hint{ color:var(--gold); font-size:13px; margin:20px 0 6px; font-weight:700; animation:heroIn .8s .3s ease both; }
  @keyframes heroIn{from{opacity:0; transform:translateY(18px);} to{opacity:1; transform:translateY(0);}}
  .origins{ display:flex; flex-direction:column; gap:11px; padding:4px 4px 28px; }
  .ocard{ display:flex; align-items:center; gap:14px; text-align:left;
    background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:13px 16px;
    cursor:pointer; transition:transform .15s, border-color .15s, box-shadow .15s; animation:ocardIn .5s ease both; }
  .ocard:nth-child(1){animation-delay:.05s} .ocard:nth-child(2){animation-delay:.12s}
  .ocard:nth-child(3){animation-delay:.19s} .ocard:nth-child(4){animation-delay:.26s} .ocard:nth-child(5){animation-delay:.33s}
  .ocard:active{ transform:scale(.97); }
  .ocard:hover{ border-color:var(--gold); box-shadow:0 0 0 1px var(--gold),0 6px 20px rgba(255,204,77,.18); transform:translateY(-2px); }
  .ocard .oemoji{ font-size:38px; flex:0 0 auto; width:50px; text-align:center; }
  .ocard .oname{ font-size:19px; font-weight:800; }
  .ocard .otag{ font-size:12.5px; color:var(--gold); margin-top:3px; }
  .ocard .ocity{ font-size:11.5px; color:var(--dim); margin-top:2px; }
  @keyframes ocardIn{from{opacity:0; transform:translateY(16px) scale(.96);} to{opacity:1; transform:translateY(0) scale(1);}}

  /* ---------- 动画 ---------- */
  @keyframes fadeUp{from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:translateY(0);}}
  .anim-in{animation:fadeUp .42s cubic-bezier(.2,.7,.3,1) both;}

  /* 场景插画横幅 */
  .stage{position:relative; height:118px; border-radius:14px; overflow:hidden;
    border:1px solid var(--line); display:flex; align-items:center; justify-content:center; gap:14px;
    background:linear-gradient(160deg,var(--g1,#2a2440),var(--g2,#0d1117));}
  .stage::after{content:""; position:absolute; inset:0;
    background:radial-gradient(120% 90% at 50% 120%, rgba(255,255,255,.08), transparent 60%);}
  .stage .hero{font-size:54px; z-index:2; filter:drop-shadow(0 5px 7px rgba(0,0,0,.5));
    animation:bob 2.6s ease-in-out infinite;}
  .stage .hero.b{animation:bob 2.6s ease-in-out infinite .6s;}
  .stage .hero.sway{animation:sway 3.4s ease-in-out infinite;}
  .stage .hero.sm{font-size:40px;}
  .stage .sun{position:absolute; top:16px; right:24px; font-size:34px; z-index:1;
    animation:spin 16s linear infinite; filter:drop-shadow(0 0 12px #ffcc4d);}
  .pcl{position:absolute; top:-26px; z-index:1; opacity:.9; pointer-events:none;
    animation:fall linear infinite;}
  .neon{animation:flicker 2.8s steps(1) infinite;}

  @keyframes bob{0%,100%{transform:translateY(0) rotate(-2deg);}50%{transform:translateY(-9px) rotate(2deg);}}
  @keyframes sway{0%,100%{transform:rotate(-7deg);}50%{transform:rotate(7deg);}}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes fall{0%{transform:translateY(0) rotate(0);}100%{transform:translateY(150px) rotate(300deg);}}
  @keyframes flicker{0%,90%,100%{opacity:1;}92%{opacity:.4;}94%{opacity:1;}96%{opacity:.5;}}

  /* 战斗特效 */
  @keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-8px) rotate(-1deg);}
    40%{transform:translateX(7px) rotate(1deg);}60%{transform:translateX(-5px);}80%{transform:translateX(4px);}}
  .shake{animation:shake .42s;}
  @keyframes dmgpop{0%{opacity:0; transform:translate(-50%,0) scale(.6);}
    25%{opacity:1; transform:translate(-50%,-22px) scale(1.2);}
    100%{opacity:0; transform:translate(-50%,-54px) scale(1);}}
  .dmgfloat{position:absolute; left:50%; top:30%; z-index:9; font-weight:900; font-size:24px;
    pointer-events:none; animation:dmgpop 1s ease-out forwards;
    text-shadow:0 2px 4px #000;}
  .fighter{position:relative;}

  /* 轮盘结果弹出 */
  @keyframes resPop{0%{opacity:0; transform:scale(.5);}60%{transform:scale(1.25);}100%{opacity:1; transform:scale(1);}}
  .respop{display:inline-block; animation:resPop .6s ease-out both;}

  /* ---------- 对话气泡 ---------- */
  .chat{display:flex; flex-direction:column; gap:11px;}
  .msg{display:flex; gap:8px; align-items:flex-start;}
  .msg.right{flex-direction:row-reverse;}
  .msg .face{flex:0 0 40px; width:40px; height:40px; border-radius:50%;
    background:var(--panel2); border:1px solid var(--line); display:flex;
    align-items:center; justify-content:center; font-size:23px; box-shadow:0 2px 5px rgba(0,0,0,.3);}
  .msg .col{display:flex; flex-direction:column; max-width:80%; min-width:0;}
  .msg.right .col{align-items:flex-end;}
  .msg .who{font-size:11px; color:var(--dim); margin:0 6px 3px;}
  .msg .bub{background:var(--panel); border:1px solid var(--line); border-radius:15px;
    border-top-left-radius:5px; padding:9px 13px; line-height:1.65; font-size:15px;
    white-space:pre-wrap; word-break:break-word;}
  .msg.right .bub{background:linear-gradient(180deg,#1d3047,#15212f); border-color:#2f4a66;
    border-top-left-radius:15px; border-top-right-radius:5px;}
  .msg .bub.think{font-style:italic; color:var(--dim); border-style:dashed;}
  .msg.env{justify-content:center;}
  .msg.env .bub{background:transparent; border:none; color:var(--dim); font-style:italic;
    font-size:13px; text-align:center; padding:3px 10px;}
  .msg.end{justify-content:center;}
  .msg.end .bub{border:1px solid var(--gold); background:linear-gradient(180deg,#241f10,#15140d);
    color:var(--gold); font-weight:700; text-align:center; border-radius:12px; font-size:16px;
    letter-spacing:1px;}
  /* 立绘式大头像 */
  .msg.bigface{align-items:center;}
  .msg.bigface .face{width:62px; height:62px; font-size:36px; animation:portIn .5s cubic-bezier(.2,.8,.2,1) both;}
  .msg.bigface .bub{font-size:15.5px;}
  @keyframes portIn{0%{transform:scale(.4) translateY(10px); opacity:0;}
    60%{transform:scale(1.12);}100%{transform:scale(1); opacity:1;}}
  /* 打字光标 */
  .bub.typing::after{content:"▋"; color:var(--accent); animation:blink .7s steps(1) infinite; margin-left:1px;}
  @keyframes blink{50%{opacity:0;}}

  /* 全屏关卡过渡 */
  #trans{position:fixed; inset:0; z-index:100; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:12px; opacity:0; pointer-events:none;
    overflow:hidden; transition:opacity .4s;
    background:radial-gradient(circle at 50% 42%, rgba(20,24,32,.98), rgba(5,7,10,.995));}
  #trans.show{opacity:1; pointer-events:auto;}
  #trans .tband{position:absolute; top:50%; left:0; width:240%; height:130px;
    transform:translate(-45%,-50%) rotate(-8deg); opacity:.2;
    background:linear-gradient(90deg,transparent,var(--tc,#ffcc4d),transparent); animation:band 1.5s ease;}
  @keyframes band{0%{transform:translate(-55%,-50%) rotate(-8deg);}100%{transform:translate(5%,-50%) rotate(-8deg);}}
  #trans .temoji{font-size:84px; animation:tEmoji 1.1s cubic-bezier(.2,.8,.2,1);
    filter:drop-shadow(0 6px 14px rgba(0,0,0,.6));}
  @keyframes tEmoji{0%{transform:scale(0) rotate(-25deg); opacity:0;}
    55%{transform:scale(1.28) rotate(8deg);}100%{transform:scale(1) rotate(0); opacity:1;}}
  #trans .ttitle{font-size:30px; font-weight:900; letter-spacing:5px; color:#fff;
    text-shadow:0 0 20px var(--tc,#ffcc4d); animation:tTitle .8s ease .25s both;}
  #trans .tsub{font-size:13px; letter-spacing:3px; color:var(--tc,#ffcc4d);
    animation:tTitle .8s ease .5s both;}
  @keyframes tTitle{from{opacity:0; transform:translateY(16px);}to{opacity:1; transform:translateY(0);}}
  #trans .tskip{position:absolute; bottom:28px; font-size:11px; color:var(--dim); animation:tTitle .6s ease 1s both;}
  /* 结局专用全屏动画（电影感：黑边 + “结局”标） */
  #trans.ending{background:#04060a;}
  #trans .lb{position:absolute; left:0; right:0; height:15%; background:#000; z-index:6;}
  #trans .lb.top{top:0; animation:lbTop .7s cubic-bezier(.2,.8,.2,1) both;}
  #trans .lb.bot{bottom:0; animation:lbBot .7s cubic-bezier(.2,.8,.2,1) both;}
  @keyframes lbTop{from{transform:translateY(-100%);}to{transform:translateY(0);}}
  @keyframes lbBot{from{transform:translateY(100%);}to{transform:translateY(0);}}
  #trans .tlabel{position:absolute; top:calc(50% - 118px); font-size:13px; letter-spacing:10px;
    color:var(--tc,#ffcc4d); opacity:.85; z-index:7; animation:tTitle 1s ease .4s both;}
  #trans.ending .ttitle{animation:tTitle 1s ease .6s both;}
  #trans.ending .temoji{animation:tEmoji 1.3s cubic-bezier(.2,.8,.2,1) .2s both;}

  /* 收支预警 */
  .balwarn{margin-top:7px; font-size:11px; line-height:1.5; color:var(--gold);
    background:#241f10; border:1px solid #4a3f1a; border-radius:8px; padding:6px 9px;}
  .balwarn.crit{color:var(--red); background:#2a1414; border-color:#5a2424; animation:pulseWarn 1.4s ease infinite;}
  @keyframes pulseWarn{50%{opacity:.55;}}
  /* 炒股面板 */
  .stockbox{background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:13px; text-align:center;}
  .stockbox .amt-in{width:140px; font-size:20px; text-align:center; padding:8px; border-radius:8px;
    background:#0a0d12; border:1px solid var(--line); color:var(--gold); font-weight:700;}
  .reel{font-size:38px; font-weight:900; letter-spacing:2px; padding:14px; color:var(--gold);}
  .wlbal{display:flex; gap:10px; justify-content:center; margin:8px 0; font-size:13px;}
  .wlbal .seg{flex:1; background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:8px;}
  /* 收支预算 */
  .budget{background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:11px 13px; font-size:13px;}
  .budget .brow{display:flex; align-items:baseline; gap:6px; padding:3px 0; flex-wrap:wrap;}
  .budget .brow small{color:var(--dim); font-size:11px;}
  .budget .bsum{border-top:1px dashed var(--line); margin-top:5px; padding-top:7px; font-size:14px; color:var(--gold);}
  .budget .bsum.bad{color:var(--red);}
  /* 德国逐门成绩 */
  .grades{background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:12px 14px;}
  .grades .crow{display:flex; justify-content:space-between; align-items:center; padding:7px 4px;
    border-bottom:1px dashed var(--line); font-size:15px; opacity:.5; transition:opacity .25s;}
  .grades .crow.lit{opacity:1;}
  .grades .crow .cn{color:var(--dim);}
  .grades .crow .cg{font-size:17px;}
  .grades .gsum{margin-top:11px; padding-top:10px; border-top:1px solid var(--line);
    text-align:center; line-height:1.9; font-size:14px;}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div class="ach" id="ach"></div>
    <div id="placebar"></div>
    <div class="stats" id="stats"></div>
  </div>
  <div id="screen"></div>
  <div class="toolbar">
    <button onclick="Game.save()">💾 存档</button>
    <button onclick="Game.confirmRestart()">🔄 重新开始</button>
  </div>
</div>
<div class="float" id="float"></div>

<script>
"use strict";
/* ============================ 沧州风云 ============================ */

const SAVE_KEY = "cangzhou_save_v1";
const RATE = 8; // 1 € = 8 ¥
const RATES = {CNY:1, EUR:8, GBP:9.0}; // 兑人民币汇率
const ACT_WEEKS = 15;   // 一学期周数（兄弟局每周一次）
const ACT_WEEKLY = 20;  // 每次活动 20 欧

/* 初始角色（籍贯）：各有天赋；非河北则把"沧州"替换为对应家乡 */
const ORIGINS = {
  hebei:    {name:"河北人", city:"沧州", emoji:"🏯", tag:"情商高·把妹能力强",
             intro:"沧州少年，嘴皮子利索，最会哄姑娘开心。"},
  shandong: {name:"山东人", city:"济南", emoji:"🍶", tag:"兄弟义气成长快",
             intro:"山东大汉，重情重义，称兄道弟一拍即合。"},
  shanxi:   {name:"山西人", city:"太原", emoji:"⛏️", tag:"体能强·精力上限更高",
             intro:"山西后生，身子骨硬实，扛得住熬，时间精力比旁人多。"},
  anhui:    {name:"安徽人", city:"合肥", emoji:"📚", tag:"智力成长快·擅长考试",
             intro:"安徽学子，脑子活、会读书，考场上如鱼得水。"},
  wenzhou:  {name:"温州人", city:"温州", emoji:"💰", tag:"初始资金更多",
             intro:"温州人，天生会做生意，家底比同龄人厚实。"},
};
function home(){ return (Game.s && Game.s.home) || "沧州"; }

/* 道具系统：价格按当前币种取值 */
const ITEMS = {
  baton: {key:"baton", flag:"hasBaton", name:"甩棍",   emoji:"🥢", price:{CNY:1500, EUR:200,  GBP:200},
          desc:"防身利器·斯图加特防阿鲁巴·退学申诉加成"},
  boots: {key:"boots", flag:"hasBoots", name:"马丁靴", emoji:"🥾", price:{CNY:1500, EUR:300,  GBP:280},
          desc:"踩谁谁横·气场全开·社交涨兄弟义气更快(+武力)"},
  hair:  {key:"hair",  flag:"hasHair",  name:"大背头", emoji:"💇", price:{CNY:300,  EUR:50,   GBP:45},
          desc:"油头锃亮·魅力拉满·把妹/维系女友更有效"},
  car:   {key:"car",   flag:"hasCar",   name:"汽车",   emoji:"🚗", price:{CNY:60000, EUR:8000, GBP:7500},
          desc:"帮女神搬家、带她去Kaufland买菜·女友好感稳涨·攻略神器"},
};

const Game = {
  s:null,

  /* ---------- 初始状态 ---------- */
  fresh(){
    return {
      // 核心数值
      age:18, money:160000, cur:"CNY", health:100,
      bro:20, eq:20, career:0,
      // 装备/外观（甩棍是沧州少年的傍身家伙，开局自带）
      hasBaton:true, hasBoots:false, hasHair:false, hasCar:false,
      // 收藏
      studentIds:[], diplomas:[],
      // 进度
      flags:{},
      // 学业(当前学校)
      school:null, gpaSys:null, // 'cn100' | 'de5'
      creditsEarned:0, creditsFailed:0, yearInSchool:0, gpaTotal:0, gpaCount:0,
      creditGoal:120, lineType:"harbin",
      // 进阶数值
      wuli:0, renmai:0, xuexi:0, gfFavor:0, hasGf:false, gfType:null,
      gfSkipSem:-1, netScam:0, gfLoan:0, gaokaoBonus:0,
      // 籍贯天赋
      origin:"hebei", home:"沧州",
      eqMult:1, broMult:1, xuexiMult:1, healthDrainMult:1,
      energyBonus:0, examBonus:0, gaokaoExam:0,
      friends:{}, major:null, canStock:false, stockLoss:0, keptBaton:true,
      job:null, incomeY:0, costY:0, semFlags:{}, loan:0, shark:0,
      loan:0, internRaiseMult:1,
    };
  },

  /* ---------- 货币 ---------- */
  // 各币种经济参数（收入/支出按当地货币计）
  econ(){
    // internBase：每点实习的"基础月薪"（当地货币），随事业度涨薪倍率放大
    if(this.s.cur==="GBP")
      return {sym:"£", live:2000, workRate:110, workRand:[0,1400], internBase:40,
              tooth:[50,300], schHi:1200, schMid:500, socUnit:120, socMax:6000, socStep:200};
    return this.s.cur==="EUR"
      ? {sym:"€", live:1200, workRate:120, workRand:[0,1500], internBase:45,
         tooth:[60,400], schHi:1500, schMid:600, socUnit:130, socMax:8000, socStep:200}
      : {sym:"¥", live:2500, workRate:120, workRand:[0,800], internBase:130,
         tooth:[500,2500], schHi:8000, schMid:3000, socUnit:1000, socMax:60000, socStep:1000};
  },
  // 通用换币：经人民币中转
  setCur(target){ if(this.s.cur===target) return;
    const cny=this.s.money*RATES[this.s.cur]; this.s.money=Math.round(cny/RATES[target]); this.s.cur=target; },
  toEUR(){ this.setCur("EUR"); },
  toCNY(){ this.setCur("CNY"); },

  /* ---------- 全屏过渡动画（关卡 / 结局） ---------- */
  transition(o, done){
    let t=document.getElementById("trans");
    if(!t){ t=document.createElement("div"); t.id="trans"; document.getElementById("app").appendChild(t); }
    t.className = o.ending ? "ending" : "";
    t.style.setProperty("--tc", o.color||"#ffcc4d");
    t.innerHTML=
      (o.ending?`<div class="lb top"></div><div class="lb bot"></div><div class="tlabel">结　局</div>`:"")+
      `<div class="tband"></div>
      <div class="temoji">${o.emoji||"🏁"}</div>
      <div class="ttitle">${o.title}</div>
      ${o.sub?`<div class="tsub">${o.sub}</div>`:""}
      <div class="tskip">${o.ending?"轻触查看结算":"轻触跳过"}</div>`;
    void t.offsetWidth; t.classList.add("show");
    let finished=false;
    const end=()=>{ if(finished)return; finished=true; clearTimeout(this._transTimer);
      t.classList.remove("show"); t.removeEventListener("click", end);
      setTimeout(()=>{ if(done)done(); }, 420); };
    t.addEventListener("click", end);
    this._transTimer=setTimeout(end, o.hold||(o.ending?2600:1800));
  },
  // 结局：先放全屏结局动画，再展示结算
  endingSplash(o, contentFn){ this.transition(Object.assign({ending:true}, o), contentFn); },

  start(){
    this.s = this.fresh();
    this.render();
    this.chooseOrigin();
  },

  /* ---------- 选择初始角色（籍贯）：简洁落地页，无仪表盘 ---------- */
  chooseOrigin(){
    this._scene="chooseOrigin";
    document.getElementById("app").classList.add("landing");
    const cards=Object.keys(ORIGINS).map(k=>{
      const o=ORIGINS[k];
      return `<div class="ocard" onclick="Game.pickOrigin('${k}')">
        <div class="oemoji">${o.emoji}</div>
        <div><div class="oname">${o.name}</div><div class="otag">${o.tag}</div><div class="ocity">家乡 · ${o.city}</div></div>
      </div>`;
    }).join("");
    document.getElementById("screen").innerHTML=
      `<div class="hero">
        <div class="logo">沧 州 风 云</div>
        <div class="tag">十八岁的盛夏，高考交出第一张人生答卷。<br>从大学到职场，从初恋到三十五岁的命运岔口——<br>这一生，你来过。</div>
        <div class="pick-hint">▾ 先选个出身，天赋随籍贯而定 ▾</div>
      </div>
      <div class="origins">${cards}</div>`;
  },
  pickOrigin(key){
    this.applyOrigin(key);
    const o=ORIGINS[key];
    document.getElementById("app").classList.remove("landing");
    this.render();
    this.transition({emoji:o.emoji, title:o.name, sub:`家乡 · ${o.city} · 命运启程`, color:"#ffcc4d"},
      ()=>this.sceneCangzhou());
  },
  applyOrigin(key){
    const s=this.s; const o=ORIGINS[key]||ORIGINS.hebei;
    s.origin=key; s.home=o.city;
    // 先归位默认，再按籍贯加成
    s.eqMult=1; s.broMult=1; s.xuexiMult=1; s.healthDrainMult=1; s.energyBonus=0; s.examBonus=0; s.gaokaoExam=0;
    if(key==="hebei"){ s.eq=35; s.eqMult=1.6; }                 // 河北：情商/把妹
    else if(key==="shandong"){ s.bro=35; s.broMult=1.7; }       // 山东：兄弟义气成长快
    else if(key==="shanxi"){ s.health=100; s.energyBonus=15; s.healthDrainMult=0.55; } // 山西：体能强·更多精力
    else if(key==="anhui"){ s.xuexiMult=1.7; s.examBonus=0.10; s.gaokaoExam=55; } // 安徽：智力·擅长考试
    else if(key==="wenzhou"){ s.money=300000; }                 // 温州：初始资金更多
  },
  // 精力上限（山西更高，可分配更多）
  energyCap(){ return 100 + (this.s.energyBonus||0); },

  /* ---------- 道具店（开学分配界面可进入；买完返回原处） ---------- */
  itemShop(back){
    const s=this.s; const E=this.econ(); const cur=s.cur;
    const rows=Object.keys(ITEMS).map(k=>{
      const it=ITEMS[k]; const owned=!!s[it.flag];
      const price=it.price[cur]||it.price.CNY;
      if(owned) return {t:`${it.emoji} ${it.name}　✓ 已拥有`, sub:it.desc, f:()=>this.itemShop(back)};
      return {t:`${it.emoji} 买${it.name}　${E.sym}${fmt(price)}`, sub:it.desc, cls:"gold", f:()=>{
        if(s.money<price){ this.toast("钱不够 💸"); return; }
        s.money-=price; s[it.flag]=true;
        if(k==="boots"){ const g=this.addStat("wuli", rand(3,7)); if(g>0) this.toast(`马丁靴加身，气场 +${g}武力`); }
        this.render(); this.toast(`入手·${it.name} ${it.emoji}`);
        this.itemShop(back);
      }};
    });
    rows.push({t:"↩ 返回", f:back});
    D({loc:"🛍 行头 · 道具店", art:"study",
      lines:[
        ["env",`手头 ${E.sym}${fmt(s.money)}。置办行头，关键时刻有大用——防身、撑场面、攻略女神。`],
        ["you","钱要花在刀刃上。","think"],
      ],
      choices:rows});
  },

  /* ---------- 存读档 ---------- */
  save(){ try{ localStorage.setItem(SAVE_KEY, JSON.stringify({s:this.s, scene:this._scene})); this.toast("已存档 ✓"); }catch(e){ this.toast("存档失败"); } },
  load(){
    try{
      const d = JSON.parse(localStorage.getItem(SAVE_KEY));
      if(d&&d.s){ this.s=d.s; this.render(); (this[d.scene]||this.sceneCangzhou).call(this); return true; }
    }catch(e){}
    return false;
  },
  confirmRestart(){
    D({loc:"系统",
      lines:[["you","要把这一生推倒重来吗？当前进度会全部清空。","think"]],
      choices:[{t:"💀 重开（厂狗の轮回）",cls:"danger",f:()=>{localStorage.removeItem(SAVE_KEY); Game.start();}},
       {t:"↩ 再想想",f:()=>{ (Game[Game._scene]||Game.sceneCangzhou).call(Game); }}]});
  },

  /* ---------- 渲染状态栏 ---------- */
  render(){
    const s=this.s;
    document.getElementById("ach").innerHTML =
      `🏮 沧州风云 <span class="badge">🎓 毕业证 ${s.diplomas.length}</span>`+
      `<span class="badge">🪪 学生证 ${s.studentIds.length}</span>`+
      (s.hasBaton?`<span class="badge">🥢 甩棍</span>`:``)+
      (s.hasBoots?`<span class="badge">🥾 马丁靴</span>`:``)+
      (s.hasHair?`<span class="badge">💇 大背头</span>`:``)+
      (s.hasCar?`<span class="badge">🚗 汽车</span>`:``);

    const bar=(v,max,c)=>`<div class="bar"><i style="width:${Math.max(0,Math.min(100,v/max*100))}%;background:${c}"></i></div>`;
    // [标签, 显示值, 进度条, 数值键(用于变化箭头), 背景色类]
    const st=[
      ["年龄", s.age+"岁", "", null, ""],
      ["金钱", cursym()+fmt(s.money), "", "money", ""],
      ["健康", s.health, bar(s.health,100,"var(--green)"), "health", ""],
      ["兄弟义气", s.bro, bar(s.bro,100,"var(--gold)"), "bro", ""],
      // 脱单后：女友好感取代情商
      s.hasGf ? ["女友好感", s.gfFavor, bar(s.gfFavor,100,"var(--pink)"), "gfFavor", ""]
              : ["情商", s.eq, bar(s.eq,100,"var(--blue)"), "eq", ""],
      ["事业度", s.career, bar(s.career,100,"var(--purple)"), "career", ""],
    ];
    // 上学阶段：已修 / 已挂学分（红黄绿）
    const inSchool = s.gpaSys && s.lineType!=="shanghai" && s.school;
    if(inSchool){
      const pct=s.creditsEarned/s.creditGoal;
      st.push(["已修学分", `${s.creditsEarned}/${s.creditGoal}`, "", null, pct>=0.66?"bg-green":(pct>=0.33?"bg-yellow":"bg-red")]);
      const cf=s.creditsFailed;
      st.push(["已挂学分", `${cf}/30`, "", null, cf<10?"bg-green":(cf<20?"bg-yellow":"bg-red")]);
    }
    if(s.renmai>0)  st.push(["人脉度", s.renmai, bar(s.renmai,100,"#4dd0e1"), "renmai", ""]);
    if(s.wuli>0)    st.push(["武力值", s.wuli, bar(s.wuli,100,"var(--red)"), "wuli", ""]);
    if(s.xuexi>0)   st.push(["学习力", s.xuexi, bar(s.xuexi,100,"#9ccc65"), "xuexi", ""]);
    const dlt=this._statDeltas||{};
    let dIdx=0;
    document.getElementById("stats").innerHTML = st.map(([l,v,b,key,bg])=>{
      let d="", chg="";
      if(key && dlt[key]){ const dv=dlt[key];
        const num = key==="money" ? cursym()+fmt(Math.abs(dv)) : Math.abs(dv);
        const delay=(dIdx*0.09).toFixed(2); dIdx++;
        d=`<span class="dl ${dv>=0?'up':'down'}" style="animation-delay:${delay}s">${dv>=0?'＋':'－'}${num}</span>`;
        chg = dv>=0?" chg-up":" chg-down";
      }
      return `<div class="stat ${bg||''}${chg}"><div class="lbl">${l}</div><div class="val">${v}${d}</div>${b}</div>`;
    }).join("");

    // 当前地点 / 学期（醒目）
    const pl=this.placeLabel();
    document.getElementById("placebar").innerHTML = pl ? `<span>📍 ${pl.p}</span><span class="term">${pl.t}</span>` : "";

    // 收支预警：剩余可撑月数
    let warn="";
    if(s.costY>0){
      const net=(s.incomeY||0)-s.costY;
      if(net<0){
        const months=Math.max(0,Math.floor(s.money/RATES[s.cur] / (-net*RATES[s.cur]/12)));
        warn=`<div class="balwarn ${months<=12?'crit':''}">⚠️ 收支预警：按当前年支出 ${cursym()}${fmt(s.costY)}，存款约可支撑 <b>${months}</b> 个月（资产归零将触发外卖员结局）</div>`;
      }
    }
    let bw=document.getElementById("balwarn-slot");
    if(!bw){ bw=document.createElement("div"); bw.id="balwarn-slot"; document.getElementById("topbar").appendChild(bw); }
    bw.innerHTML=warn;
  },

  /* ---------- 边际递减：数值越高越难涨 ---------- */
  _dimGain(v, amount){
    if(amount<=0) return amount;
    const factor=Math.max(0.12, 1 - (v||0)/110); // 越接近100，加成越小
    return Math.max(0, Math.round(amount*factor));
  },
  // 给 0-100 数值加点（正向边际递减，负向全额），返回实际变化量
  addStat(key, amount){
    const v=this.s[key]||0;
    const eff = amount>=0 ? this._dimGain(v, amount) : amount;
    this.s[key]=clamp(v+eff,0,100);
    return eff;
  },

  /* ---------- 数值变动 + 飘字 ---------- */
  change(obj){
    const names={money:"金钱",health:"健康",bro:"兄弟义气",eq:"情商",career:"事业度",age:"年龄",
      gfFavor:"女友好感",wuli:"武力值",renmai:"人脉度",xuexi:"学习力"};
    const msgs=[];
    for(const k in obj){
      let eff;
      if(k==="money"||k==="age"){ this.s[k]=(this.s[k]||0)+obj[k]; if(k==="money"&&this.s.money<0) this.s.money=0; eff=obj[k]; }
      else { eff=this.addStat(k, obj[k]); } // 边际递减
      const v = k==="money"? (eff>=0?"+":"-")+cursym()+fmt(Math.abs(eff)) : (eff>=0?"+":"")+eff;
      msgs.push(`<span class="${eff>=0?'up':'down'}">${names[k]||k} ${v}</span>`);
    }
    this.render();
    if(msgs.length) this.toast(msgs.join("　"),true);
  },

  toast(html,html2){
    const f=document.getElementById("float");
    f.innerHTML=html; f.classList.add("show");
    clearTimeout(this._tt);
    this._tt=setTimeout(()=>f.classList.remove("show"), 2200);
  },

  /* 学期数值快照 / 变化箭头 */
  _snapStats(){ const s=this.s; const k=["money","health","bro","eq","career","gfFavor","wuli","renmai","xuexi"];
    const o={}; k.forEach(x=>o[x]=s[x]||0); return o; },
  _showDeltas(d){
    this._statDeltas=d; this.render();
    clearTimeout(this._deltaTimer);
    // 长时间保留（直到下个学期结算前），仅做兜底清除
    this._deltaTimer=setTimeout(()=>{ this._statDeltas=null; this.render(); }, 30000);
  },

  /* 命运抉择点存档 / 坏结局回滚 */
  mark(fn){ this._cp={ s:JSON.parse(JSON.stringify(this.s)), fn }; },
  rollback(){
    if(!this._cp) return this.confirmRestart();
    this.s=JSON.parse(JSON.stringify(this._cp.s));
    this._statDeltas=null; this.render();
    const fn=this._cp.fn; fn();
  },
  // 坏结局的按钮：回滚 + 重开
  _badEndChoices(){
    const c=[];
    if(this._cp) c.push({t:"↩ 回到上一个命运抉择点", sub:"重新选择，扭转结局", cls:"gold", f:()=>this.rollback()});
    c.push({t:"🔄 彻底重开一局", cls: this._cp?"":"gold", f:()=>this.confirmRestart()});
    return c;
  },

  /* ========================================================= */
  /* 起始关卡：沧州（18岁）高考                                  */
  /* ========================================================= */
  sceneCangzhou(){
    this._scene="sceneCangzhou";
    this.mark(()=>this.sceneCangzhou());
    D({
      loc:`第一关 · ${home()} · 18岁`, title:"沧州风云", art:"cangzhou", tw:true,
      lines:[
        ["env",`盛夏的${home()}，蝉鸣聒噪。高考报名点门口，你攥着报名表。`],
        ["mom",`儿啊，咱户口在${home()}，本地这竞争……一个萝卜八个坑啊。`,{big:true}],
        ["unc","听三舅一句劝，去新疆考！那边分数线松快得多——虽说咱户口不在那儿，但路子嘛，总有的。",{big:true}],
        ["you","高考地点……这第一步，可得想清楚了。","think"],
      ],
      choices:[
        {t:`🏯 就在${home()}考`, sub:"竞争激烈·凭真本事", f:()=>this.sceneLocalGaokao()},
        {t:"🏜 远赴新疆高考", sub:"需打点 ¥20,000", cls:"gold", f:()=>this.sceneXinjiang()}
      ]
    });
  },

  /* ---------- 本地（沧州）高考：逐门出分 → 总分择校 ---------- */
  sceneLocalGaokao(){
    this._scene="sceneLocalGaokao";
    const s=this.s;
    const bonus=(s.gaokaoBonus||0)+(s.gaokaoExam||0); // 复读加成 + 安徽考试天赋
    const rolls=[
      {nm:"语文", v:clamp(rand(80,135),0,150)},
      {nm:"数学", v:clamp(rand(60,140),0,150)},
      {nm:"外语", v:clamp(rand(80,135),0,150)},
      {nm:"理综", v:clamp(rand(150,250),0,300)},
    ];
    this.revealGaokao(rolls, bonus, (total)=>this.localResult(total));
  },
  // 逐门分数动画 → 公布总分 → 回调择校
  revealGaokao(rolls, bonus, branch){
    const sum=rolls.reduce((a,r)=>a+r.v,0);
    const total=sum+bonus;
    D({loc:`${home()} · 高考放榜`, art:"cangzhou", tw:true,
      lines:[
        ["env","查分系统开放。你深吸一口气，输入准考证号——"],
        ["you","成绩……一门一门往外蹦，心都提到嗓子眼了。","think"],
      ],
      extra:`<div class="gk-board" id="gkBoard"></div>`,
      choices:[{t:"📩 查看录取结果", cls:"gold", id:"gkGo", f:()=>branch(total)}]
    });
    const go=document.getElementById("gkGo");
    const board=document.getElementById("gkBoard");
    (this._gkTimers||[]).forEach(clearTimeout); this._gkTimers=[];
    if(!board){ return; } // 测试环境无 DOM，直接给按钮
    if(go) go.style.display="none";
    const add=(label,val,cls)=>{ const d=document.createElement("div"); d.className="gk-row";
      d.innerHTML=`<span>${label}</span><b${cls?` style="${cls}"`:""}>${val}</b>`;
      board.appendChild(d); requestAnimationFrame(()=>d.classList.add("show")); };
    let i=0;
    const stepScore=()=>{ const r=rolls[i]; add(r.nm, r.v); i++;
      this._gkTimers.push(setTimeout(i<rolls.length?stepScore:stepBonus, 700)); };
    const stepBonus=()=>{ if(bonus>0){ add("天赋·复读加成", "+"+bonus, "color:var(--green)");
        this._gkTimers.push(setTimeout(stepTotal, 700)); }
      else stepTotal(); };
    const stepTotal=()=>{ add("总分", total, "color:var(--gold);font-size:26px");
      if(go) this._gkTimers.push(setTimeout(()=>{ go.style.display=""; }, 550)); };
    this._gkTimers.push(setTimeout(stepScore, 450));
  },

    if(lt==="munich"||lt==="stuttgart"||lt==="london"){ return "第"+yr+"学期"; }
    return "第"+yr+"学年";

    const s=this.s, lt=s.lineType;
    if(lt==="shanghai") return {p:"上海", t:`第 ${s.shYears||0} 年`};
    if(s.school){
      const emo = lt==="harbin"?"🛠":(lt==="tongji"?"🏛":(lt==="london"?"🇬🇧":"🇩🇪"));
      return {p:emo+" "+s.school, t:this.yrLabelFor(Math.max(1,s.yearInSchool))};

    return {p:`🏯 ${s.home||"沧州"}`, t:`${s.age}岁`};

      {k:"intern", nm:"实习", sub: careerOK?`已开启 · 每点≈${cursym()}${fmt(this.internMonthlyPerPoint())}/月`:`无偿积累(事业度<20)`},
    ];
    if(!careerOK) cats.push({k:"work", nm:"打工", sub:"稳定低收入·事业度"}); // 实习解锁后取消打工
    cats.push({k:"friend", nm:"交友", sub:"兄弟义气"},
      s.hasGf ? {k:"flirt", nm:"维系女友", sub:"投入不足→好感降、闹分手"} : {k:"flirt", nm:"把妹", sub:"情商·脱单(看情商)"});
    const init={study:40,intern:0,work:0,friend:20,flirt:0};
    const E=this.econ();
    const moneyMax=Math.min(s.money, E.socMax);
    this._allocCtx={credits, yrLabel, E, careerOK, makeup:!!makeup};
    const debt=(s.loan||0)+(s.shark||0)+(s.gfLoan||0);
    const loanRow = debt>0 ? `<div class="row"><div class="nm">还债<small>欠 ${E.sym}${fmt(debt)}${s.shark?`（含高利贷 ${E.sym}${fmt(s.shark)}）`:""}${s.gfLoan?`（含富姐 ${E.sym}${fmt(s.gfLoan)} 无息）`:""}</small></div>
        <input type="range" min="0" max="${Math.min(s.money, debt)}" step="${E.socStep}" value="0" data-m="repay" oninput="Game._moneySync()">
        <div class="amt" id="m_repay">0</div></div>` : "";

    D({
      loc:`${s.school} · ${yrLabel} · 分配`,
      lines:[
        makeup
          ? ["prof2",`补课学期：强制补修 ${credits} 个挂科学分。通过的课程会从"已挂学分"里移除！正常分配精力即可。`,{big:true}]
          : ["bro",`精力随便分，基准 ${this.energyCap()}${s.energyBonus?`（${ORIGINS[s.origin].name}体能好，+${s.energyBonus}）`:""}。超过则睡眠不足随机掉健康；没分完当休息、按余量随机回血。`],
        ["bro", careerOK
          ? `事业度≥20，实习开启赚钱模式！每点≈${cursym()}${fmt(this.internMonthlyPerPoint())}/月。\n🏠 本学期生活费 ${E.sym}${fmt(E.live)}/月。`
          : `事业度<20，实习只能无偿攒经验（涨事业度）。\n🏠 本学期生活费 ${E.sym}${fmt(E.live)}/月。`],
      ],
      extra:`<div class="alloc" id="alloc">
        ${cats.map(c=>`<div class="row">
          <div class="nm">${c.nm}<small>${c.sub}</small></div>
          <input type="range" min="0" max="100" step="5" value="${init[c.k]}" data-k="${c.k}" oninput="Game._allocSync()">
          <div class="amt" id="amt_${c.k}">${init[c.k]}</div>
        </div>`).join("")}
        <div class="pool">已用精力 <b id="poolUsed">0</b> / ${this.energyCap()}　<span id="sleepNote"></span></div>
      </div>
      <div class="alloc">
        <div style="font-size:13px;margin-bottom:4px">💰 投入金钱</div>
        <div class="row"><div class="nm">交友花钱</div>
          <input type="range" min="0" max="${moneyMax}" step="${E.socStep}" value="0" data-m="friend" oninput="Game._moneySync()">
          <div class="amt" id="m_friend">0</div></div>
        <div class="row"><div class="nm">把妹花钱</div>
          <input type="range" min="0" max="${moneyMax}" step="${E.socStep}" value="0" data-m="flirt" oninput="Game._moneySync()">
          <div class="amt" id="m_flirt">0</div></div>
        ${loanRow}
        <div class="pool">社交花费 <b id="moneySpend">${E.sym}0</b>　/　可用 ${E.sym}${fmt(s.money)}</div>
      </div>
      <div class="budget" id="budget"></div>`,
      choices:[
        {t:"🎲 确定，开始这一学期", cls:"gold", id:"goBtn", f:()=>{
          const alloc=this._readAlloc(); const ms=this._readMoney();
          const proj=this._projectBudget(alloc, ms);
          if(proj.endBal<0){ return this.cantAfford(credits, yrLabel, makeup); }
          this.resolveYear(credits, alloc, ms, yrLabel, makeup);
        }},
        {t:"🛍 进道具店（置办行头）", sub:"甩棍/马丁靴/大背头/汽车", f:()=>this.itemShop(()=>this.allocateYear(credits, yrLabel, makeup))},
        {t:"🚪 实在撑不住，退学", sub:"放弃学业另谋出路", cls:"danger", f:()=>{
          D({loc:"抉择",
            lines:[["you","撑不下去了……真要退学吗？","think"]],
            choices:[{t:"确认退学", cls:"danger", f:()=>this.afterSchoolFail()},
                     {t:"↩ 返回继续分配", f:()=>this.allocateYear(credits, yrLabel, makeup)}]});
        }}
      ]
    });
    this._allocSync(); this._moneySync();
  },
  _readAlloc(){ const a={study:0,intern:0,work:0,friend:0,flirt:0};
    document.querySelectorAll('#alloc input').forEach(i=>a[i.dataset.k]=+i.value); return a; },
  _readMoney(){ const m={friend:0,flirt:0,repay:0};
    document.querySelectorAll('input[data-m]').forEach(i=>m[i.dataset.m]=+i.value); return m; },
  _projectBudget(alloc, money){
    const s=this.s; const E=this._allocCtx.E;
    const workInc = alloc.work>0 ? Math.round(alloc.work*E.workRate + (E.workRand[0]+E.workRand[1])/2) : 0;
    const internInc = (s.career>=20 && alloc.intern>0) ? alloc.intern*this.internMonthlyPerPoint()*12 : 0;
    const social = (money.friend||0)+(money.flirt||0);
    const repay = money.repay||0;
    const living = E.live*12;
    const activity = this.activityCost();
    const income = workInc + internInc;
    const expense = living + social + repay + activity;
    return {workInc, internInc, social, repay, living, activity, income, expense, endBal: s.money + income - expense};
  },
  _allocSync(){
    let used=0;
    document.querySelectorAll('#alloc input').forEach(i=>{ used+=+i.value; document.getElementById("amt_"+i.dataset.k).textContent=i.value; });
    const actE=this.activityEnergy(); const tot=used+actE;
    document.getElementById("poolUsed").textContent = actE? `${used}+${actE}(兄弟局)=${tot}` : used;
    const note=document.getElementById("sleepNote");
    const cap=this.energyCap();
    if(tot>cap) note.innerHTML=`<span style="color:var(--red)">超 ${tot-cap}%·睡眠不足⚠️</span>`;
    else if(tot<cap) note.innerHTML=`<span style="color:var(--green)">余 ${cap-tot}%·可休息回血</span>`;
    else note.innerHTML=`<span style="color:var(--gold)">刚好</span>`;
    this._budgetSync();
  },
  _moneySync(){
    document.querySelectorAll('input[data-m]').forEach(i=>{ document.getElementById("m_"+i.dataset.m).textContent=cursym()+fmt(+i.value); });
    const m=this._readMoney();
    document.getElementById("moneySpend").textContent=cursym()+fmt((m.friend||0)+(m.flirt||0));
    this._budgetSync();
  },
  _budgetSync(){
    const el=document.getElementById("budget"); if(!el||!this._allocCtx) return;
    const p=this._projectBudget(this._readAlloc(), this._readMoney());
    const sym=cursym();
    const bad=p.endBal<0;
    el.innerHTML=
      `<div class="brow">📈 预计收入　<b style="color:var(--green)">+${sym}${fmt(p.income)}</b>`+
      `<small>（实习 ${sym}${fmt(p.internInc)} · 打工 ${sym}${fmt(p.workInc)}）</small></div>`+
      `<div class="brow">📉 预计开支　<b style="color:var(--red)">-${sym}${fmt(p.expense)}</b>`+
      `<small>（生活 ${sym}${fmt(p.living)} · 社交 ${sym}${fmt(p.social)}${p.activity?` · 兄弟局 ${sym}${fmt(p.activity)}`:""}${p.repay?` · 还贷 ${sym}${fmt(p.repay)}`:""}）</small></div>`+
      `<div class="brow bsum ${bad?'bad':''}">🏦 学期末预计结余　<b>${sym}${fmt(p.endBal)}</b>${bad?' ❌ 资金不足，无法开学':' ✅'}</div>`;
  },

  /* 结算一个学年 */
  resolveYear(credits, alloc, money, yrLabel, makeup){
    const s=this.s;
    const E=this.econ();
    this._statDeltas=null; clearTimeout(this._deltaTimer); // 清掉上学期的变化箭头
    this._semSnap=this._snapStats(); // 学期开始快照（用于仪表盘变化箭头）
    const moneySpent=(money.friend||0)+(money.flirt||0);
    s.money-=moneySpent;
    // 还债：先还高利贷(30%)再还助学贷款(10%)
    if(money.repay>0){
      let pay=Math.min(money.repay, s.money);
      if(s.shark>0){ const p=Math.min(pay, s.shark); s.shark-=p; pay-=p; s.money-=p; }
      if(pay>0 && s.loan>0){ const p=Math.min(pay, s.loan); s.loan-=p; pay-=p; s.money-=p; }
      if(pay>0 && s.gfLoan>0){ const p=Math.min(pay, s.gfLoan); s.gfLoan-=p; pay-=p; s.money-=p; }
    }
    // 兄弟局总费用（每周20€×周数×次数），开学一并扣
    const actCost=this.activityCost(), actEnergy=this.activityEnergy();
    if(actCost>0){ s.money=Math.max(0,s.money-actCost); }
    s.semActivities=[];

    const logs=[];
    const isCn = s.gpaSys==="cn100";

    // ---- 通过率（含学校难度修正 + 学习力 + 随机扰动） ----
    const studyW=alloc.study/100;
    const load=(credits-40)/40;
    // 难度修正：>0 更易过；慕尼黑“严出”更难
    const diffMap={braunschweig:0.14, stuttgart:0.14, london:0.14, munich:-0.12};
    const diffBonus = diffMap[s.lineType]||0;
    let passRate = 0.6 + studyW*0.55 - load*0.3 + (s.xuexi||0)/400 + diffBonus + (s.examBonus||0);
    passRate=clamp(passRate,0.12,0.99);
    // 中国百分制基准（高=好）
    const gpaBaseCn = 55 + studyW*40 - load*22 + (s.xuexi||0)*0.12 + diffBonus*40;
    // 德国制：1.0 最佳，5.0 不及格（低=好）
    const gpaBaseDe = clamp(4.2 - studyW*2.8 + load*0.9 - (s.xuexi||0)*0.008 - diffBonus*1.0, 1.0, 5.0);

    // ---- 学分 / 成绩结算 ----
    let courseData=null;
    if(isCn){
      let passed=0;
      for(let i=0;i<credits;i+=2){ if(Math.random()<passRate) passed+=2; }
      passed=Math.min(passed,credits);
      const failed=credits-passed;
      s.creditsEarned+=passed; s.creditsFailed+=failed;
      logs.push(`📚 选 ${credits} 学分 → 通过 ${passed}，挂科 ${failed}`);
    } else {
      // 德国：拆成 4-6 学分的课程，逐门判定（1.0最佳，5.0挂科）
      const courses=[]; let remain=credits;
      while(remain>0){ let c=Math.min(remain, rand(4,6)); if(remain-c>0 && remain-c<4) c=remain; courses.push({cr:c}); remain-=c; }
      let passed=0, failed=0, gsum=0;
      courses.forEach((c,idx)=>{
        const pass=Math.random()<passRate;
        let grade;
        if(pass){ grade=clamp(gpaBaseDe + (Math.random()*0.8-0.4), 1.0, 4.0); passed+=c.cr; }
        else { grade=5.0; failed+=c.cr; }
        c.pass=pass; c.grade=Math.round(grade*10)/10; c.name=`课程 ${idx+1}`;
        gsum+=c.grade;
      });
      const semGpa=Math.round(gsum/courses.length*10)/10;
      if(makeup){
        // 补课：通过的课从已挂学分移除并计入已修；挂掉的维持
        s.creditsEarned+=passed; s.creditsFailed=Math.max(0, s.creditsFailed-passed);
      } else {
        s.creditsEarned+=passed; s.creditsFailed+=failed;
        if(semGpa<=1.5){ s.money+=E.schHi; logs.push(`🏆 优异奖学金 +${E.sym}${fmt(E.schHi)}`); }
        else if(semGpa<=2.3){ s.money+=E.schMid; logs.push(`🥈 良好奖学金 +${E.sym}${fmt(E.schMid)}`); }
      }
      s.gpaTotal+=semGpa; s.gpaCount++; s.lastGpa=semGpa;
      courseData={courses, passed, failed, semGpa};
    }

    // ---- 打工 / 实习 收入 + 事业度 ----
    if(alloc.work>0){
      const inc=Math.round(alloc.work*E.workRate + rand(E.workRand[0],E.workRand[1]));
      s.money+=inc; this.addStat("career", Math.round(alloc.work*0.1));
      logs.push(`🧹 打工到手 +${E.sym}${fmt(inc)}（事业度微涨）`);
    }
    if(alloc.intern>0){
      const cBefore=s.career;
      this.addStat("career", Math.round(alloc.intern*0.5));
      if(cBefore>=20){
        const per=this.internMonthlyPerPoint();
        const inc=Math.round(alloc.intern*per*12*(0.85+Math.random()*0.3)); // 随机浮动
        s.money+=inc; logs.push(`💼 实习收入 +${E.sym}${fmt(inc)}（事业度↑）`);
        // 事业度越高，越有机会涨薪（持久提升每点薪资）
        if(Math.random() < s.career/220){
          s.internRaiseMult = Math.round((s.internRaiseMult + rand(10,30)/100)*100)/100;
          this.toast(`📈 实习涨薪！每点薪资 ×${s.internRaiseMult}`);
          logs.push(`📈 实习涨薪，每点薪资倍率 ×${s.internRaiseMult}`);
        }
      } else {
        logs.push(`💼 无偿实习攒经验，事业度 ${cBefore}→${s.career}${s.career>=20?"（已达20，下学期可赚钱！）":""}`);
      }
    }

    // ---- 学习力随用功增长（安徽人成长更快）----
    if(alloc.study>0){ const xg=this.addStat("xuexi", Math.round(alloc.study*0.05*(s.xuexiMult||1))); if(xg>0) logs.push(`🧠 勤学苦练，学习力 +${xg}`); }
    // ---- 社交：兄弟义气（边际递减）----
    if(alloc.friend>0||money.friend>0){
      const raw=Math.round((alloc.friend*0.25 + (money.friend/E.socUnit)*0.6 + rand(0,4)) * (s.broMult||1) * (s.hasBoots?1.2:1));
      const g=this.addStat("bro", raw);
      if(g>0) logs.push(`🍻 兄弟义气 +${g}${s.hasBoots?"（马丁靴气场加成）":""}`);
    }
    // ---- 把妹 / 女友：情商训练（单身）+ 按类型维系关系 ----
    this._gfEvent=null;
    const flirtTime = alloc.flirt;
    const flirtMoney = money.flirt/E.socUnit; // 归一化
    if(!s.hasGf){
      // 单身时把妹只历练情商（脱单改由情商达标后主动选择，见 gfUnlock）
      if(flirtTime>0||flirtMoney>0){ const g=this.addStat("eq", Math.round((alloc.flirt*0.22 + flirtMoney*0.5 + rand(0,3))*(s.eqMult||1)*(s.hasHair?1.25:1))); if(g>0) logs.push(`💘 把妹历练，情商 +${g}${s.hasHair?"（大背头加成）":""}`); }
    } else {
      const t=s.gfType;
      // 维系满意度：不同类型侧重不同
      let sat;
      if(t==="meinu")      sat = flirtMoney*1.5 + flirtTime*0.3 - 16; // 美女吃金钱
      else if(t==="fujie") sat = flirtTime*1.0 + flirtMoney*0.3 - 16; // 富姐吃时间
      else if(t==="net")   sat = flirtMoney*1.2 + flirtTime*0.5 - 12; // 网恋靠"转账"
      else                 sat = flirtTime*0.55 + flirtMoney*0.8 - 14; // 学霸均衡
      if(s.hasHair) sat+=3;   // 大背头：撑场面
      if(s.hasCar)  sat+=6;   // 汽车：接送有面子
      if(sat>=0){ const up=this.addStat("gfFavor", Math.round(2+sat*0.4)); logs.push(`💞 用心经营，女友好感 +${up}`); }
      else { const down=Math.round((-sat)*0.7+rand(1,3)); s.gfFavor=clamp(s.gfFavor-down,0,100); logs.push(`💔 维系投入不足，女友好感 -${down}`); }

      // ---- 类型专属收益 / 支出 ----
      if(t==="meinu"){
        const cost=Math.round(E.live*2); s.money=Math.max(0,s.money-cost);
        const hp=rand(4,9); s.health=clamp(s.health+hp,0,100);
        logs.push(`💃 美女女友·约会置装 -${E.sym}${fmt(cost)}，身心愉悦 健康 +${hp}`);
      } else if(t==="fujie"){
        const allowance=rand(Math.round(E.live), Math.round(E.live*5)); s.money+=allowance;
        const hp=rand(2,6); s.health=clamp(s.health-hp,0,100);
        logs.push(`💎 富姐女友·随手塞了零花钱 +${E.sym}${fmt(allowance)}（陪她应酬 健康 -${hp}）`);
      } else if(t==="xueba"){
        const cost=Math.round(E.live*1); s.money=Math.max(0,s.money-cost);
        const xg=this.addStat("xuexi", Math.round(rand(4,9)*(s.xuexiMult||1)));
        logs.push(`🤓 学霸女友·一起自习 -${E.sym}${fmt(cost)}，学习力 +${xg}`);
      } else if(t==="net"){
        if(Math.random()<0.65){
          const ask=rand(Math.round(E.live*2), Math.round(E.live*6)); s.money=Math.max(0,s.money-ask); s.netScam=(s.netScam||0)+ask;
          const up=this.addStat("gfFavor", rand(3,7));
          logs.push(`💻 女友说家里急用钱，你转了 ${E.sym}${fmt(ask)}（好感 +${up}）`);
        }
        // 累计转账过多 → 对方突然蒸发
        if((s.netScam||0) >= E.live*14 && Math.random()<0.5){
          s.hasGf=false; s.gfType=null; this._gfEvent="netbust";
        }
      }

      // ---- 汽车：帮女神搬家、带去 Kaufland 买菜 → 好感稳涨（油费另计） ----
      if(s.hasGf && s.hasCar){
        const up=this.addStat("gfFavor", rand(4,8));
        const fuel=Math.round(E.live*0.4); s.money=Math.max(0,s.money-fuel);
        logs.push(`🚗 开车帮她搬家、去 Kaufland 买菜，女友好感 +${up}（油费 -${E.sym}${fmt(fuel)}）`);
      }

      // ---- 美女：亲密度达标 → 索要 €5000 买衣服（攻略事件，仅一次） ----
      if(s.hasGf && s.gfType==="meinu" && s.gfFavor>=80 && !s.flags.meinuDress){ this._pendingMeinuDress=true; }

      // ---- 吵架预警在先、分手在后 ----
      if(s.hasGf){
        if(s.gfFavor<50){
          if(s.gfWarned){ s.hasGf=false; s.gfType=null; this._gfEvent="breakup"; }
          else { s.gfWarned=true; s.gfFavor=50; this._gfEvent="warn"; }
        }
        else if(s.gfFavor<60){ if(!s.gfWarned){ s.gfWarned=true; this._gfEvent="warn"; } }
        else s.gfWarned=false;
      }
    }

    // ---- 基础生活成本 ----
    const livingYr=E.live*12;
    s.money=Math.max(0,s.money-livingYr);
    logs.push(`🏠 学期生活开销 -${E.sym}${fmt(livingYr)}`);
    // ---- 债务利息：助学贷款10%/年，高利贷30%/年 ----
    if(s.loan>0){ s.loan=Math.round(s.loan*1.10); logs.push(`🏦 助学贷款滚息至 ${E.sym}${fmt(s.loan)}（10%/年）`); }
    if(s.shark>0){ s.shark=Math.round(s.shark*1.30); logs.push(`💸 高利贷滚息至 ${E.sym}${fmt(s.shark)}（30%/年）`); }

    // ---- 睡眠平衡：精力总量决定健康（兄弟局额外耗精力） ----
    s.age++;
    const cap=this.energyCap();
    const used=(alloc.study||0)+(alloc.intern||0)+(alloc.work||0)+(alloc.friend||0)+(alloc.flirt||0)+actEnergy;
    let hpDelta=-rand(0,2); // 年龄自然小幅下降
    if(used>cap){
      const deficit=used-cap, drop=Math.round(deficit*(rand(20,50)/100)*(s.healthDrainMult||1));
      hpDelta-=drop; logs.push(`😵 精力透支 ${deficit}%，睡眠不足，健康 -${drop}`);
    } else if(used<cap){
      const surplus=cap-used, heal=Math.round(surplus*(rand(10,35)/100));
      hpDelta+=heal; logs.push(`😴 余力 ${surplus}%，休整恢复，健康 +${heal}`);
    }
    s.health=clamp(s.health+hpDelta,0,100);

    // ---- 随机事件：智齿发作 ----
    if(Math.random()<0.22){
      const pain=rand(4,12), cost=rand(E.tooth[0],E.tooth[1]);
      s.health=clamp(s.health-pain,0,100); s.money=Math.max(0,s.money-cost);
      logs.push(`🦷 随机事件·智齿发作！健康 -${pain}，拔牙花了 ${E.sym}${fmt(cost)}`);
    }
    // ---- 健康过低：随机医疗问题，额外破费 ----
    if(s.health<40 && Math.random() < (40-s.health)/55){
      const pain=rand(5,15), cost=rand(E.tooth[1], E.tooth[1]*3);
      s.health=clamp(s.health-pain,0,100); s.money=Math.max(0,s.money-cost);
      logs.push(`🏥 身体亮红灯！突发疾病住院，健康 -${pain}，医疗费 ${E.sym}${fmt(cost)}`);
    }
    // ---- 斯图加特特色随机事件：阿鲁巴（甩棍/认识旭子可降低概率） ----
    this._semEvent=null;
    if(s.lineType==="stuttgart"){
      let prob=0.45;
      if(s.hasBaton) prob-=0.22;          // 有甩棍能反抗
      if(s.friends.xuzi) prob-=0.30;      // 旭子是阿鲁巴队长，给面子
      prob=clamp(prob,0.05,0.6);
      if(Math.random()<prob){
        const hp=rand(8,18); s.health=clamp(s.health-hp,0,100);
        this._semEvent=`🪜 突发·阿鲁巴！兄弟们架着你往栏杆上"骑"，胯下生风，健康 -${hp}。`;
        logs.push(this._semEvent);
      }
    }

    this.render();

    // ---- 暴毙判定 ----
    const reveal = isCn
      ? (done)=>this.spinGpa(credits, alloc, yrLabel, logs, done, {gpaBaseCn})
      : (done)=>this.revealCoursesDE(courseData, yrLabel, logs, done);
    let after = makeup ? ()=>this.makeupDone(yrLabel) : ()=>this.yearSummary(yrLabel, logs);
    // 美女女友"买衣服"攻略事件插在结算前
    if(this._pendingMeinuDress){ this._pendingMeinuDress=false; const nx=after; after=()=>this.meinuDressEvent(nx); }
    if(s.health<=12 && Math.random()<0.5) return reveal(()=>this.endingDeath());
    if(s.health<=0) return this.endingDeath();
    reveal(after);
  },

  /* 德国：逐门公布成绩（紧张感）+ 学期/总平均 */
  revealCoursesDE(data, yrLabel, logs, done){
    this._scene="studyYear";
    const s=this.s;
    const rows=data.courses.map((c,i)=>
      `<div class="crow" id="crow_${i}"><span class="cn">${c.name}（${c.cr}学分）</span>`+
      `<span class="cg" id="cg_${i}">…</span></div>`).join("");
    D({loc:`${s.school} · ${yrLabel} · 成绩公布`,
      lines:[["prof2","成绩出来了，一门一门看吧——1.0 最佳，5.0 挂科，别紧张。",{big:true}]],
      extra:`<div class="grades">${rows}<div class="gsum" id="gsum"></div></div>`,
      choices:[], anim:false});
    // 逐门揭晓
    let i=0;
    const step=()=>{
      if(i>=data.courses.length){
        const totGpa=avgGpa(s);
        document.getElementById("gsum").innerHTML=
          `<div class="respop">本学期：通过 <b style="color:var(--green)">${data.passed}</b> · 挂科 <b style="color:var(--red)">${data.failed}</b> 学分</div>`+
          `<div>本学期均绩 <b style="color:var(--gold)">${data.semGpa}</b> · 总均绩 <b style="color:var(--gold)">${totGpa}</b>（1.0 最佳 / 5.0 挂）</div>`;
        logs.push(`📊 ${yrLabel}：通过 ${data.passed}、挂科 ${data.failed} 学分，学期均绩 ${data.semGpa}，总均绩 ${totGpa}`);
        this.render();
        setTimeout(done, 1300);
        return;
      }
      const c=data.courses[i], el=document.getElementById("cg_"+i), row=document.getElementById("crow_"+i);
      if(el){
        el.innerHTML = c.pass ? `<b style="color:var(--green)">${c.grade}</b> ✅` : `<b style="color:var(--red)">${c.grade}</b> ❌挂`;
        el.classList.add("respop"); if(row) row.classList.add("lit");
      }
      i++; setTimeout(step, 650);
    };
    setTimeout(step, 700);
  },

  /* 绩点轮盘（中国百分制）：少学分+多时间 → 更高绩点 */
  spinGpa(credits, alloc, yrLabel, logs, done, opts){
    const s=this.s;
    const isCn = s.gpaSys==="cn100";
    const studyW=alloc.study/100, load=(credits-20)/40;
    const xb=(s.xuexi||0);
    let gpa;
    if(isCn){
      const base = (opts&&opts.gpaBaseCn!=null) ? opts.gpaBaseCn : (55 + studyW*40 - load*22 + xb*0.12);
      gpa = Math.round(clamp(base + rand(-6,8), 30, 98));
    }else{
      gpa = Math.round(clamp(2.0 + studyW*2.6 - load*1.4 + xb*0.008 + (Math.random()*0.6-0.3), 0.5, 5.0)*10)/10;
    }
    s.gpaTotal+=gpa; s.gpaCount++; s.lastGpa=gpa;

    // 轮盘扇区
    const segs = isCn
      ? [40,50,55,60,65,72,80,88,95]
      : [1.0,1.7,2.3,3.0,3.5,4.0,4.5,5.0];
    // 找最接近目标的扇区索引作为落点
    let idx=0,best=1e9;
    segs.forEach((v,i)=>{const d=Math.abs(v-gpa); if(d<best){best=d;idx=i;}});

    const advisor = isCn ? "prof" : "prof2";
    D({
      loc:`${s.school} · ${yrLabel} · 绩点开奖`,
      lines:[[advisor,"成绩出来了。来，转盘见真章——命运的绩点轮盘，转起来！🎡"]],
      extra:`<div class="wheelwrap">
        <div class="wheel-cont">
          <div class="pointer"></div>
          <canvas id="wheel" width="260" height="260"></canvas>
        </div>
        <div id="wheelRes" class="hint">旋转中…</div>
      </div>`,
      choices:[]
    });
    drawWheel("wheel", segs, isCn);
    // 旋转到目标扇区
    const n=segs.length, seg=360/n;
    const targetAngle = 360*6 + (360 - (idx*seg + seg/2)); // 指针在顶部
    const cv=document.getElementById("wheel");
    requestAnimationFrame(()=>{ cv.style.transform=`rotate(${targetAngle}deg)`; });
    setTimeout(()=>{
      const txt = isCn ? `绩点 <b style="color:var(--gold);font-size:20px">${gpa}</b> 分` : `绩点 <b style="color:var(--gold);font-size:20px">${gpa}</b> / 5.0`;
      document.getElementById("wheelRes").innerHTML=`<span class="respop">🎉 ${txt}</span>`;

      // 奖学金
      const E=this.econ();
      const good = isCn ? gpa>=80 : gpa>=4.0;
      const mid  = isCn ? gpa>=70 : gpa>=3.3;
      if(good){ const sch=E.schHi; s.money+=sch; logs.push(`🏆 绩点优异，奖学金 +${E.sym}${fmt(sch)}！`); }
      else if(mid){ const sch=E.schMid; s.money+=sch; logs.push(`🥈 绩点良好，奖学金 +${E.sym}${fmt(sch)}`); }
      logs.push(isCn?`📊 本学年绩点：${gpa} 分`:`📊 本学年绩点：${gpa}/5.0`);
      this.render();
      setTimeout(done, 1100);
    }, 4700);
  },

  /* 学年总结 + 退学/继续/毕业 判定 */
  yearSummary(yrLabel, logs){
    this._scene="studyYear";
    const s=this.s;
    const isCn=s.gpaSys==="cn100";

    // 学期数值变化 → 直接显示在顶部仪表盘（箭头+增减）
    if(this._semSnap){
      const cur=this._snapStats(), d={};
      for(const k in cur){ const diff=cur[k]-this._semSnap[k]; if(diff) d[k]=diff; }
      this._semSnap=null; this._showDeltas(d);
    }

    const gpaFail = isCn ? (s.lastGpa<60) : (s.lastGpa>=4.5);
    const failOut = s.creditsFailed>30;
    const advisor = isCn ? "prof" : "prof2";
    // 可申诉的德国院校
    const canAppeal = (s.lineType==="braunschweig"||s.lineType==="stuttgart"||s.lineType==="london");

    if(failOut || gpaFail){
      const reason = failOut ? `累计挂科 ${s.creditsFailed} 学分（超过 30）` : `本学期均绩 ${s.lastGpa}（≥4.5 视为不及格）`;
      const choices=[];
      if(canAppeal) choices.push({t:"⚖️ 提起申诉", sub:"也许还有补救的机会", cls:"gold", f:()=>this.appeal()});
      choices.push({t:"…接受退学", cls:"danger", f:()=>this.afterSchoolFail()});
      return D({loc:`${s.school} · ${yrLabel} 结算`, tw:true,
        lines:[[advisor,`同学……${reason}，按规定要劝退了。`,{big:true}],
               ["you", canAppeal?"不行，我得申诉！":"……就这么结束了。","think"]],
        choices});
    }

    // 毕业条件：必须修满目标学分（90/120）→ 自动毕业，直接进入下一步走向
    const goal=s.creditGoal;
    const canGraduate = s.creditsEarned>=goal;

    const lines=[["env","📊 本学期各项变化见顶部仪表盘 ↑（绿色＋为上升、红色－为下降）"]];
    if(this._semEvent){ lines.push(["env", this._semEvent]); this._semEvent=null; }
    // 女友事件
    if(this._gfEvent==="found"){ lines.push(["gf","在一起吧～以后请多关照！",{big:true}],["env","💕 你脱单了！情商面板已切换为「女友好感」。把妹的时间与金钱别省，否则会闹分手。"]); }
    else if(this._gfEvent==="warn"){ lines.push(["gf","你最近是不是不太上心？我们好好谈谈。",{big:true}],["env","⚠️ 吵架预警：女友好感跌破 60！再不上心就要分手了。"]); }
    else if(this._gfEvent==="breakup"){ lines.push(["gf","算了……我们还是分开吧。",{big:true}],["env","💔 女友好感跌破 50，你们分手了。面板已恢复为「情商」。"]); }
    else if(this._gfEvent==="netbust"){ lines.push(["env","💔 你那位「网恋女友」突然失联——账号注销、电话停机。你愣在原地，才回过味来。面板已恢复为「情商」。"]); }
    this._gfEvent=null;

    if(canGraduate){
      // 修够学分 → 自动毕业
      lines.push([advisor,`恭喜！已修满 ${s.creditsEarned}/${goal} 学分，平均绩点 ${avgGpa(s)}——你毕业啦！`,{big:true}]);
      return D({loc:`${s.school} · ${yrLabel} 结算`, lines,
        choices:[{t:"🎓 毕业，看看接下来的路", cls:"gold", f:()=>this.graduate()}]});
    }
    lines.push([advisor, `平均绩点 ${avgGpa(s)}，已修 ${s.creditsEarned}/${goal} 学分。继续加油！`]);
    D({loc:`${s.school} · ${yrLabel} 结算`, lines,
      choices:[
        {t:`📚 继续读（升入下一学期）`, sub:`距毕业还差 ${Math.max(0,goal-s.creditsEarned)} 学分`, cls:"gold", f:()=>this.beginYear()},
        {t:"🚪 主动退学", sub:"放弃学业", cls:"danger", f:()=>this.confirmDropout()}
      ]});
  },

  confirmDropout(){
    D({loc:"抉择",
      lines:[["bro","真要退学啊？退了可就回不来了，再想想？"],
             ["you","让我再确认一下……","think"]],
      choices:[{t:"确认退学", cls:"danger", f:()=>this.afterSchoolFail()},
               {t:"↩ 再读一年", f:()=>this.studyYear()}]});
  },

  /* ===================== 退学申诉 + 补课学期 ===================== */
  appeal(){
    const s=this.s; const base=0.4;
    const choices=[];
    if(s.hasBaton) choices.push({t:"🥢 带甩棍去申诉", sub:`成功率 ${Math.round((base+0.35)*100)}%`, cls:"gold", f:()=>this._appealResolve(base+0.35)});
    choices.push({t:"📄 据理力争（正常申诉）", sub:`成功率 ${Math.round(base*100)}%`, f:()=>this._appealResolve(base)});
    choices.push({t:"…算了，接受退学", cls:"danger", f:()=>this.afterSchoolFail()});
    D({loc:"⚖️ 退学申诉", tw:true,
      lines:[
        ["env","你决定向校方申诉，争取一个补救机会。"],
        ["you", s.hasBaton?"实在不行……我揣上甩棍去'讲讲道理'，成功率能高些。":"据理力争，赌一个补课的机会。","think"],
      ],
      choices});
  },
  _appealResolve(prob){
    if(Math.random()<prob){
      D({loc:"⚖️ 申诉成功", tw:true,
        lines:[["prof2","……鉴于你的特殊情况，给你一个补课学期，把挂掉的学分补回来！",{big:true}],
               ["you","谢天谢地！这次必须全过！","think"]],
        choices:[{t:"📚 进入补课学期", cls:"gold", f:()=>this.makeupSemester()}]});
    } else {
      D({loc:"⚖️ 申诉失败", tw:true,
        lines:[["prof2","申诉驳回，规定就是规定。",{big:true}],["you","……认了。","think"]],
        choices:[{t:"…接受退学", cls:"danger", f:()=>this.afterSchoolFail()}]});
    }
  },
  makeupSemester(){
    const s=this.s;
    s.yearInSchool++;
    const retake=Math.max(4, Math.min(80, s.creditsFailed));
    this.allocateYear(retake, "补课学期", true);
  },
  makeupDone(yrLabel){
    this._scene="studyYear";
    const s=this.s;
    if(this._semSnap){ const cur=this._snapStats(), d={}; for(const k in cur){ const diff=cur[k]-this._semSnap[k]; if(diff) d[k]=diff; } this._semSnap=null; this._showDeltas(d); }
    const grad=s.creditsEarned>=s.creditGoal;
    const choices = grad
      ? [{t:"🎓 毕业！", cls:"gold", f:()=>this.graduate()}]
      : [{t:"📚 回到正常学期", cls:"gold", f:()=>this.beginYear()},
         {t:"🚪 退学", cls:"danger", f:()=>this.confirmDropout()}];
    D({loc:"📚 补课学期 · 结算",
      lines:[
        ["env","📊 数值变化见顶部仪表盘 ↑"],
        ["prof2", `补课结束，累计挂科降到 ${s.creditsFailed}/30。${grad?"学分也修满了！":""}`,{big:true}],
        ["you", s.creditsFailed>30?"还是太多……":"缓过来了，继续！","think"],
      ],
      choices});
  },

  /* 德国第一学年：助学贷款（最多1万欧，10%/年） */
  offerLoan(credits, yrLabel, makeup){
    const s=this.s; const room=10000-s.loan;
    D({loc:"🏦 助学贷款", tw:true,
      lines:[
        ["env","你这学期的钱撑不到学期末。学校提供「助学贷款」——最多 €10,000，年息 10%。"],
        ["you",`已欠 €${fmt(s.loan)}，还能再借 €${fmt(room)}。借多少？`,"think"],
      ],
      extra:`<div class="credit-pick">
        <div class="big"><span id="lv">${Math.min(5000,room)}</span><small style="font-size:16px;color:var(--dim)"> €</small></div>
        <input type="range" id="loanAmt" min="0" max="${room}" step="500" value="${Math.min(5000,room)}"
          oninput="document.getElementById('lv').textContent=this.value">
        <div class="hint">借款立即到账，每年滚 10% 利息；以后可在分配界面还款</div>
      </div>`,
      choices:[
        {t:"🏦 确认借款", cls:"gold", f:()=>{
          const amt=Math.min(room, Math.max(0, Math.round(+document.getElementById("loanAmt").value||0)));
          s.money+=amt; s.loan+=amt; this.render();
          this.toast(`已借入 €${fmt(amt)}（欠款 €${fmt(s.loan)}）`);
          this.allocateYear(credits, yrLabel, makeup);
        }},
        {t:"↩ 不借，回去重新分配", f:()=>this.allocateYear(credits, yrLabel, makeup)}
      ]});
  },

  /* 本金不足：助学金 / 助学贷款 / 高利贷 / 搏一搏 */
  cantAfford(credits, yrLabel, makeup){
    const s=this.s; const E=this.econ();
    const back=()=>this.allocateYear(credits, yrLabel, makeup);
    const choices=[];
    if(s.hasGf && s.gfType==="fujie"){
      const lend=Math.round(E.live*6);
      choices.push({t:"💎 找富姐女友周转", sub:`无息借 ${E.sym}${fmt(lend)}（随时还）`, cls:"gold", f:()=>{
        s.gfLoan=(s.gfLoan||0)+lend; s.money+=lend; this.render();
        this.toast(`富姐借你 ${E.sym}${fmt(lend)}（无息）`); back();
      }});
    }
    if(s.cur==="EUR" && s.yearInSchool<=1 && s.loan<10000)
      choices.push({t:"🏦 申请助学贷款", sub:"最多 €1万 · 年息10%", cls:"gold", f:()=>this.offerLoan(credits,yrLabel,makeup)});
    if(!s.flags["grant_"+s.school]){
      const grant=Math.round(E.live*4);
      choices.push({t:"🎓 申请助学金", sub:`一次性补助 ${E.sym}${fmt(grant)}（每校限一次）`, f:()=>{
        s.flags["grant_"+s.school]=true; s.money+=grant; this.render(); this.toast(`助学金 +${E.sym}${fmt(grant)}`); back();
      }});
    }
    choices.push({t:"💸 借高利贷", sub:"立刻到账 · 年息30% 利滚利", cls:"danger", f:()=>this.loanShark(credits,yrLabel,makeup)});
    choices.push({t:"🎲 搏一搏（赌一把）", sub:"斗地主 / 赌球 / Polymarket", f:()=>this.gambleMenu(credits,yrLabel,makeup)});
    choices.push({t:"↩ 返回重新分配", f:back});
    D({loc:"💰 钱不够了", tw:true,
      lines:[["env","按当前安排，这学期撑不到学期末。"],["you","得想办法弄点钱……正道、歪道，还是赌一把？","think"]],
      choices});
  },
  loanShark(credits, yrLabel, makeup){
    const s=this.s; const E=this.econ(); const cap=Math.round(E.live*12);
    D({loc:"💸 高利贷", tw:true,
      lines:[["env","巷子口的「金主」叼着烟打量你：借钱可以，年息三成，利滚利——还不上，后果自负。"],["you","三成利……是真狠。但眼下也没辙了。","think"]],
      extra:`<div class="credit-pick">
        <div class="big"><span id="lsv">${Math.min(3000,cap)}</span><small style="font-size:16px;color:var(--dim)"> ${E.sym}</small></div>
        <input type="range" id="lsAmt" min="0" max="${cap}" step="500" value="${Math.min(3000,cap)}"
          oninput="document.getElementById('lsv').textContent=this.value">
        <div class="hint">立刻到账，每年滚 30% 利息（比助学贷款狠得多）</div>
      </div>`,
      choices:[
        {t:"💸 确认借款", cls:"danger", f:()=>{
          const amt=Math.min(cap, Math.max(0, Math.round(+document.getElementById("lsAmt").value||0)));
          s.money+=amt; s.shark=(s.shark||0)+amt; this.render();
          this.toast(`高利贷 +${E.sym}${fmt(amt)}（欠 ${E.sym}${fmt(s.shark)}）`);
          this.allocateYear(credits, yrLabel, makeup);
        }},
        {t:"↩ 算了", f:()=>this.cantAfford(credits, yrLabel, makeup)}
      ]});
  },
  gambleMenu(credits, yrLabel, makeup){
    const s=this.s;
    const games=[
      {k:"ddz", nm:"🃏 斗地主", win:0.5,  mult:2.0, desc:"50% 翻倍"},
      {k:"ball",nm:"⚽ 赌球",   win:0.45, mult:2.2, desc:"45% 拿 2.2 倍"},
      {k:"poly",nm:"📊 Polymarket 下注", win:0.4, mult:2.6, desc:"40% 拿 2.6 倍"},
    ];
    D({loc:"🎲 搏一搏", tw:true,
      lines:[["env",`手头还有 ${cursym()}${fmt(s.money)}。富贵险中求，押哪个？`]],
      choices: games.map(g=>({t:`${g.nm}`, sub:g.desc, f:()=>this.gamblePlay(g, credits, yrLabel, makeup)}))
        .concat([{t:"↩ 不赌了", f:()=>this.cantAfford(credits, yrLabel, makeup)}])});
  },
  gamblePlay(g, credits, yrLabel, makeup){
    const s=this.s; const max=s.money;
    D({loc:`🎲 ${g.nm}`,
      lines:[["env",`${g.desc}。押多少？输了血本无归，赢了乘 ${g.mult}。`]],
      extra:`<div class="credit-pick">
        <div class="big"><span id="gbv">${Math.round(max/2)}</span><small style="font-size:16px;color:var(--dim)"> ${cursym()}</small></div>
        <input type="range" id="gbAmt" min="0" max="${max}" step="${Math.max(100,Math.round(max/40))}" value="${Math.round(max/2)}"
          oninput="document.getElementById('gbv').textContent=this.value">
      </div>`,
      choices:[
        {t:"🎲 梭哈！", cls:"gold", f:()=>{
          const bet=Math.min(max, Math.max(0, Math.round(+document.getElementById("gbAmt").value||0)));
          const win=Math.random()<g.win;
          if(win){ const gain=Math.round(bet*(g.mult-1)); s.money+=gain; this.render();
            D({loc:`🎲 ${g.nm} · 赢了！`, tw:true, lines:[["env",`🎉 赢了！+${cursym()}${fmt(gain)}（本金 ${cursym()}${fmt(bet)} ×${g.mult}）`],["you","富贵险中求！","think"]],
              choices:[{t:"↩ 回去分配", cls:"gold", f:()=>this.allocateYear(credits, yrLabel, makeup)},{t:"🎲 再赌一把", f:()=>this.gambleMenu(credits, yrLabel, makeup)}]});
          } else { s.money=Math.max(0,s.money-bet); this.render();
            D({loc:`🎲 ${g.nm} · 输了`, tw:true, lines:[["env",`💸 输光本金 -${cursym()}${fmt(bet)}。`],["you","……下次一定。","think"]],
              choices:[{t:"↩ 回去想办法", cls:"gold", f:()=>this.cantAfford(credits, yrLabel, makeup)}]});

  /* ===================== 学期初活动 ===================== */
  // 本学期已选活动的总费用（每周20€×周数×次数，开学时扣）& 精力消耗
  activityCost(){ return (this.s.semActivities||[]).length * ACT_WEEKS * ACT_WEEKLY; },
  activityEnergy(){ return (this.s.semActivities||[]).length * 12; },
  semesterStart(){
    this._scene="semesterStart";
    const s=this.s; const E=this.econ(); const f=s.semFlags||(s.semFlags={});
    const per=ACT_WEEKS*ACT_WEEKLY;
    const picked=(s.semActivities||[]).length;
    const lines=[["bro",`${this.yrLabelFor(s.yearInSchool+1)}开学前，搞点活动？兄弟局每周一次、每次 ${E.sym}${ACT_WEEKLY}，整学期 ${E.sym}${fmt(per)}，开学时一并扣，还要费精力。`,{big:true}]];
    if(picked) lines.push(["env",`本学期已约：${s.semActivities.map(k=>k==="hot"?"火锅":"烧烤").join("、")}（开学扣 ${E.sym}${fmt(this.activityCost())}，耗精力 ${this.activityEnergy()}）`]);
    const choices=[];
    if(!f.huoguo)  choices.push({t:`🍲 兄弟火锅（${E.sym}${fmt(per)}/学期）`, sub:"兄弟义气↑ · 可能结识猛人", f:()=>this.doActivity("hot")});
    if(!f.shaokao) choices.push({t:`🍢 兄弟烧烤（${E.sym}${fmt(per)}/学期）`, sub:"兄弟义气↑ · 可能结识贵人", f:()=>this.doActivity("bbq")});
    if(s.canStock && !f.stock) choices.push({t:"📈 炒股投资", sub:"高风险高回报", f:()=>this.stockGame(()=>this.semesterStart())});
    if(Object.keys(s.friends).length>0) choices.push({t:"🤝 请朋友吃饭（结交）", sub:"花钱涨兄弟义气", f:()=>this.befriendScreen(()=>this.semesterStart())});
    choices.push({t:"📚 开始上课", cls:"gold", f:()=>this.studyYear()});
    D({loc:`${s.school} · 学期初`, lines, choices});
  },

  // 选了火锅/烧烤后，先决定怎么备菜（风险活动）
  doActivity(kind){
    const nm=kind==="hot"?"火锅":"烧烤";
    D({loc:`🍲 兄弟${nm} · 备菜`,
      lines:[["bro",`整${nm}！分头采购——买对了大家高兴，买错了可要挨一顿喷。你去干啥？`,{big:true}]],
      choices:[
        {t:"🥩 去 Kaufland 买肉", sub:"风险 · 费精力", f:()=>this._shop(kind,"跑去 Kaufland 抢特价肉")},
        {t:"🥬 去亚洲超市买菜", sub:"风险 · 费精力", f:()=>this._shop(kind,"钻进亚超淘食材")},
        {t:"🥤 出门买饮料", sub:"风险 · 费精力", f:()=>this._shop(kind,"扛回一堆肥宅快乐水")},
        {t:"🛋️ 懒得动了", sub:"不担风险也无加成", f:()=>this._activityOutcome(kind, 0, null)},
      ]});
  },
  _shop(kind, what){
    const s=this.s;
    const succ = Math.random() < clamp(0.5 + s.eq/250 + s.bro/400, 0.35, 0.85);
    const delta = succ ? rand(4,8) : -rand(3,6);
    this._activityOutcome(kind, delta, {what, succ});
  },
  _activityOutcome(kind, shopBro, shop){
    const s=this.s; const f=s.semFlags; const nm=kind==="hot"?"火锅":"烧烤";
    f[kind==="hot"?"huoguo":"shaokao"]=true;
    s.semActivities=s.semActivities||[]; s.semActivities.push(kind);
    const baseBro=rand(4,8);
    const broGain=this.addStat("bro", baseBro+(shopBro||0)); this.render();
    const lines=[];
    if(shop) lines.push(["env", shop.succ ? `你${shop.what}，办得地道，兄弟们直竖大拇指！（兄弟义气 +${shopBro}）`
                                          : `你${shop.what}，结果买错了被一顿猛喷……（兄弟义气 ${shopBro}）`]);
    else lines.push(["env","你懒得动弹，蹭了顿现成的。"]);
    // 认识新人：兄弟义气越高、人脉越高，越容易
    const pool = kind==="hot" ? ["xuzi","feizi","yong"] : ["kong","garf","jenny"];
    const unmet = pool.filter(id=>!s.friends[id]);
    const meetProb = clamp(0.3 + s.bro/160 + s.renmai/220, 0.3, 0.95);
    if(unmet.length && Math.random()<meetProb) return this.meetPerson(unmet[rand(0,unmet.length-1)], nm, lines);
    lines.push(["env",`兄弟${nm}下肚，兄弟义气 +${broGain}。`], ["you","下次再聚！","think"]);
    D({loc:`${s.school} · 兄弟${nm}`, lines, choices:[{t:"↩ 返回", f:()=>this.semesterStart()}]});
  },
  meetPerson(id, nm, lines){
    const s=this.s; const p=PEOPLE[id];
    s.friends[id]={fav:10};
    for(const k in p.get){ this.addStat(k, p.get[k]); }
    this.render();
    lines=lines||[];

  stockResult(staked, delta, gamble, back){
    const s=this.s;
    s.money=Math.max(0, s.money+delta);
    if(delta<0) s.stockLoss += (-delta)*RATES[s.cur];
    this.render();
    const good=delta>=0;
    D({loc:"📈 炒股 · 结果",
      lines:[
        ["env", gamble ? (good?`🎉 翻倍！押 ${cursym()}${fmt(staked)} → 赚 ${cursym()}${fmt(delta)}！`
                              :`💥 清零！押 ${cursym()}${fmt(staked)} → 亏 ${cursym()}${fmt(-delta)}。`)
                       : `📊 定投纳指 ${cursym()}${fmt(staked)}，到手收益 +${cursym()}${fmt(delta)}。`],
        good?["you","钱生钱，爽！","think"]:["you","愿赌服输……肉疼。","think"],
      ],
      extra:`<div class="reel respop">${good?"📈 +":"📉 -"}${cursym()}${fmt(Math.abs(delta))}</div>`,
      choices:[{t:"↩ 返回", f:back}]});

    s.money = Math.max(0, s.money - s.costY); logs.push(`🏠 上海生活开销 -¥${fmt(s.costY)}`);
    if(s.job==="quant"){ const d=rand(6,14); s.health=clamp(s.health-d,0,100); logs.push(`🩺 高强度工作，健康 -${d}`); }
    else { const d=rand(1,4); s.health=clamp(s.health-d,0,100); }
    this.render();
    if(s.health<=0) return this.endingDeath();
    if(s.job==="car" && s.shYears>=3 && Math.random() < (s.shYears-2)*0.3) return this.endingShanghaiCar();
    if(this.isBuffett()) return this.endingBuffett();
    if(s.money<=0) return this.endingDelivery("存款见底");
    if(s.age>=35) return this.endingDelivery("35 岁大限已到，仍未实现财务自由");
    if(s.hasGf && !s.flags.londonOffered && (s.stockLoss>=160000 || s.shYears>=2)){
      s.flags.londonOffered=true; return this.londonDecision();

    D({loc:`🌃 上海 · 第${s.shYears}年小结`,

    if(s.gfFavor<60) this.toast("⚠️ 女友好感跌破 60，吵架预警！");

  /* 战斗系统：横屏=玩手游(攻击)，竖屏=放抖音(回血)              */
  /* ========================================================= */
  battle(cfg){
    this._scene=null;
    const s=this.s;
    const me={hp:100,max:100};
    const en={hp:cfg.hp,max:cfg.hp};
    const log=[];
    let busy=false, ended=false;

    const render=()=>{
      const landscape = isLandscape();
      const fx=this._fx; this._fx=null;
      const enFloat = fx&&fx.target==="enemy" ? `<div class="dmgfloat down">-${fx.dmg}</div>` : "";
      const meFloat = fx&&fx.target==="me" ? `<div class="dmgfloat ${fx.heal?'up':'down'}">${fx.heal?'+':'-'}${fx.dmg}</div>` : "";
      sceneRaw(`<div class="loc">⚔️ 战斗</div>
        <div id="battle">
          <div class="fighter ${fx&&fx.target==='enemy'?'shake':''}">
            ${enFloat}
            <div class="top"><span style="font-size:18px">${cfg.emoji} ${cfg.name}</span><span>${en.hp}/${en.max}</span></div>
            <div class="hpbar"><i style="width:${en.hp/en.max*100}%"></i></div>
          </div>
          <div class="fighter ${fx&&fx.target==='me'&&!fx.heal?'shake':''}">
            ${meFloat}
            <div class="top"><span>🧑 你${s.hasBaton?" 🥢":""}</span><span>${me.hp}/${me.max}</span></div>
            <div class="hpbar"><i style="width:${me.hp/me.max*100}%;background:linear-gradient(90deg,#3fb950,#58a6ff)"></i></div>
          </div>
          <div class="orient">📱 当前：<b>${landscape?"横屏 → 玩手游（攻击）":"竖屏 → 放抖音（回血/降攻）"}</b><br>
            <small>把手机${landscape?"竖过来可切换为防御":"横过来可切换为攻击"}，或直接点下方按钮</small>
          </div>
          <button class="bigbtn" id="actBtn">${landscape?"🎮 横屏·玩手游 出击！":"📲 竖屏·放抖音 回血！"}</button>
          <div class="blog" id="blog">${log.slice(-6).map(l=>"· "+l).join("<br>")||"开打！"}</div>
        </div>`, [], {anim:false});
      document.getElementById("actBtn").onclick=act;
    };

    const enemyTurn=()=>{
      const dmg=Math.round(rand(cfg.atk[0],cfg.atk[1]) * (cfg.rigged?1.3:1));
      me.hp=Math.max(0,me.hp-dmg);
      this._fx={target:"me", dmg:dmg};
      log.push(`${cfg.name} 反击，你 -${dmg}`);
      if(me.hp<=0){ ended=true; render();
        setTimeout(()=>cfg.onLose&&cfg.onLose(),700); return; }
      busy=false; render();
    };

    const act=()=>{
      if(busy||ended) return; busy=true;
      if(isLandscape()){
        // 攻击
        let dmg=rand(8,16) + (s.hasBaton?rand(6,12):0);
        if(cfg.rigged) dmg=Math.round(dmg*0.55); // 序幕削弱：打不过
        en.hp=Math.max(0,en.hp-dmg);
        this._fx={target:"enemy", dmg:dmg};
        log.push(`你${s.hasBaton?"抡起甩棍":"挥拳"}，造成 ${dmg} 伤害`);
        render();
        if(en.hp<=0){ ended=true; setTimeout(()=>cfg.onWin&&cfg.onWin(),700); return; }
        setTimeout(enemyTurn,500);
      }else{
        // 回血/降攻
        const heal=rand(6,14);
        me.hp=Math.min(me.max,me.hp+heal);
        this._fx={target:"me", dmg:heal, heal:true};
        log.push(`你刷抖音回了口气，+${heal} 状态`);
        render();
        setTimeout(enemyTurn,500);
      }
    };

    this._battleResize=render;
    render();
  },
};

/* ---------------- 工具函数 ---------------- */
function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function fmt(n){return Math.round(n).toLocaleString("en-US");}
function cursym(){return ({CNY:"¥",EUR:"€",GBP:"£"})[Game.s&&Game.s.cur]||"¥";}
function mny(n){return cursym()+fmt(n);}
function avgGpa(s){ if(!s.gpaCount) return s.gpaSys==="de5"?"0.0":"0";
  const a=s.gpaTotal/s.gpaCount; return s.gpaSys==="de5"?a.toFixed(1):Math.round(a); }
function isLandscape(){
  if(window.matchMedia) return window.matchMedia("(orientation: landscape)").matches;
  return window.innerWidth>window.innerHeight;
}

/* 渲染一个场景：内容 + 选项按钮 */
function sceneRaw(html, choices, opts){
  opts=opts||{};
  const scr=document.getElementById("screen");
  let btns="";
  if(choices&&choices.length){
    btns=`<div class="choices">`+choices.map((c,i)=>
      `<button class="choice ${c.cls||''}" ${c.id?`id="${c.id}"`:''} data-i="${i}">${c.t}${c.sub?`<span class="sub">${c.sub}</span>`:''}</button>`
    ).join("")+`</div>`;
  }
  scr.innerHTML=html+btns;
  scr.scrollTop=0; window.scrollTo(0,0);
  // 入场动画：顶层元素依次淡入上滑（战斗等高频刷新场景跳过）
  if(opts.anim!==false){
    let i=0;
    const stag=el=>{ el.classList.add("anim-in"); el.style.animationDelay=(i*0.07)+"s"; i++; };
    [...scr.children].forEach(el=>{
      if(el.classList.contains("chat")||el.classList.contains("choices")) [...el.children].forEach(stag);
      else stag(el);
    });
  }
  if(choices) choices.forEach((c,i)=>{
    const b=scr.querySelector(`button[data-i="${i}"]`);
    if(b) b.onclick=()=>c.f();
  });
}

function renderLine(l){
