<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>沧州风云</title>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel2:#1c2230; --line:#2a3340;
    --txt:#e6edf3; --dim:#8b98a8; --gold:#ffcc4d; --red:#ff5b5b;
    --green:#3fb950; --blue:#58a6ff; --pink:#ff8ecb; --purple:#bc8cff;
    --accent:#ff7a3c;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
    -webkit-text-size-adjust:100%; overscroll-behavior:none;}
  body{display:flex; justify-content:center; min-height:100vh; min-height:100dvh;}
  #app{width:100%; max-width:480px; min-height:100vh; min-height:100dvh;
    background:linear-gradient(180deg,#0d1117 0%, #11151d 100%);
    display:flex; flex-direction:column; position:relative;}

  /* 顶部状态栏 */
  #topbar{position:sticky; top:0; z-index:20; background:rgba(13,17,23,.96);
    backdrop-filter:blur(8px); border-bottom:1px solid var(--line); padding:8px 10px;}
  .ach{display:flex; gap:6px; align-items:center; font-size:12px; color:var(--gold);
    font-weight:700; margin-bottom:6px; flex-wrap:wrap;}
  .ach .badge{background:var(--panel2); border:1px solid var(--line); border-radius:999px;
    padding:2px 9px; color:var(--txt); font-weight:600;}
  .stats{display:grid; grid-template-columns:repeat(3,1fr); gap:5px;}
  .stat{background:var(--panel); border:1px solid var(--line); border-radius:8px;
    padding:5px 6px; text-align:center;}
  .stat .lbl{font-size:10px; color:var(--dim); margin-bottom:2px;}
  .stat .val{font-size:13px; font-weight:700;}
  .bar{height:4px; background:#000; border-radius:3px; margin-top:3px; overflow:hidden;}
  .bar > i{display:block; height:100%; border-radius:3px; transition:width .4s;}

  /* 主区域 */
  #screen{flex:1; padding:16px 14px 24px; display:flex; flex-direction:column; gap:14px;}
  .loc{font-size:12px; letter-spacing:2px; color:var(--accent); font-weight:700;}
  h1.title{font-size:30px; margin:0; letter-spacing:6px; background:linear-gradient(90deg,#ffcc4d,#ff7a3c);
    -webkit-background-clip:text; background-clip:text; color:transparent; font-weight:900;}
  .narr{background:var(--panel); border:1px solid var(--line); border-left:3px solid var(--accent);
    border-radius:10px; padding:13px 14px; line-height:1.7; font-size:15px; white-space:pre-wrap;}
  .narr.sys{border-left-color:var(--blue); color:var(--dim); font-size:13px;}
  .narr.good{border-left-color:var(--green);}
  .narr.bad{border-left-color:var(--red);}

  .choices{display:flex; flex-direction:column; gap:10px; margin-top:4px;}
  button.choice{appearance:none; border:1px solid var(--line); background:var(--panel2);
    color:var(--txt); padding:14px; border-radius:12px; font-size:15px; font-weight:600;
    text-align:left; cursor:pointer; transition:.15s; line-height:1.4;}
  button.choice:active{transform:scale(.98); background:#283042;}
  button.choice .sub{display:block; font-size:12px; color:var(--dim); font-weight:400; margin-top:3px;}
  button.choice.gold{border-color:var(--gold); background:linear-gradient(180deg,#2a2410,#1c1a10);}
  button.choice.danger{border-color:#5a2424;}
  button.choice:disabled{opacity:.4;}

  /* 分配器 */
  .alloc{background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:12px;}
  .alloc .row{display:flex; align-items:center; gap:8px; padding:7px 0;}
  .alloc .row .nm{flex:0 0 96px; font-size:14px;}
  .alloc .row .nm small{display:block; color:var(--dim); font-size:10px;}
  .alloc input[type=range]{flex:1; accent-color:var(--accent); height:24px;}
  .alloc .amt{flex:0 0 42px; text-align:right; font-weight:700; font-size:14px; color:var(--gold);}
  .pool{display:flex; justify-content:space-between; font-size:13px; padding:6px 2px;
    border-top:1px dashed var(--line); margin-top:6px;}
  .pool b{font-size:16px;}

  /* 学分滑块 */
  .credit-pick{text-align:center; background:var(--panel); border:1px solid var(--line);
    border-radius:12px; padding:14px;}
  .credit-pick .big{font-size:44px; font-weight:900; color:var(--gold);}
  .credit-pick input[type=range]{width:100%; accent-color:var(--gold); height:30px;}

  /* 战斗 */
  #battle{display:flex; flex-direction:column; gap:12px;}
  .fighter{background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:10px;}
  .fighter .top{display:flex; justify-content:space-between; font-weight:700; font-size:14px;}
  .hpbar{height:14px; background:#000; border-radius:7px; overflow:hidden; margin-top:6px;}
  .hpbar > i{display:block; height:100%; background:linear-gradient(90deg,#ff5b5b,#ff8e3c); transition:width .35s;}
  .orient{text-align:center; font-size:13px; color:var(--dim); padding:6px;}
  .bigbtn{padding:20px; font-size:18px; font-weight:800; border-radius:14px; border:2px solid var(--accent);
    background:linear-gradient(180deg,#2a1c10,#1a1410); color:var(--gold); cursor:pointer;}
  .bigbtn:active{transform:scale(.97);}
  .blog{font-size:12px; color:var(--dim); max-height:120px; overflow-y:auto; line-height:1.6;
    background:#0a0d12; border-radius:8px; padding:8px 10px;}

  /* 轮盘 */
  .wheelwrap{display:flex; flex-direction:column; align-items:center; gap:10px;}
  .wheel-cont{position:relative; width:260px; height:260px;}
  .pointer{position:absolute; top:-4px; left:50%; transform:translateX(-50%); z-index:5;
    width:0; height:0; border-left:12px solid transparent; border-right:12px solid transparent;
    border-top:22px solid var(--gold); filter:drop-shadow(0 2px 2px #000);}
  canvas#wheel{border-radius:50%; box-shadow:0 0 0 6px var(--panel2),0 0 0 8px var(--line); transition:transform 4.5s cubic-bezier(.17,.67,.2,1);}

  .float{position:fixed; bottom:18px; left:50%; transform:translateX(-50%);
    background:#000; color:#fff; padding:9px 16px; border-radius:999px; font-size:13px;
    opacity:0; transition:.3s; z-index:50; pointer-events:none; max-width:90%;}
  .float.show{opacity:.95;}
  .delta{font-weight:700;}
  .up{color:var(--green);} .down{color:var(--red);}
  .toolbar{display:flex; gap:8px; justify-content:center; padding:6px 0 14px;}
  .toolbar button{background:transparent; border:1px solid var(--line); color:var(--dim);
    font-size:11px; padding:5px 12px; border-radius:999px; cursor:pointer;}
  .hint{font-size:11px; color:var(--dim); text-align:center;}

  /* ---------- 动画 ---------- */
  @keyframes fadeUp{from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:translateY(0);}}
  .anim-in{animation:fadeUp .42s cubic-bezier(.2,.7,.3,1) both;}

  /* 场景插画横幅 */
  .stage{position:relative; height:118px; border-radius:14px; overflow:hidden;
    border:1px solid var(--line); display:flex; align-items:center; justify-content:center; gap:14px;
    background:linear-gradient(160deg,var(--g1,#2a2440),var(--g2,#0d1117));}
  .stage::after{content:""; position:absolute; inset:0;
    background:radial-gradient(120% 90% at 50% 120%, rgba(255,255,255,.08), transparent 60%);}
  .stage .hero{font-size:54px; z-index:2; filter:drop-shadow(0 5px 7px rgba(0,0,0,.5));
    animation:bob 2.6s ease-in-out infinite;}
  .stage .hero.b{animation:bob 2.6s ease-in-out infinite .6s;}
  .stage .hero.sway{animation:sway 3.4s ease-in-out infinite;}
  .stage .hero.sm{font-size:40px;}
  .stage .sun{position:absolute; top:16px; right:24px; font-size:34px; z-index:1;
    animation:spin 16s linear infinite; filter:drop-shadow(0 0 12px #ffcc4d);}
  .pcl{position:absolute; top:-26px; z-index:1; opacity:.9; pointer-events:none;
    animation:fall linear infinite;}
  .neon{animation:flicker 2.8s steps(1) infinite;}

  @keyframes bob{0%,100%{transform:translateY(0) rotate(-2deg);}50%{transform:translateY(-9px) rotate(2deg);}}
  @keyframes sway{0%,100%{transform:rotate(-7deg);}50%{transform:rotate(7deg);}}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes fall{0%{transform:translateY(0) rotate(0);}100%{transform:translateY(150px) rotate(300deg);}}
  @keyframes flicker{0%,90%,100%{opacity:1;}92%{opacity:.4;}94%{opacity:1;}96%{opacity:.5;}}

  /* 战斗特效 */
  @keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-8px) rotate(-1deg);}
    40%{transform:translateX(7px) rotate(1deg);}60%{transform:translateX(-5px);}80%{transform:translateX(4px);}}
  .shake{animation:shake .42s;}
  @keyframes dmgpop{0%{opacity:0; transform:translate(-50%,0) scale(.6);}
    25%{opacity:1; transform:translate(-50%,-22px) scale(1.2);}
    100%{opacity:0; transform:translate(-50%,-54px) scale(1);}}
  .dmgfloat{position:absolute; left:50%; top:30%; z-index:9; font-weight:900; font-size:24px;
    pointer-events:none; animation:dmgpop 1s ease-out forwards;
    text-shadow:0 2px 4px #000;}
  .fighter{position:relative;}

  /* 轮盘结果弹出 */
  @keyframes resPop{0%{opacity:0; transform:scale(.5);}60%{transform:scale(1.25);}100%{opacity:1; transform:scale(1);}}
  .respop{display:inline-block; animation:resPop .6s ease-out both;}

  /* ---------- 对话气泡 ---------- */
  .chat{display:flex; flex-direction:column; gap:11px;}
  .msg{display:flex; gap:8px; align-items:flex-start;}
  .msg.right{flex-direction:row-reverse;}
  .msg .face{flex:0 0 40px; width:40px; height:40px; border-radius:50%;
    background:var(--panel2); border:1px solid var(--line); display:flex;
    align-items:center; justify-content:center; font-size:23px; box-shadow:0 2px 5px rgba(0,0,0,.3);}
  .msg .col{display:flex; flex-direction:column; max-width:80%; min-width:0;}
  .msg.right .col{align-items:flex-end;}
  .msg .who{font-size:11px; color:var(--dim); margin:0 6px 3px;}
  .msg .bub{background:var(--panel); border:1px solid var(--line); border-radius:15px;
    border-top-left-radius:5px; padding:9px 13px; line-height:1.65; font-size:15px;
    white-space:pre-wrap; word-break:break-word;}
  .msg.right .bub{background:linear-gradient(180deg,#1d3047,#15212f); border-color:#2f4a66;
    border-top-left-radius:15px; border-top-right-radius:5px;}
  .msg .bub.think{font-style:italic; color:var(--dim); border-style:dashed;}
  .msg.env{justify-content:center;}
  .msg.env .bub{background:transparent; border:none; color:var(--dim); font-style:italic;
    font-size:13px; text-align:center; padding:3px 10px;}
  .msg.end{justify-content:center;}
  .msg.end .bub{border:1px solid var(--gold); background:linear-gradient(180deg,#241f10,#15140d);
    color:var(--gold); font-weight:700; text-align:center; border-radius:12px; font-size:16px;
    letter-spacing:1px;}
  /* 立绘式大头像 */
  .msg.bigface{align-items:center;}
  .msg.bigface .face{width:62px; height:62px; font-size:36px; animation:portIn .5s cubic-bezier(.2,.8,.2,1) both;}
  .msg.bigface .bub{font-size:15.5px;}
  @keyframes portIn{0%{transform:scale(.4) translateY(10px); opacity:0;}
    60%{transform:scale(1.12);}100%{transform:scale(1); opacity:1;}}
  /* 打字光标 */
  .bub.typing::after{content:"▋"; color:var(--accent); animation:blink .7s steps(1) infinite; margin-left:1px;}
  @keyframes blink{50%{opacity:0;}}

  /* 全屏关卡过渡 */
  #trans{position:fixed; inset:0; z-index:100; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:12px; opacity:0; pointer-events:none;
    overflow:hidden; transition:opacity .4s;
    background:radial-gradient(circle at 50% 42%, rgba(20,24,32,.98), rgba(5,7,10,.995));}
  #trans.show{opacity:1; pointer-events:auto;}
  #trans .tband{position:absolute; top:50%; left:0; width:240%; height:130px;
    transform:translate(-45%,-50%) rotate(-8deg); opacity:.2;
    background:linear-gradient(90deg,transparent,var(--tc,#ffcc4d),transparent); animation:band 1.5s ease;}
  @keyframes band{0%{transform:translate(-55%,-50%) rotate(-8deg);}100%{transform:translate(5%,-50%) rotate(-8deg);}}
  #trans .temoji{font-size:84px; animation:tEmoji 1.1s cubic-bezier(.2,.8,.2,1);
    filter:drop-shadow(0 6px 14px rgba(0,0,0,.6));}
  @keyframes tEmoji{0%{transform:scale(0) rotate(-25deg); opacity:0;}
    55%{transform:scale(1.28) rotate(8deg);}100%{transform:scale(1) rotate(0); opacity:1;}}
  #trans .ttitle{font-size:30px; font-weight:900; letter-spacing:5px; color:#fff;
    text-shadow:0 0 20px var(--tc,#ffcc4d); animation:tTitle .8s ease .25s both;}
  #trans .tsub{font-size:13px; letter-spacing:3px; color:var(--tc,#ffcc4d);
    animation:tTitle .8s ease .5s both;}
  @keyframes tTitle{from{opacity:0; transform:translateY(16px);}to{opacity:1; transform:translateY(0);}}
  #trans .tskip{position:absolute; bottom:28px; font-size:11px; color:var(--dim); animation:tTitle .6s ease 1s both;}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div class="ach" id="ach"></div>
    <div class="stats" id="stats"></div>
  </div>
  <div id="screen"></div>
  <div class="toolbar">
    <button onclick="Game.save()">💾 存档</button>
    <button onclick="Game.confirmRestart()">🔄 重新开始</button>
  </div>
</div>
<div class="float" id="float"></div>

<script>
"use strict";
/* ============================ 沧州风云 ============================ */

const SAVE_KEY = "cangzhou_save_v1";
const RATE = 7.8; // 1 € ≈ 7.8 ¥

const Game = {
  s:null,

  /* ---------- 初始状态 ---------- */
  fresh(){
    return {
      // 核心数值
      age:18, money:160000, cur:"CNY", health:100,
      bro:20, eq:20, career:0,
      // 装备/外观
      hasBaton:false, hasBoots:false, hasHair:false,
      // 收藏
      studentIds:[], diplomas:[],
      // 进度
      flags:{},
      // 学业(当前学校)
      school:null, gpaSys:null, // 'cn100' | 'de5'
      creditsEarned:0, creditsFailed:0, yearInSchool:0, gpaTotal:0, gpaCount:0,
    };
  },

  /* ---------- 货币 ---------- */
  // 各币种经济参数（收入/支出按当地货币计）
  econ(){
    return this.s.cur==="EUR"
      ? {sym:"€", live:1200, workRate:16, workRand:[0,160], internRate:40, internRand:[300,1100],
         tooth:[60,400], schHi:1500, schMid:600, socUnit:130, socMax:8000, socStep:200}
      : {sym:"¥", live:2500, workRate:120, workRand:[0,800], internRate:300, internRand:[2000,8000],
         tooth:[500,2500], schHi:8000, schMid:3000, socUnit:1000, socMax:60000, socStep:1000};
  },
  toEUR(){ if(this.s.cur==="CNY"){ this.s.money=Math.round(this.s.money/RATE); this.s.cur="EUR"; } },
  toCNY(){ if(this.s.cur==="EUR"){ this.s.money=Math.round(this.s.money*RATE); this.s.cur="CNY"; } },

  /* ---------- 全屏关卡过渡动画 ---------- */
  transition(o, done){
    let t=document.getElementById("trans");
    if(!t){ t=document.createElement("div"); t.id="trans"; document.getElementById("app").appendChild(t); }
    t.style.setProperty("--tc", o.color||"#ffcc4d");
    t.innerHTML=`<div class="tband"></div>
      <div class="temoji">${o.emoji||"🏁"}</div>
      <div class="ttitle">${o.title}</div>
      ${o.sub?`<div class="tsub">${o.sub}</div>`:""}
      <div class="tskip">轻触跳过</div>`;
    void t.offsetWidth; t.classList.add("show");
    let finished=false;
    const end=()=>{ if(finished)return; finished=true; clearTimeout(this._transTimer);
      t.classList.remove("show"); t.removeEventListener("click", end);
      setTimeout(()=>{ if(done)done(); }, 420); };
    t.addEventListener("click", end);
    this._transTimer=setTimeout(end, o.hold||1800);
  },

  start(){
    this.s = this.fresh();
    this.render();
    this.sceneCangzhou();
  },

  /* ---------- 存读档 ---------- */
  save(){ try{ localStorage.setItem(SAVE_KEY, JSON.stringify({s:this.s, scene:this._scene})); this.toast("已存档 ✓"); }catch(e){ this.toast("存档失败"); } },
  load(){
    try{
      const d = JSON.parse(localStorage.getItem(SAVE_KEY));
      if(d&&d.s){ this.s=d.s; this.render(); (this[d.scene]||this.sceneCangzhou).call(this); return true; }
    }catch(e){}
    return false;
  },
  confirmRestart(){
    D({loc:"系统",
      lines:[["you","要把这一生推倒重来吗？当前进度会全部清空。","think"]],
      choices:[{t:"💀 重开（厂狗の轮回）",cls:"danger",f:()=>{localStorage.removeItem(SAVE_KEY); Game.start();}},
       {t:"↩ 再想想",f:()=>{ (Game[Game._scene]||Game.sceneCangzhou).call(Game); }}]});
  },

  /* ---------- 渲染状态栏 ---------- */
  render(){
    const s=this.s;
    document.getElementById("ach").innerHTML =
      `🏮 沧州风云 <span class="badge">🎓 毕业证 ${s.diplomas.length}</span>`+
      `<span class="badge">🪪 学生证 ${s.studentIds.length}</span>`+
      (s.hasBaton?`<span class="badge">🥢 甩棍</span>`:``)+
      (s.hasBoots?`<span class="badge">🥾 切尔西靴</span>`:``)+
      (s.hasHair?`<span class="badge">💇 大背头</span>`:``);

    const bar=(v,max,c)=>`<div class="bar"><i style="width:${Math.max(0,Math.min(100,v/max*100))}%;background:${c}"></i></div>`;
    const st=[
      ["年龄", s.age+"岁", ""],
      ["金钱", cursym()+fmt(s.money), ""],
      ["健康", s.health, bar(s.health,100,"var(--green)")],
      ["兄弟好感", s.bro, bar(s.bro,100,"var(--gold)")],
      ["情商", s.eq, bar(s.eq,100,"var(--blue)")],
      ["事业度", s.career, bar(s.career,100,"var(--purple)")],
    ];
    document.getElementById("stats").innerHTML = st.map(([l,v,b])=>
      `<div class="stat"><div class="lbl">${l}</div><div class="val">${v}</div>${b}</div>`).join("");
  },

  /* ---------- 数值变动 + 飘字 ---------- */
  change(obj){
    const names={money:"金钱",health:"健康",bro:"兄弟好感",eq:"情商",career:"事业度",age:"年龄"};
    const msgs=[];
    for(const k in obj){
      this.s[k]=(this.s[k]||0)+obj[k];
      if(k!=="money"&&k!=="age") this.s[k]=Math.max(0,Math.min(100,this.s[k]));
      if(this.s.money<0) this.s.money=0;
      const sign=obj[k]>=0?"+":"";
      const v = k==="money"? (obj[k]>=0?"+":"-")+cursym()+fmt(Math.abs(obj[k])) : sign+obj[k];
      msgs.push(`<span class="${obj[k]>=0?'up':'down'}">${names[k]||k} ${v}</span>`);
    }
    this.render();
    if(msgs.length) this.toast(msgs.join("　"),true);
  },

  toast(html,html2){
    const f=document.getElementById("float");
    f.innerHTML=html; f.classList.add("show");
    clearTimeout(this._tt);
    this._tt=setTimeout(()=>f.classList.remove("show"), 2200);
  },

  /* ========================================================= */
  /* 起始关卡：沧州（18岁）高考                                  */
  /* ========================================================= */
  sceneCangzhou(){
    this._scene="sceneCangzhou";
    D({
      loc:"第一关 · 沧州 · 18岁", title:"沧州风云", art:"cangzhou", tw:true,
      lines:[
        ["env","盛夏的沧州，蝉鸣聒噪。高考报名点门口，你攥着报名表。"],
        ["mom","儿啊，咱户口在沧州，本地这竞争……一个萝卜八个坑啊。",{big:true}],
        ["unc","听三舅一句劝，去新疆考！那边分数线松快得多——虽说咱户口不在那儿，但路子嘛，总有的。",{big:true}],
        ["you","高考地点……这第一步，可得想清楚了。","think"],
      ],
      choices:[
        {t:"🏯 就在沧州考", sub:"稳妥？还是…", f:()=>this.endingFactoryDog(
          "沧州高考放榜：你的分数，离本科线差了那么一口气。\n复读？没钱。最终你扛起行李，走进了城郊的工厂。")},
        {t:"🏜 远赴新疆高考", sub:"赌一把分数线", cls:"gold", f:()=>this.sceneXinjiang()}
      ]
    });
  },

  sceneXinjiang(){
    this._scene="sceneXinjiang";
    D({
      loc:"新疆 · 志愿填报", art:"xinjiang",
      lines:[
        ["env","新疆的阳光毒辣，分数线却格外温柔。志愿表摊在桌上。"],
        ["unc","成了！分够了！来，填志愿——想上哪所大学？"],
        ["you","梦校还是稳妥校……","think"],
      ],
      choices:[
        {t:"🏛 冲一把同济大学", sub:"名校梦", cls:"gold", f:()=>{
          D({
            loc:"志愿填报",

  /* 时间精力 + 金钱 分配 */
  allocateYear(credits, yrLabel){
    const s=this.s;
    const TIME=100;
    const cats=[
      {k:"study", nm:"学习", sub:"提升通过率·绩点"},
      {k:"intern", nm:"实习", sub:"事业度·实习机会"},
      {k:"work",   nm:"打工", sub:"稳定低收入"},
      {k:"sleep",  nm:"睡眠", sub:"保命·护健康"},
      {k:"friend", nm:"交友", sub:"兄弟好感·情商"},
      {k:"flirt",  nm:"把妹", sub:"情商·心情"},
    ];
    const init={study:30,intern:0,work:0,sleep:30,friend:20,flirt:20};
    const E=this.econ();
    const moneyMax=Math.min(s.money, E.socMax);

    D({
      loc:`${s.school} · ${yrLabel} · 分配`,
      lines:[
        ["bro",`这学年咋过，全看你怎么分配这 ${TIME} 点精力——必须分完！睡太少会掉健康，搞不好直接暴毙。`],
        ["bro",`交友、把妹还能砸钱，钱+时间一起上，好感度和情商涨得更猛。\n🏠 对了，这学年基础生活费 ${E.sym}${fmt(E.live)}/月（全年 ${E.sym}${fmt(E.live*12)}），结算时自动扣。`],
      ],
      extra:`<div class="alloc" id="alloc">
        ${cats.map(c=>`<div class="row">
          <div class="nm">${c.nm}<small>${c.sub}</small></div>
          <input type="range" min="0" max="${TIME}" step="5" value="${init[c.k]}" data-k="${c.k}" oninput="Game._allocSync()">
          <div class="amt" id="amt_${c.k}">${init[c.k]}</div>
        </div>`).join("")}
        <div class="pool">剩余精力 <b id="poolLeft">0</b></div>
      </div>
      <div class="alloc">
        <div style="font-size:13px;margin-bottom:4px">💰 投入金钱（社交花销）</div>
        <div class="row"><div class="nm">交友花钱</div>
          <input type="range" min="0" max="${moneyMax}" step="${E.socStep}" value="0" data-m="friend" oninput="Game._moneySync()">
          <div class="amt" id="m_friend">0</div></div>
        <div class="row"><div class="nm">把妹花钱</div>
          <input type="range" min="0" max="${moneyMax}" step="${E.socStep}" value="0" data-m="flirt" oninput="Game._moneySync()">
          <div class="amt" id="m_flirt">0</div></div>
        <div class="pool">本学年社交花费 <b id="moneySpend">${E.sym}0</b>　/　可用 ${E.sym}${fmt(s.money)}</div>
      </div>`,
      choices:[{t:"🎲 确定，开始这一年", cls:"gold", id:"goBtn", f:()=>{
        const alloc={}; let sum=0;
        document.querySelectorAll('#alloc input').forEach(i=>{alloc[i.dataset.k]=+i.value; sum+=+i.value;});
        if(sum!==TIME){ this.toast("精力必须正好分配完！剩余 "+(TIME-sum)); return; }
        const ms={}; document.querySelectorAll('input[data-m]').forEach(i=>ms[i.dataset.m]=+i.value);
        this.resolveYear(credits, alloc, ms, yrLabel);
      }}]
    });
    this._allocSync(); this._moneySync();
  },
  _allocSync(){
    let sum=0; const TIME=100;
    document.querySelectorAll('#alloc input').forEach(i=>{
      sum+=+i.value; document.getElementById("amt_"+i.dataset.k).textContent=i.value;
    });
    const left=TIME-sum;
    const el=document.getElementById("poolLeft");
    el.textContent=left; el.style.color = left===0?"var(--green)":(left<0?"var(--red)":"var(--gold)");
  },
  _moneySync(){
    let sum=0;
    document.querySelectorAll('input[data-m]').forEach(i=>{
      sum+=+i.value; document.getElementById("m_"+i.dataset.m).textContent=cursym()+fmt(+i.value);
    });
    document.getElementById("moneySpend").textContent=cursym()+fmt(sum);
  },

  /* 结算一个学年 */
  resolveYear(credits, alloc, money, yrLabel){
    const s=this.s;
    const E=this.econ();
    const moneySpent=(money.friend||0)+(money.flirt||0);
    s.money-=moneySpent;

    const logs=[];

    // ---- 通过 / 挂科 ----
    // 通过率：基础 + 学习精力，学分越多越难
    const studyW=alloc.study/100;        // 0..1
    const load=(credits-20)/40;          // 0..1 学分负荷
    let passRate = 0.6 + studyW*0.55 - load*0.3;
    passRate=clamp(passRate,0.15,0.98);
    let passed=0;
    for(let i=0;i<credits;i+=2){ if(Math.random()<passRate) passed+=2; }
    passed=Math.min(passed,credits);
    const failed=credits-passed;
    s.creditsEarned+=passed; s.creditsFailed+=failed;
    logs.push(`📚 选 ${credits} 学分 → 通过 <b style="color:var(--green)">${passed}</b>，挂科 <b style="color:var(--red)">${failed}</b>（通过率约 ${Math.round(passRate*100)}%）`);

    // ---- 打工 / 实习 收入 ----
    if(alloc.work>0){
      const inc=Math.round(alloc.work*E.workRate + rand(E.workRand[0],E.workRand[1]));
      s.money+=inc; logs.push(`🧹 打工到手 +${E.sym}${fmt(inc)}`);
    }
    if(alloc.intern>0){
      s.career=clamp(s.career+Math.round(alloc.intern*0.3),0,100);
      const landProb=clamp(0.2+alloc.intern/100*0.7+s.career/300,0,0.95);
      if(Math.random()<landProb){
        const inc=Math.round(alloc.intern*E.internRate + rand(E.internRand[0],E.internRand[1]));
        s.money+=inc; logs.push(`💼 拿到实习 offer！实习收入 +${E.sym}${fmt(inc)}，事业度 ↑`);
      }else{
        logs.push(`💼 投了不少实习，可惜没下文（事业度仍 ↑）`);
      }
    }

    // ---- 社交：好感度 / 情商 ----
    if(alloc.friend>0||money.friend>0){
      const g=Math.round(alloc.friend*0.25 + (money.friend/E.socUnit)*0.6 + rand(0,4));
      if(g>0){ s.bro=clamp(s.bro+g,0,100); logs.push(`🍻 兄弟好感 +${g}`); }
    }
    if(alloc.flirt>0||money.flirt>0){
      const g=Math.round(alloc.flirt*0.22 + (money.flirt/E.socUnit)*0.5 + rand(0,4));
      if(g>0){ s.eq=clamp(s.eq+g,0,100); logs.push(`💘 把妹历练，情商 +${g}`); }
    }

    // ---- 全年基础生活成本 ----
    const livingYr=E.live*12;
    s.money=Math.max(0,s.money-livingYr);
    logs.push(`🏠 全年基础生活开销 -${E.sym}${fmt(livingYr)}（${E.sym}${fmt(E.live)}/月）`);

    // ---- 睡眠 / 健康 ----
    s.age++; // 一年过去
    let hpDelta = -rand(1,4); // 年龄自然下降
    if(alloc.sleep<20){
      const drop=rand(8,22); hpDelta-=drop;
      logs.push(`😵 睡眠严重不足，健康 -${drop}`);
    }else if(alloc.sleep<35){
      const drop=rand(2,8); hpDelta-=drop;
      logs.push(`🥱 睡眠偏少，健康 -${drop}`);
    }
    s.health=clamp(s.health+hpDelta,0,100);

    // ---- 随机事件：智齿发作 ----
    if(Math.random()<0.22){
      const pain=rand(4,12), cost=rand(E.tooth[0],E.tooth[1]);
      s.health=clamp(s.health-pain,0,100); s.money=Math.max(0,s.money-cost);
      logs.push(`🦷 随机事件·智齿发作！健康 -${pain}，拔牙花了 ${E.sym}${fmt(cost)}`);
    }

    this.render();

    // ---- 暴毙判定 ----
    if(s.health<=12 && Math.random()<0.5){
      return this.spinGpa(credits, alloc, yrLabel, logs, ()=>this.endingDeath());
    }
    if(s.health<=0){
      return this.endingDeath();
    }

    // ---- 绩点轮盘 ----
    this.spinGpa(credits, alloc, yrLabel, logs, ()=>this.yearSummary(yrLabel, logs));
  },

  /* 绩点轮盘：少学分+多时间 → 更高绩点 */
  spinGpa(credits, alloc, yrLabel, logs, done){
    const s=this.s;
    const isCn = s.gpaSys==="cn100";
    // 计算目标绩点
    const studyW=alloc.study/100, load=(credits-20)/40;
    let gpa;
    if(isCn){
      gpa = 55 + studyW*40 - load*22 + rand(-6,8);
      gpa = Math.round(clamp(gpa,30,98));
    }else{
      // 德国制：本游戏统一“高=好”，0-5
      gpa = 2.0 + studyW*2.6 - load*1.4 + (Math.random()*0.6-0.3);
      gpa = Math.round(clamp(gpa,0.5,5.0)*10)/10;
    }
    s.gpaTotal+=gpa; s.gpaCount++; s.lastGpa=gpa;

    // 轮盘扇区
    const segs = isCn
      ? [40,50,55,60,65,72,80,88,95]
      : [1.0,1.7,2.3,3.0,3.5,4.0,4.5,5.0];
    // 找最接近目标的扇区索引作为落点
    let idx=0,best=1e9;
    segs.forEach((v,i)=>{const d=Math.abs(v-gpa); if(d<best){best=d;idx=i;}});

    const advisor = isCn ? "prof" : "prof2";
    D({
      loc:`${s.school} · ${yrLabel} · 绩点开奖`,
      lines:[[advisor,"成绩出来了。来，转盘见真章——命运的绩点轮盘，转起来！🎡"]],
      extra:`<div class="wheelwrap">
        <div class="wheel-cont">
          <div class="pointer"></div>
          <canvas id="wheel" width="260" height="260"></canvas>
        </div>
        <div id="wheelRes" class="hint">旋转中…</div>
      </div>`,
      choices:[]
    });
    drawWheel("wheel", segs, isCn);
    // 旋转到目标扇区
    const n=segs.length, seg=360/n;
    const targetAngle = 360*6 + (360 - (idx*seg + seg/2)); // 指针在顶部
    const cv=document.getElementById("wheel");
    requestAnimationFrame(()=>{ cv.style.transform=`rotate(${targetAngle}deg)`; });
    setTimeout(()=>{
      const txt = isCn ? `绩点 <b style="color:var(--gold);font-size:20px">${gpa}</b> 分` : `绩点 <b style="color:var(--gold);font-size:20px">${gpa}</b> / 5.0`;
      document.getElementById("wheelRes").innerHTML=`<span class="respop">🎉 ${txt}</span>`;

      // 奖学金
      const E=this.econ();
      const good = isCn ? gpa>=80 : gpa>=4.0;
      const mid  = isCn ? gpa>=70 : gpa>=3.3;
      if(good){ const sch=E.schHi; s.money+=sch; logs.push(`🏆 绩点优异，奖学金 +${E.sym}${fmt(sch)}！`); }
      else if(mid){ const sch=E.schMid; s.money+=sch; logs.push(`🥈 绩点良好，奖学金 +${E.sym}${fmt(sch)}`); }
      logs.push(isCn?`📊 本学年绩点：${gpa} 分`:`📊 本学年绩点：${gpa}/5.0`);
      this.render();
      setTimeout(done, 1100);
    }, 4700);
  },

  /* 学年总结 + 退学/继续/毕业 判定 */
  yearSummary(yrLabel, logs){
    this._scene="studyYear";
    const s=this.s;
    const isCn=s.gpaSys==="cn100";

    // 退学条件：绩点过低
    const gpaFail = isCn ? (s.lastGpa<60) : (s.lastGpa<1.0);
    // 退学条件：累计挂科 >30
    const failOut = s.creditsFailed>30;

    const body = logs.map(l=>"· "+l).join("\n");
    const resultsBox = `<div class="narr">${body}</div>`;
    const advisor = isCn ? "prof" : "prof2";

    if(failOut){
      return D({loc:`${s.school} · ${yrLabel} 结算`, tw:true,
        lines:[[advisor,`同学……你累计挂科已经 ${s.creditsFailed} 学分，超过 30 的红线了。学校决定：劝退。`,{big:true}],
               ["you","……就这么结束了。","think"]],
        extra:resultsBox,
        choices:[{t:"…接受现实", cls:"danger", f:()=>this.afterSchoolFail()}]});
    }
    if(gpaFail){
      return D({loc:`${s.school} · ${yrLabel} 结算`, tw:true,
        lines:[[advisor,`这学年绩点 ${s.lastGpa}，没到及格线。规矩就是规矩——你被退学了。`,{big:true}],
               ["you","就差这么一点……","think"]],
        extra:resultsBox,
        choices:[{t:"…接受现实", cls:"danger", f:()=>this.afterSchoolFail()}]});
    }

    // 毕业条件：修满120 或 读满4年
    const enoughCredits = s.creditsEarned>=120;
    const enoughYears = s.yearInSchool>=4;
    const canGraduate = enoughCredits || enoughYears;

    const choices=[];
    if(canGraduate){
      choices.push({t:"🎓 毕业！", sub:`已修 ${s.creditsEarned} 学分`, cls:"gold", f:()=>this.graduate()});
    }else{
      choices.push({t:`📚 继续读（升入下一学年）`, sub:`距毕业还差 ${Math.max(0,120-s.creditsEarned)} 学分`, f:()=>this.studyYear()});
    }
    choices.push({t:"🚪 主动退学", sub:"放弃学业", cls:"danger", f:()=>this.confirmDropout()});

    const statusLine=`已修学分 ${s.creditsEarned}/120　·　累计挂科 ${s.creditsFailed}/30　·　平均绩点 ${avgGpa(s)}`;
    D({loc:`${s.school} · ${yrLabel} 结算`,
      lines:[[advisor, canGraduate
        ? `了不起啊！${statusLine}。你已经够格毕业了——接下来打算怎么走？`
        : `这学年的成绩：${statusLine}。继续加油，争取早点毕业。`]],
      extra:resultsBox,
      choices});
  },

  confirmDropout(){
    D({loc:"抉择",
      lines:[["bro","真要退学啊？退了可就回不来了，再想想？"],
             ["you","让我再确认一下……","think"]],
      choices:[{t:"确认退学", cls:"danger", f:()=>this.afterSchoolFail()},
               {t:"↩ 再读一年", f:()=>this.studyYear()}]});
  },

  afterSchoolFail(){
    this._scene="afterSchoolFail";
    D({loc:"人生岔路",
      lines:[
        ["env","你离开了校园。"],

      ]});

  graduate(){
    const s=this.s;
    if(!s.diplomas.includes(s.school)) s.diplomas.push(s.school);
    this.render();

    // 哈工大毕业：可走红旗支线
    if(s.school==="哈工大（威海）"){
      this.s.flags.harbinGrad=true;
      this.transition({emoji:"🎓", title:"哈工大 毕业！", sub:"关卡通过 · 学士加冕", color:"#ffcc4d"}, ()=>{
        D({loc:`${s.school} · 毕业典礼`, art:"harbin", tw:true,
          lines:[
            ["env",`🎓 获得【哈工大（威海）毕业证】！学士帽抛向威海的天空，平均绩点 ${avgGpa(s)} 分。`],
            ["unc","大学毕业啦！来，三舅给你指条明路——走个关系，进红旗汽车咋样？体面工作，包分配！",{big:true}],
            ["you","红旗、出国、还是回家……人生第一个大岔路口。","think"],
          ],
          choices:[
            {t:"🚩 走红旗支线", sub:"三舅帮忙进红旗汽车", cls:"gold", f:()=>this.endingHongqi()},
            {t:"✈️ 去德国重读本科", sub:"不想这么早安定", f:()=>this.enterBraunschweig()},
            {t:"🏯 回沧州", sub:"低调生活", cls:"danger", f:()=>this.endingFactoryDog(
              "你婉拒了三舅的好意，回了沧州。最终还是进了厂。")}
          ]});
      });
    }
    // 不伦瑞克毕业：申硕
    else if(s.school==="不伦瑞克工业大学"){
      this.s.flags.brGrad=true;
      this.transition({emoji:"🎓", title:"不伦瑞克 毕业！", sub:"关卡通过 · 学成在即", color:"#ffcc4d"}, ()=>this.afterBraunschweig());
    }
  },

  /* ========================================================= */
  /* 不伦瑞克工业大学（德国制 0-5）                              */
  /* ========================================================= */
  enterBraunschweig(){
    const s=this.s;
    s.school="不伦瑞克工业大学"; s.gpaSys="de5";
    s.creditsEarned=0; s.creditsFailed=0; s.yearInSchool=0; s.gpaTotal=0; s.gpaCount=0;
    if(!s.studentIds.includes(s.school)) s.studentIds.push(s.school);
    const before=s.money;
    this.toEUR(); // 资金兑换为欧元
    this.render();
    const exchanged = (s.cur==="EUR" && before>0);
    this.transition({emoji:"🏰", title:"不伦瑞克工大", sub:"关卡通过 · 远渡重洋", color:"#bc8cff"}, ()=>{
      D({loc:"🇩🇪 不伦瑞克 · 入学", art:"germany", tw:true,
        lines:[
          ["env","🪪 获得【不伦瑞克工业大学学生证】！"+(exchanged?`\n💱 资金已按 1€≈${RATE}¥ 兑换：¥${fmt(before)} → €${fmt(s.money)}。`:"")],
          ["prof2","Willkommen! 欢迎来到德国。这里本科 120 学分，绩点 0–5，记住——咱们这儿越高越好。",{big:true}],
          ["prof2","生活成本 €1,200/月，可不便宜。毕业绩点会决定你能申到哪所硕士。加油，Los geht's!"],

  /* ========================================================= */
  /* 战斗系统：横屏=玩手游(攻击)，竖屏=放抖音(回血)              */
  /* ========================================================= */
  battle(cfg){
    this._scene=null;
    const s=this.s;
    const me={hp:100,max:100};
    const en={hp:cfg.hp,max:cfg.hp};
    const log=[];
    let busy=false, ended=false;

    const render=()=>{
      const landscape = isLandscape();
      const fx=this._fx; this._fx=null;
      const enFloat = fx&&fx.target==="enemy" ? `<div class="dmgfloat down">-${fx.dmg}</div>` : "";
      const meFloat = fx&&fx.target==="me" ? `<div class="dmgfloat ${fx.heal?'up':'down'}">${fx.heal?'+':'-'}${fx.dmg}</div>` : "";
      sceneRaw(`<div class="loc">⚔️ 战斗</div>
        <div id="battle">
          <div class="fighter ${fx&&fx.target==='enemy'?'shake':''}">
            ${enFloat}
            <div class="top"><span style="font-size:18px">${cfg.emoji} ${cfg.name}</span><span>${en.hp}/${en.max}</span></div>
            <div class="hpbar"><i style="width:${en.hp/en.max*100}%"></i></div>
          </div>
          <div class="fighter ${fx&&fx.target==='me'&&!fx.heal?'shake':''}">
            ${meFloat}
            <div class="top"><span>🧑 你${s.hasBaton?" 🥢":""}</span><span>${me.hp}/${me.max}</span></div>
            <div class="hpbar"><i style="width:${me.hp/me.max*100}%;background:linear-gradient(90deg,#3fb950,#58a6ff)"></i></div>
          </div>
          <div class="orient">📱 当前：<b>${landscape?"横屏 → 玩手游（攻击）":"竖屏 → 放抖音（回血/降攻）"}</b><br>
            <small>把手机${landscape?"竖过来可切换为防御":"横过来可切换为攻击"}，或直接点下方按钮</small>
          </div>
          <button class="bigbtn" id="actBtn">${landscape?"🎮 横屏·玩手游 出击！":"📲 竖屏·放抖音 回血！"}</button>
          <div class="blog" id="blog">${log.slice(-6).map(l=>"· "+l).join("<br>")||"开打！"}</div>
        </div>`, [], {anim:false});
      document.getElementById("actBtn").onclick=act;
    };

    const enemyTurn=()=>{
      const dmg=Math.round(rand(cfg.atk[0],cfg.atk[1]) * (cfg.rigged?1.3:1));
      me.hp=Math.max(0,me.hp-dmg);
      this._fx={target:"me", dmg:dmg};
      log.push(`${cfg.name} 反击，你 -${dmg}`);
      if(me.hp<=0){ ended=true; render();
        setTimeout(()=>cfg.onLose&&cfg.onLose(),700); return; }
      busy=false; render();
    };

    const act=()=>{
      if(busy||ended) return; busy=true;
      if(isLandscape()){
        // 攻击
        let dmg=rand(8,16) + (s.hasBaton?rand(6,12):0);
        if(cfg.rigged) dmg=Math.round(dmg*0.55); // 序幕削弱：打不过
        en.hp=Math.max(0,en.hp-dmg);
        this._fx={target:"enemy", dmg:dmg};
        log.push(`你${s.hasBaton?"抡起甩棍":"挥拳"}，造成 ${dmg} 伤害`);
        render();
        if(en.hp<=0){ ended=true; setTimeout(()=>cfg.onWin&&cfg.onWin(),700); return; }
        setTimeout(enemyTurn,500);
      }else{
        // 回血/降攻
        const heal=rand(6,14);
        me.hp=Math.min(me.max,me.hp+heal);
        this._fx={target:"me", dmg:heal, heal:true};
        log.push(`你刷抖音回了口气，+${heal} 状态`);
        render();
        setTimeout(enemyTurn,500);
      }
    };

    this._battleResize=render;
    render();
  },
};

/* ---------------- 工具函数 ---------------- */
function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function fmt(n){return Math.round(n).toLocaleString("en-US");}
function cursym(){return Game.s&&Game.s.cur==="EUR"?"€":"¥";}
function mny(n){return cursym()+fmt(n);}
function avgGpa(s){ if(!s.gpaCount) return s.gpaSys==="de5"?"0.0":"0";
  const a=s.gpaTotal/s.gpaCount; return s.gpaSys==="de5"?a.toFixed(1):Math.round(a); }
function isLandscape(){
  if(window.matchMedia) return window.matchMedia("(orientation: landscape)").matches;
  return window.innerWidth>window.innerHeight;
}

/* 渲染一个场景：内容 + 选项按钮 */
function sceneRaw(html, choices, opts){
  opts=opts||{};
  const scr=document.getElementById("screen");
  let btns="";
  if(choices&&choices.length){
    btns=`<div class="choices">`+choices.map((c,i)=>
      `<button class="choice ${c.cls||''}" ${c.id?`id="${c.id}"`:''} data-i="${i}">${c.t}${c.sub?`<span class="sub">${c.sub}</span>`:''}</button>`
    ).join("")+`</div>`;
  }
  scr.innerHTML=html+btns;
  scr.scrollTop=0; window.scrollTo(0,0);
  // 入场动画：顶层元素依次淡入上滑（战斗等高频刷新场景跳过）
  if(opts.anim!==false){
    let i=0;
    const stag=el=>{ el.classList.add("anim-in"); el.style.animationDelay=(i*0.07)+"s"; i++; };
    [...scr.children].forEach(el=>{
      if(el.classList.contains("chat")||el.classList.contains("choices")) [...el.children].forEach(stag);
      else stag(el);
    });
  }
  if(choices) choices.forEach((c,i)=>{
    const b=scr.querySelector(`button[data-i="${i}"]`);
    if(b) b.onclick=()=>c.f();
  });
}

function renderLine(l){
  const who=Array.isArray(l)?l[0]:l.who;
  let text=Array.isArray(l)?l[1]:l.text;
  const o3=Array.isArray(l)?l[2]:l;
  const opt=(o3 && typeof o3==="object")?o3:{};
  const think = o3==="think" || opt.think;
  const big = !!opt.big;
  if(who==="env") return `<div class="msg env"><div class="bub">${text}</div></div>`;
  if(who==="end") return `<div class="msg end"><div class="bub">${text}</div></div>`;
  const c=CHARS[who]||{name:who,face:"❓",side:"left"};
  const center = c.side==="center";
  const ring = big?`style="box-shadow:0 0 0 2px ${c.color||'var(--accent)'},0 4px 12px rgba(0,0,0,.5)"`:"";
  return `<div class="msg ${c.side}${big?' bigface':''}">`+
    (center?"":`<div class="face" ${ring}>${c.face}</div>`)+
    `<div class="col"><div class="who" style="color:${c.color||'var(--dim)'}">${c.name}</div>`+
    `<div class="bub${think?' think':''}">${text}</div></div></div>`;
}
/* 逐字打字机：依次显示气泡并打字，点击任意处跳过 */
function typeChat(scr){
  const msgs=[...scr.querySelectorAll(".chat .msg")];
  if(!msgs.length) return;
  const ch=scr.querySelector(".choices");
  if(ch) ch.style.display="none";
  const full=msgs.map(m=>{ const b=m.querySelector(".bub"); const t=b.textContent; b.textContent=""; return t; });
  msgs.forEach(m=>{ m.style.opacity="0"; });
  let i=0, timer=null, done=false;
  const finishAll=()=>{
    done=true; if(timer)clearInterval(timer);
    msgs.forEach((m,k)=>{ m.style.opacity="1"; const b=m.querySelector(".bub"); b.textContent=full[k]; b.classList.remove("typing"); });
    if(ch) ch.style.display="";
    scr.removeEventListener("click", skip, true);
  };
  const skip=e=>{ if(done)return; finishAll(); };
  const nextMsg=()=>{
    if(i>=msgs.length){ finishAll(); return; }
    const m=msgs[i], b=m.querySelector(".bub");
    m.style.opacity="1"; m.classList.add("anim-in"); m.style.animationDelay="0s";
    const chars=Array.from(full[i]); let ci=0; b.classList.add("typing");
    timer=setInterval(()=>{
      ci++; b.textContent=chars.slice(0,ci).join("");
      if(ci>=chars.length){ clearInterval(timer); b.classList.remove("typing"); i++; setTimeout(nextMsg,300); }
    }, 26);
  };
  scr.addEventListener("click", skip, true);
  nextMsg();
}
/* 对话场景：{loc, title, art, lines:[[who,text,{think,big}],...], choices, anim, tw} */
function D(o){
  let html="";
  if(o.loc)   html+=`<div class="loc">${o.loc}</div>`;
  if(o.title) html+=`<h1 class="title">${o.title}</h1>`;
  if(o.art)   html+=art(o.art);
  if(o.lines&&o.lines.length) html+=`<div class="chat">`+o.lines.map(renderLine).join("")+`</div>`;
  if(o.extra) html+=o.extra;
  sceneRaw(html, o.choices, {anim:o.tw?false:o.anim});
  if(o.tw) typeChat(document.getElementById("screen"));
}

/* 漂浮粒子 */
function particles(emoji,n){
  let s="";
  for(let i=0;i<n;i++){
    const left=Math.random()*100, dur=4+Math.random()*5, delay=Math.random()*6, sz=12+Math.random()*16;
    s+=`<span class="pcl" style="left:${left}%;font-size:${sz}px;animation-duration:${dur}s;animation-delay:-${delay}s">${emoji}</span>`;
  }
  return s;
}

/* 画轮盘 */
function drawWheel(id, segs, isCn){
  const cv=document.getElementById(id); if(!cv) return;
  const ctx=cv.getContext("2d"); const n=segs.length; const R=130; const cx=130, cy=130;
  const colors=["#ff7a3c","#ffcc4d","#3fb950","#58a6ff","#bc8cff","#ff8ecb","#ff5b5b","#4dd0e1","#9ccc65"];
  cv.style.transform="rotate(0deg)";
  ctx.clearRect(0,0,260,260);
  for(let i=0;i<n;i++){
    const a0=(i/n)*2*Math.PI - Math.PI/2 - Math.PI/n;
    const a1=((i+1)/n)*2*Math.PI - Math.PI/2 - Math.PI/n;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,R,a0,a1); ctx.closePath();
    ctx.fillStyle=colors[i%colors.length]; ctx.fill();
    // 文本
    ctx.save(); ctx.translate(cx,cy); ctx.rotate((a0+a1)/2);
    ctx.fillStyle="#0d1117"; ctx.font="bold 16px sans-serif"; ctx.textAlign="right";
    ctx.fillText(isCn?segs[i]:segs[i].toFixed(1), R-12, 6); ctx.restore();
  }
  // 中心
  ctx.beginPath(); ctx.arc(cx,cy,18,0,2*Math.PI); ctx.fillStyle="#161b22"; ctx.fill();
  ctx.strokeStyle="#ffcc4d"; ctx.lineWidth=3; ctx.stroke();
}

function endingStats(s){
  return `<div class="narr sys">📜 人生小结：
年龄 ${s.age} 岁　·　金钱 ${(s.cur==="EUR"?"€":"¥")}${fmt(s.money)}　·　健康 ${s.health}
兄弟好感 ${s.bro}　·　情商 ${s.eq}　·　事业度 ${s.career}
🪪 学生证 ${s.studentIds.length} 张${s.studentIds.length?"（"+s.studentIds.join("、")+"）":""}
🎓 毕业证 ${s.diplomas.length} 张${s.diplomas.length?"（"+s.diplomas.join("、")+"）":""}</div>`;
}

/* 监听屏幕方向变化（战斗时刷新） */
window.addEventListener("resize",()=>{ if(Game._battleResize&&Game._scene===null) Game._battleResize(); });
window.addEventListener("orientationchange",()=>{ setTimeout(()=>{ if(Game._battleResize&&Game._scene===null) Game._battleResize(); },200); });

/* ---------------- 启动 ---------------- */
(function boot(){
  // 有存档则提供「继续」
  let hasSave=false;
  try{ hasSave=!!localStorage.getItem(SAVE_KEY); }catch(e){}
  Game.s=Game.fresh(); Game.render();
  if(hasSave){
    D({loc:"沧州风云", title:"沧州风云",
      lines:[["bro","哟，回来啦！上次那盘人生还存着呢，接着玩？"]],
      choices:[{t:"▶ 继续游戏", cls:"gold", f:()=>{ if(!Game.load()) Game.start(); }},
       {t:"🆕 重开新人生", f:()=>{ localStorage.removeItem(SAVE_KEY); Game.start(); }}]});
  }else{
    Game.start();
  }
})();
</script>
