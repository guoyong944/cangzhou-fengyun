  /* ===================== 德国硕士·毕业论文（最后30学分） ===================== */
  // 企业论文申请成功率：取决于事业度与成绩（德国制 1.0 最佳）
  thesisCompanyProb(){
    const s=this.s; const g=parseFloat(avgGpa(s))||4;
    return clamp(0.15 + (s.career||0)/180 + (5-g)/4*0.35, 0.1, 0.95);
  },
  thesisStart(){
    const s=this.s; this._scene="studyYear";
    const prob=Math.round(this.thesisCompanyProb()*100);
    this.transition({emoji:"📄", title:"毕业论文", sub:"最后 30 学分 · 决定去向", color:"#bc8cff"}, ()=>{
      D({loc:`${s.school} · 毕业论文`, art: s.lineType==="munich"?"munich":"stuttgart", tw:true,
        lines:[
          ["prof2","到写毕业论文的时候了——这最后 30 学分，是去企业做，还是留在学校做？",{big:true}],
          ["env","🏢 企业论文：需要申请（看事业度+成绩），成功后每月 €1000 工资。\n🎓 学校论文：100% 接收，但没有工资。\n论文作为一门课，不会挂科，最终成绩在 1.0~2.0 之间。"],
        ],
        choices:[
          {t:`🏢 申请企业论文（成功率 ${prob}%）`, sub:"成功每月€1000 · 看事业度与成绩", cls:"gold", f:()=>this.thesisApplyCompany()},
          {t:"🎓 留在学校做论文", sub:"100% 接收 · 无工资", f:()=>this.thesisDo("school", false)},
        ]});
    });
  },
  thesisApplyCompany(){
    const s=this.s;
    if(Math.random()<this.thesisCompanyProb()){
      this.eventSplash({emoji:"🏢", title:"企业论文·录用", sub:"每月 €1000 工资", color:"#3fb950", hold:1700}, ()=>this.thesisDo("company", true));
    } else {
      this.eventSplash({emoji:"🚫", title:"企业论文·被拒", sub:"事业度/成绩还差点", color:"#ff5b5b", hold:1700}, ()=>{
        D({loc:`${s.school} · 申请被拒`, tw:true,
          lines:[["prof2","企业那边没要你……没关系，留校做也一样毕业，就是没工资。",{big:true}]],
          choices:[{t:"🎓 留在学校做论文", cls:"gold", f:()=>this.thesisDo("school", false)}]});
      });
    }
  },
  // 论文学期：扣生活费（企业论文发工资），评定 1.0~2.0 成绩，补满 30 学分 → 毕业
  thesisDo(venue, salaried){
    const s=this.s; const E=this.econ(); s.thesisChosen=true; s.thesisVenue=venue;
    s.yearInSchool++; if(this.isMaster() && s.yearInSchool%2===0) s.age++;
    const months=6; const logs=[];
    const living=E.live*months; s.money=Math.max(0,s.money-living); logs.push(`🏠 论文期生活开销 -€${fmt(living)}`);
    if(salaried){ const pay=1000*months; s.money+=pay; this.autoRepayAtWork(logs); logs.push(`🏢 企业论文工资 +€${fmt(pay)}（€1000/月）`); }
    // 成绩 1.0~2.0：事业度/学习力越高越好（越接近 1.0）
    const skill=((s.career||0)+(s.xuexi||0))/2;
    const grade=Math.round(clamp(2.0 - skill/100*1.0 - (Math.random()*0.3), 1.0, 2.0)*10)/10;
    s.gpaTotal+=grade; s.gpaCount++; s.lastGpa=grade;
    s.creditsEarned=Math.min(s.creditGoal, s.creditsEarned+30);
    logs.push(`📄 毕业论文完成！成绩 ${grade}（1.0最佳），获得 30 学分。`);
    this.render();
    this.eventSplash({emoji:"📄", title:"毕业论文完成", sub:`成绩 ${grade} · ${venue==="company"?"企业":"学校"}`, color:"#7ee787", hold:1900}, ()=>{
      D({loc:`${s.school} · 论文答辩通过`, tw:true,
        lines:[["env",logs.join("\n")],["prof2","答辩通过，恭喜你，可以毕业了！",{big:true}]],
        choices:[{t:"🎓 毕业", cls:"gold", f:()=>this.graduate()}]});
    });
  },

  // 读取合并界面上的「本学期学分」（数字输入优先，可超出滑块范围；补课等固定场景回退到入参）
  _readCredits(fallback){
    const n=document.getElementById("creditsNum");
    if(n && n.value!=="") return clamp(Math.round(+n.value||0), 1, 300);
    const el=document.getElementById("credits"); return el ? +el.value : (fallback||0);
  },
  // 学分滑块 ↔ 数字输入双向同步
  _creditRangeSync(){ const r=document.getElementById("credits"), n=document.getElementById("creditsNum"); if(r&&n) n.value=r.value; },
  _creditNumSync(){ const r=document.getElementById("credits"), n=document.getElementById("creditsNum");
    if(r&&n){ const v=Math.round(+n.value||0); r.value=clamp(v, +r.min, +r.max); } },

  /* 实习每点月薪（按当地经济基准 × 涨薪倍率） */
  internMonthlyPerPoint(){ return Math.round(this.econ().internBase * (this.s.internRaiseMult||1)); },
  // 是否已解锁「有偿实习」：实习能力达到 Lv2（Lv1 为无偿实习）
  paidIntern(){ return this._lvl("career")>=2; },

  /* 时间精力 + 金钱 分配 */
  allocateYear(credits, yrLabel, makeup){
    const s=this.s;
    // ---- 本学期选课（与精力规划同屏）：补课固定学分，正常学期可在剩余范围内自选 ----
    const pick = !makeup;
    const goal=s.creditGoal;
    const remain=Math.max(0, goal - s.creditsEarned);
    const fewLeft = remain>0 && remain<40;          // 临近毕业，剩余不足一学期下限
    const cmin = 1;                                  // 最低可拖到 1 学分（想轻松一学期就少选点）
    const cmax = fewLeft ? Math.max(5, Math.ceil(remain/5)*5) : 80;
    let cbase = this._chosenCredits!=null ? this._chosenCredits : (credits!=null ? credits : (fewLeft?cmax:this.defaultCredits()));
    const cdef = clamp(cbase, cmin, cmax);
    const cnumMax=Math.max(cmax, goal);
    const pickLabel = this.isMaster()?"本学期选课":"本学年选课";
    const creditBlock = pick ? `<div class="credit-pick" style="margin-bottom:2px">
        <div style="font-size:13px;color:var(--dim);margin-bottom:3px">📘 ${pickLabel}　已修 ${s.creditsEarned}/${goal}${s.creditsFailed?`　·　挂科 ${s.creditsFailed}/30`:""}</div>
        <div class="big"><input type="number" id="creditsNum" value="${cdef}" min="${cmin}" max="${cnumMax}" inputmode="numeric"
            style="width:96px;background:#0a0d12;border:1px solid var(--line);border-radius:8px;color:var(--gold);font-weight:900;font-size:38px;text-align:center;padding:2px 4px"
            oninput="Game._creditNumSync()"><small style="font-size:16px;color:var(--dim)"> 学分</small></div>
        <input type="range" id="credits" min="${cmin}" max="${cmax}" step="1" value="${cdef}"
          oninput="Game._creditRangeSync()">
        <div class="hint">${fewLeft?`🎓 只差 ${remain} 学分即可毕业 · 可只选所需学分`:`滑块 ${cmin}–${cmax}，也可直接输入数字`}　·　修够 ${goal} 立刻毕业${(s.gpaSys==="de5"||s.gpaSys==="uk")?"　·　每门课 4–6 学分":""}</div>
      </div>` : "";
    const careerOK = this.paidIntern();
    // 实习时间已在预算界面锁定，这里只读展示
    const ek = "intern";
    const ekNm = "实习";
    const lockedWork = s.countryFirstSem ? 0 : (this._budgetWork||0);
    const isFujie = s.hasGf && s.gfType==="fujie";
    const cats=[
      {k:"study", nm:"学习", sub:"提升通过率·成绩"},
    ];
    cats.push({k:"friend", nm:"交友", sub:"兄弟义气"});
    // 富姐：维系时间最低 15，可向上加陪伴；其余女友/单身正常给滑块
    if(isFujie) cats.push({k:"flirt", nm:"维系富姐", sub:"最低15点·可向上加陪伴", min:15});
    else cats.push(s.hasGf ? {k:"flirt", nm:"维系女友", sub:"投入不足→好感降、闹分手"} : {k:"flirt", nm:"把妹", sub:"情商·脱单(看情商)"});
    const la = s.lastAlloc || {study:40,intern:0,work:0,friend:20,flirt:0};
    const init={study:la.study||0,intern:la.intern||0,work:la.work||0,friend:la.friend||0,flirt:isFujie?Math.max(15,la.flirt||0):(la.flirt||0)};
    const E=this.econ();
    this._allocCtx={credits, yrLabel, E, careerOK, makeup:!!makeup};
    const actE=this.activityEnergy()+this.courtEnergy();

    D({
      loc:`${s.school} · ${yrLabel} · 选课 + 时间`,
      lines:[
        makeup
          ? ["prof2",`补课学期：强制补修 ${credits} 个挂科学分。通过的课程会从"已挂学分"里移除！正常分配精力即可。`,{big:true}]
          : ["bro",`选学分、分时间。精力基准 ${this.energyCap()}${s.energyBonus?`（${ORIGINS[s.origin].name}体能好，+${s.energyBonus}）`:""}。可以超出基准（拼一把），只是睡眠不足有可能影响健康；没分完当休息、按余量随机回血。${actE?`\n⏱ 兄弟活动/脱单已占用 ${actE} 点时间（强制扣除）。`:""}`],
        ["bro", `💰 预算已规划（${ekNm} ${lockedWork} 点已锁定、社交开支 ${cursym()}${fmt((this._budgetMoney&&((this._budgetMoney.friend||0)+(this._budgetMoney.flirt||0)))||0)}、还债 ${cursym()}${fmt((this._budgetMoney&&this._budgetMoney.repay)||0)}）。\n🏠 本学期基础生活成本 ${E.sym}${fmt(E.live)}/月。`],
      ],
      extra:`${creditBlock}<div class="alloc" id="alloc">
        <div class="row"><div class="nm">${ekNm} <span style="color:var(--gold);font-size:11px">Lv.${this._lvl("career")}</span><small>${s.countryFirstSem?"换国家首学期·禁止实习":(careerOK?"有偿实习·已在预算锁定":"无偿实习(Lv1)·攒经验")}</small></div>
          <div style="flex:1;color:var(--dim);font-size:12px;padding-left:2px">🔒 占用 <b style="color:var(--gold)">${lockedWork}</b> 点精力（回预算规划可改）</div>
          <div class="amt">${lockedWork}</div></div>
        ${cats.map(c=>`<div class="row">
          <div class="nm">${c.nm} <span style="color:var(--gold);font-size:11px">Lv.${this._lvForCat(c.k)}</span><small>${c.sub}</small></div>
          <input type="range" min="${c.min||0}" max="100" step="5" value="${init[c.k]}" data-k="${c.k}" data-min="${c.min||0}" oninput="Game._allocSync()">
          <div class="amt" id="amt_${c.k}">${init[c.k]}</div>
        </div>`).join("")}
        <div class="pool">已用精力 <b id="poolUsed">0</b> / ${this.energyCap()}　<span id="sleepNote"></span></div>
      </div>
      <div class="budget" id="budget"></div>`,
      choices:[
        {t:"🎲 确定，开始这一学期", cls:"gold", id:"goBtn", f:()=>{
          const cr=this._readCredits(credits);
          const alloc=this._readAlloc(); this.s.lastAlloc=alloc;
          const ms=this._budgetMoney||{friend:0,flirt:0,repay:0};
          this.s.lastSocial={friend:ms.friend||0, flirt:ms.flirt||0}; // 记忆本学期社交开支
          const proj=this._projectBudget(alloc, ms);
          if(proj.endBal<0){ this._chosenCredits=pick?cr:null; this.toast("预计资金不足，请回预算规划调整 💸"); return this.budgetPlan(makeup?credits:null, yrLabel, makeup); }
          this.resolveYear(cr, alloc, ms, yrLabel, makeup);
        }},
        {t:"↩ 返回预算规划", f:()=>{ const cr=this._readCredits(credits); this._chosenCredits=pick?cr:null; this.s.lastAlloc=this._readAlloc(); this.budgetPlan(makeup?credits:null, yrLabel, makeup); }},
        {t:"🚪 实在撑不住，退学", sub:"放弃学业另谋出路", cls:"danger", f:()=>{
          const cr=this._readCredits(credits); this._chosenCredits=pick?cr:null;
          D({loc:"抉择",
            lines:[["you","撑不下去了……真要退学吗？","think"]],
            choices:[{t:"确认退学", cls:"danger", f:()=>this.afterSchoolFail()},
                     {t:"↩ 返回继续分配", f:()=>this.allocateYear(makeup?credits:null, yrLabel, makeup)}]});
        }}
      ]
    });
    this._allocSync();
  },

  /* 预算规划：投资 / 道具 / 借钱 / 社交开支 + 收支平衡（在“开始上课”之前） */
  budgetPlan(credits, yrLabel, makeup){
    const s=this.s; const E=this.econ();
    const paid=this.paidIntern();
    this._allocCtx={credits, yrLabel, E, careerOK:paid, makeup:!!makeup};
    const moneyMax=Math.min(s.money, E.socMax);
    // 实习时间放在预算界面（直接影响收支平衡），数值会在选课时间界面被锁定扣除
    const banIntern = !!s.countryFirstSem; // 换国家后第一学期禁止实习
    const ek = "intern";
    const ekNm = "实习";
    const ekSub = banIntern ? "换国家首学期·专注学习（禁止实习）"
                : paid ? `有偿实习(Lv${this._lvl("career")}) · 每点≈${E.sym}${fmt(this.internMonthlyPerPoint())}/月`
                : "无偿实习(Lv1) · 攒经验，升到 Lv2 解锁有偿";
    const la0 = s.lastAlloc || {study:40,intern:0,work:0,friend:20,flirt:0};
    const bwVal = banIntern ? 0 : (this._budgetWork!=null ? this._budgetWork : (la0.intern||0));
    const bm=this._budgetMoney||(this._budgetMoney={friend:0,flirt:0,repay:0});
    const debt=this.totalDebt();
    const repayMax=Math.max(0, Math.min(s.money, debt));
    bm.repay=Math.min(bm.repay||0, repayMax);
    const debtDesc=this.debtList().map(d=>`${d.nm} ${E.sym}${fmt(d.amt)}(${d.rate})`).join("、");
    const loanRow = debt>0 ? `<div class="row"><div class="nm">还债<small>欠 ${E.sym}${fmt(debt)}：${debtDesc} · 按利息高→低还</small></div>
        <input type="range" id="repayRange" min="0" max="${repayMax}" step="1" value="${bm.repay}" oninput="Game._repayRangeSync()">
        <input type="number" id="repayNum" value="${bm.repay}" min="0" max="${repayMax}" inputmode="numeric"
          style="flex:0 0 70px;background:#0a0d12;border:1px solid var(--line);border-radius:6px;color:var(--gold);font-weight:700;text-align:center;padding:4px 2px" oninput="Game._repayNumSync()">
        </div>
        <div class="row" style="padding:0 0 4px"><div class="nm" style="flex:0 0 96px"></div>
          <span class="hint" style="margin:0;text-align:left">滑块可拖到最大值或直接输入　<a style="color:var(--gold);cursor:pointer" onclick="Game._repaySet(${repayMax})">［全部还清 ${E.sym}${fmt(repayMax)}］</a></span></div>` : "";
    const choices=[
      {t:"📚 下一步：选课与时间规划", cls:"gold", f:()=>{ this._budgetMoney=this._readMoney(); this.allocateYear(credits, yrLabel, makeup); }},
    ];
    if(s.canStock) choices.push({t: s.pendingStock?"📈 已建仓（年底结算）":"📈 投资理财", sub: s.pendingStock?"本年度已投，等结算":"每年一次·本金锁定到年底", f:()=>{ this._budgetMoney=this._readMoney(); this.stockGame(()=>this.budgetPlan(credits,yrLabel,makeup)); }});
    choices.push({t:"🛍 道具购买", sub:"马丁靴/大背头·甩棍与汽车仅斯图加特", f:()=>{ this._budgetMoney=this._readMoney(); this.itemShop(()=>this.budgetPlan(credits,yrLabel,makeup)); }});
    choices.push({t:"🏦 借钱周转（贷款 / 借钱）", sub:"助学贷款·兄弟借钱·高利贷·搏一搏", id:"loanBtn", f:()=>{ this._budgetMoney=this._readMoney(); this.cantAfford(credits, yrLabel, makeup); }});
    if(this.germanStudy()) choices.push({t:"↩ 回到活动规划", sub:"兄弟活动 / 脱单 / 人脉 / 理财", f:()=>{ this._budgetMoney=this._readMoney(); this._resuming=true; this.semesterStart(); }});
    D({
      loc:`${s.school} · ${yrLabel} · 💰 预算规划`,
      lines:[
        ["bro",`开学前先把钱袋子盘一盘：社交开支、还债、要不要投资/置办行头/借钱周转。\n🏠 本学期基础生活成本 ${E.sym}${fmt(E.live)}/月。`,{big:true}],
      ],
      extra:`<div class="alloc">
        <div style="font-size:13px;margin-bottom:4px">⏱ ${ekNm}时间（占精力${paid?" · 决定收入":" · 攒经验"}）</div>
        <div class="row"><div class="nm">${ekNm} <span style="color:var(--gold);font-size:11px">Lv.${this._lvl("career")}</span><small>${ekSub}</small></div>
          <input type="range" id="bwRange" min="0" max="100" step="5" value="${bwVal}" ${banIntern?"disabled":""} oninput="Game._bpSync()">
          <div class="amt" id="bwAmt">${bwVal}</div></div>
        <div style="font-size:13px;margin:10px 0 4px">💰 社交开支预算</div>
        <div class="row"><div class="nm">交友花钱</div>
          <input type="range" min="0" max="${moneyMax}" step="${E.socStep}" value="${bm.friend||0}" data-m="friend" oninput="Game._bpSync()">
          <div class="amt" id="m_friend">${cursym()+fmt(bm.friend||0)}</div></div>
        <div class="row"><div class="nm">${s.hasGf?"维系女友":"把妹"}花钱</div>
          <input type="range" min="0" max="${moneyMax}" step="${E.socStep}" value="${bm.flirt||0}" data-m="flirt" oninput="Game._bpSync()">
          <div class="amt" id="m_flirt">${cursym()+fmt(bm.flirt||0)}</div></div>
        ${loanRow}
        <div class="pool">社交花费 <b id="moneySpend">${cursym()+fmt((bm.friend||0)+(bm.flirt||0))}</b>　/　现金 ${E.sym}${fmt(s.money)}</div>
      </div>
      <div class="budget" id="budget"></div>`,
      choices
    });
    this._bpSync();
  },
  // 预算规划界面工作/实习时间读取
  _readWork(){ const r=document.getElementById("bwRange"); return r ? +r.value : (this._budgetWork||0); },
  // 预算规划界面的实时同步（收入按本界面设定的打工/实习时间估算）
  _bpSync(){
    document.querySelectorAll('input[data-m]').forEach(i=>{ const el=document.getElementById("m_"+i.dataset.m); if(el) el.textContent=cursym()+fmt(+i.value); });
    const work=this._readWork(); this._budgetWork=work;
    const bwa=document.getElementById("bwAmt"); if(bwa) bwa.textContent=work;
    const m=this._readMoney();
    const ms=document.getElementById("moneySpend"); if(ms) ms.textContent=cursym()+fmt((m.friend||0)+(m.flirt||0));
    const el=document.getElementById("budget"); if(!el) return;
    const alloc=Object.assign({study:0,intern:0,work:0,friend:0,flirt:0}, this.s.lastAlloc||{study:40,friend:20});
    alloc.intern=work;
    const p=this._projectBudget(alloc, m); const sym=cursym(); const bad=p.endBal<0;
    const lb=document.getElementById("loanBtn"); if(lb) lb.classList.toggle("blink-attn", bad);  // 结余为负：借钱周转按钮闪烁提示
    el.innerHTML=
      `<div class="brow">📈 预计收入　<b style="color:var(--green)">+${sym}${fmt(p.income)}</b><small>（按本界面实习时间 ${work} 估算${this.paidIntern()?`：有偿实习 ${sym}${fmt(p.internInc)}`:"：当前无偿(Lv1)，无收入"}）</small></div>`+
      `<div class="brow">📉 预计开支　<b style="color:var(--red)">-${sym}${fmt(p.expense)}</b><small>（生活 ${sym}${fmt(p.living)} · 社交 ${sym}${fmt(p.social)}${p.repay?` · 还债 ${sym}${fmt(p.repay)}`:""}${p.activity?` · 兄弟局 ${sym}${fmt(p.activity)}`:""}）</small></div>`+
      `<div class="brow bsum ${bad?'bad':''}">🏦 学期末预计结余　<b>${sym}${fmt(p.endBal)}</b>${bad?' ⚠️ 偏紧，注意':' ✅'}</div>`;
  },
  _readAlloc(){ const a={study:0,intern:0,work:0,friend:0,flirt:0};
    document.querySelectorAll('#alloc input').forEach(i=>a[i.dataset.k]=+i.value);
    // 实习时间在预算界面锁定，回填进来（换国家首学期禁止实习）
    a.intern = this.s.countryFirstSem ? 0 : (this._budgetWork||0);
    // 富姐：维系时间最低 15（滑块已限制，这里再兜底夹紧）
    if(this.s.hasGf && this.s.gfType==="fujie") a.flirt=Math.max(15, a.flirt||0);
    return a; },
  _readMoney(){ const m={friend:0,flirt:0,repay:0};
    document.querySelectorAll('input[data-m]').forEach(i=>m[i.dataset.m]=+i.value);
    const rn=document.getElementById("repayNum");
    if(rn){ const cap=Math.max(0, Math.min(this.s.money, this.totalDebt())); m.repay=clamp(Math.round(+rn.value||0),0,cap); }
    return m; },
  // 还债：滑块(步进1，可达最大值) ↔ 数字输入 双向同步（在预算规划界面）
  _repayRangeSync(){ const r=document.getElementById("repayRange"), n=document.getElementById("repayNum"); if(r&&n) n.value=r.value; this._bpSync(); },
  _repayNumSync(){ const r=document.getElementById("repayRange"), n=document.getElementById("repayNum"); if(r&&n){ const v=clamp(Math.round(+n.value||0),+n.min,+n.max); r.value=v; } this._bpSync(); },
  _repaySet(v){ const r=document.getElementById("repayRange"), n=document.getElementById("repayNum"); if(n) n.value=v; if(r) r.value=v; this._bpSync(); },
  _projectBudget(alloc, money){
    const s=this.s; const E=this._allocCtx.E;
    const workInc = 0; // 「打工」已并入「实习」
    const internInc = (this.paidIntern() && !s.countryFirstSem && alloc.intern>0) ? alloc.intern*this.internMonthlyPerPoint()*this.monthsPerTerm() : 0;
    const social = (money.friend||0)+(money.flirt||0);
    const repay = money.repay||0;
    const living = E.live*this.monthsPerTerm();
    const activity = this.activityCost()+this.courtCost();
    const income = workInc + internInc;
    const expense = living + social + repay + activity;
    return {workInc, internInc, social, repay, living, activity, income, expense, endBal: s.money + income - expense};
  },
  // 投资可投上限：学业预算阶段用「学期末预计结余」（避免投资后资金穿底），其余场景用现金
  _investCap(){
    const s=this.s;
    if(this._allocCtx && this.studying && this.studying()){
      const ek=s.career>=20?"intern":"work";
      const alloc=Object.assign({study:0,intern:0,work:0,friend:0,flirt:0}, s.lastAlloc||{study:40,friend:20});
      alloc[ek]=this._budgetWork||0;
      const p=this._projectBudget(alloc, this._budgetMoney||{friend:0,flirt:0,repay:0});
      return Math.max(0, Math.min(s.money, Math.round(p.endBal)));
    }
    return s.money;
  },
  _allocSync(){
    let used=0;
    document.querySelectorAll('#alloc input').forEach(i=>{ used+=+i.value; document.getElementById("amt_"+i.dataset.k).textContent=i.value; });
    const work=this._budgetWork||0;            // 预算界面锁定的实习/打工时间
    const actE=this.activityEnergy()+this.courtEnergy(); const tot=used+work+actE;
    const parts=[]; if(work) parts.push(`${work}(${this.s.career>=20?"实习":"打工"})`); if(actE) parts.push(`${actE}(活动/脱单)`);
    document.getElementById("poolUsed").textContent = parts.length? `${used}+${parts.join("+")}=${tot}` : used;
    const note=document.getElementById("sleepNote");
    const cap=this.energyCap();
    if(tot>cap) note.innerHTML=`<span style="color:#f5a623">超 ${tot-cap}%·睡眠不足（有可能影响健康）</span>`;
    else if(tot<cap) note.innerHTML=`<span style="color:var(--green)">余 ${cap-tot}%·可休息回血</span>`;
    else note.innerHTML=`<span style="color:var(--gold)">刚好</span>`;
    this._budgetSync();
  },
  // 「开始上课」界面的预算只读展示：金钱用预算规划阶段已定的 _budgetMoney
  _budgetSync(){
    const el=document.getElementById("budget"); if(!el||!this._allocCtx) return;
    const money=this._budgetMoney||{friend:0,flirt:0,repay:0};
    const p=this._projectBudget(this._readAlloc(), money);
    const sym=cursym(); const bad=p.endBal<0;
    el.innerHTML=
      `<div class="brow">📈 预计收入　<b style="color:var(--green)">+${sym}${fmt(p.income)}</b>`+
      `<small>（实习 ${sym}${fmt(p.internInc)}）</small></div>`+
      `<div class="brow">📉 预计开支　<b style="color:var(--red)">-${sym}${fmt(p.expense)}</b>`+
      `<small>（生活 ${sym}${fmt(p.living)} · 社交 ${sym}${fmt(p.social)}${p.activity?` · 活动 ${sym}${fmt(p.activity)}`:""}${p.repay?` · 还债 ${sym}${fmt(p.repay)}`:""}）</small></div>`+
      `<div class="brow bsum ${bad?'bad':''}">🏦 学期末预计结余　<b>${sym}${fmt(p.endBal)}</b>${bad?' ❌ 资金不足，回预算规划调整':' ✅'}</div>`;
  },

  /* 结算一个学年 */
  resolveYear(credits, alloc, money, yrLabel, makeup){
    const s=this.s;
    const E=this.econ();
    this._statDeltas=null; clearTimeout(this._deltaTimer); // 清掉上学期的变化箭头
    this._semSnap=this._snapStats(); // 学期开始快照（用于仪表盘变化箭头）
    const moneySpent=(money.friend||0)+(money.flirt||0);
    s.money-=moneySpent;
    // 还债：按利息高→低（高利贷30% → 助学贷款10% → 富姐0% → 兄弟0%）
    if(money.repay>0) this.applyRepay(money.repay);
    // 兄弟局 + 脱单早餐 费用与时间，开学一并扣
    const actCost=this.activityCost()+this.courtCost(), actEnergy=this.activityEnergy()+this.courtEnergy();
    if(actCost>0){ s.money=Math.max(0,s.money-actCost); }
    s.semActivities=[];

    const logs=[];
    const isCn = s.gpaSys==="cn100";
    // ---- 携带甩棍：10% 概率被宿管查寝没收 + 校园义务劳动（占用时间）----
    if(s.hasBaton && Math.random()<0.10){
      s.hasBaton=false; s.detentionEnergy=(s.detentionEnergy||0)+10;
      this._semEventBaton=`🚨 宿管查寝搜出甩棍，当场没收！还罚你校园义务劳动（本学期时间 -10）。`;
      logs.push(this._semEventBaton);
    }

    // ---- 通过率（含学校难度修正 + 学习力 + 随机扰动） ----
    const studyW=alloc.study/100;
    const load=(credits-40)/40;
    // 难度修正：>0 更易过；慕尼黑“严出”更难
    const diffMap={braunschweig:0.14, stuttgart:0.14, london:0.14, munich:-0.12};
    const diffBonus = diffMap[s.lineType]||0;
    // 学期越多越熟练（每多读一学期 +2%，上限 +16%）
    const semBonus = Math.min(Math.max(0,(s.yearInSchool||1)-1), 8)*0.02;
    // 临近毕业（剩余学分越少）越容易过：剩 40 学分内开始递增，至毕业前 +12%
    const remainBefore = Math.max(0, s.creditGoal - s.creditsEarned);
    const nearGrad = remainBefore<40 ? clamp((40-remainBefore)/40, 0, 1)*0.12 : 0;
    let passRate = 0.6 + studyW*0.55 - load*0.3 + (s.xuexi||0)/400 + diffBonus + (s.examBonus||0) + semBonus + nearGrad;
    passRate=clamp(passRate,0.12,0.99);
    // 中国百分制基准（高=好）；杰尼龟学霸笔记加成 gradeBonus
    const gpaBaseCn = 55 + studyW*40 - load*22 + (s.xuexi||0)*0.12 + diffBonus*40 + (s.gradeBonus||0)*8;
    // 德国制：1.0 最佳，5.0 不及格（低=好）；gradeBonus 让成绩更优（数值更低）
    const gpaBaseDe = clamp(4.2 - studyW*2.8 + load*0.9 - (s.xuexi||0)*0.008 - diffBonus*1.0 - (s.gradeBonus||0)*0.5, 1.0, 5.0);

    // ---- 学分 / 成绩结算 ----
    let courseData=null;
    if(isCn){
      let passed=0;
      for(let i=0;i<credits;i+=2){ if(Math.random()<passRate) passed+=2; }
      passed=Math.min(passed,credits);
      const failed=credits-passed;
      s.creditsEarned+=passed; s.creditsFailed+=failed;
      logs.push(`📚 选 ${credits} 学分 → 通过 ${passed}，挂科 ${failed}`);
    } else {
      // 德国：拆成 4-6 学分的课程，逐门判定（1.0最佳，5.0挂科）
      const courses=[]; let remain=credits;
      while(remain>0){ let c=Math.min(remain, rand(4,6)); if(remain-c>0 && remain-c<4) c=remain; courses.push({cr:c}); remain-=c; }
      let passed=0, failed=0, gsum=0;
      courses.forEach((c,idx)=>{
        const pass=Math.random()<passRate;
        let grade;
        if(pass){ grade=clamp(gpaBaseDe + (Math.random()*0.8-0.4), 1.0, 4.0); passed+=c.cr; }
        else { grade=5.0; failed+=c.cr; }
        c.pass=pass; c.grade=Math.round(grade*10)/10; c.name=`课程 ${idx+1}`;
        gsum+=c.grade;
      });
      const semGpa=Math.round(gsum/courses.length*10)/10;
      if(makeup){
        // 补课：通过的课从已挂学分移除并计入已修；挂掉的维持
        s.creditsEarned+=passed; s.creditsFailed=Math.max(0, s.creditsFailed-passed);
      } else {
        s.creditsEarned+=passed; s.creditsFailed+=failed;
        if(semGpa<=2.5){
          const f=clamp((2.5-semGpa)/1.5,0,1);               // 1.0→满额，2.5→基础额
          const sch=Math.round(E.schMid + (E.schHi-E.schMid)*f);
          s.money+=sch; const schGpaTxt=s.gpaSys==="uk"?`${deToUk(semGpa)}% ${ukClass(deToUk(semGpa))}`:`绩点 ${semGpa}≤2.5`; logs.push(`🎓 ${s.lineType==="london"?"英国":"德国"}奖学金（${schGpaTxt}，越好越多）+${E.sym}${fmt(sch)}`);
          this._pendingScholar={amt:sch, gpa:semGpa, sym:E.sym}; // 全屏动画提醒
        }
      }
      s.gpaTotal+=semGpa; s.gpaCount++; s.lastGpa=semGpa;
      courseData={courses, passed, failed, semGpa};
    }

    // ---- 实习 收入 + 事业度（Lv1 无偿攒经验；Lv2+ 有偿）----
    if(alloc.intern>0){
      const cBefore=s.career;
      this.addStat("career", Math.round(alloc.intern*0.5));
      if(this.paidIntern()){
        const per=this.internMonthlyPerPoint();
        const inc=Math.round(alloc.intern*per*this.monthsPerTerm()*(0.85+Math.random()*0.3)); // 随机浮动（按学期月数）
        s.money+=inc; logs.push(`💼 有偿实习收入 +${E.sym}${fmt(inc)}（事业度↑）`);
        // 事业度越高，越有机会涨薪（持久提升每点薪资）
        if(Math.random() < s.career/220){
          s.internRaiseMult = Math.round((s.internRaiseMult + rand(10,30)/100)*100)/100;
          this.toast(`📈 实习涨薪！每点薪资 ×${s.internRaiseMult}`);
          logs.push(`📈 实习涨薪，每点薪资倍率 ×${s.internRaiseMult}`);
        }
      } else {
        logs.push(`💼 无偿实习攒经验，事业度 ${cBefore}→${s.career}（实习能力升到 Lv2 即可解锁有偿实习）`);
      }
    }

    // ---- 年底结算上学期建仓的投资 ----
    this.settleStock(logs);

    // ---- 学习力随用功增长（安徽人成长更快）----
    if(alloc.study>0){ const xg=this.addStat("xuexi", Math.round(alloc.study*0.05*(s.xuexiMult||1))); if(xg>0) logs.push(`🧠 勤学苦练，学习力 +${xg}`); }
    // ---- 社交：兄弟义气（边际递减）----
    if(alloc.friend>0||money.friend>0){
      // 花钱社交边际递减：用平方根曲线，前面花的最划算，越往后提升越小
      const mUnits=Math.max(0, money.friend)/E.socUnit;
      const raw=Math.round((alloc.friend*0.25 + Math.sqrt(mUnits)*1.6 + rand(0,4)) * (s.broMult||1) * (s.hasBoots?1.2:1));
      const g=this.addStat("bro", raw);
      if(g>0) logs.push(`🍻 兄弟义气 +${g}${s.hasBoots?"（马丁靴气场加成）":""}`);
    }
    // ---- 把妹 / 女友：情商训练（单身）+ 按类型维系关系 ----
    this._gfEvent=null;
    const flirtTime = alloc.flirt;
    const flirtMoney = money.flirt/E.socUnit; // 归一化
    if(!s.hasGf){
      // 单身时把妹只历练情商
      if(flirtTime>0||flirtMoney>0){ const g=this.addStat("eq", Math.round((alloc.flirt*0.22 + Math.sqrt(Math.max(0,flirtMoney))*1.3 + rand(0,3))*(s.eqMult||1)*(s.hasHair?1.25:1))); if(g>0) logs.push(`💘 把妹历练，情商 +${g}${s.hasHair?"（大背头加成）":""}`); }
      // ---- 主动脱单尝试结算（学期末按情商定成败，过低则被拉黑）----
      if(s.courtPlan){
        const cp=s.courtPlan; s.courtPlan=null; const eq=s.eq||0;
        if(cp.mode==="net"){
          const p=clamp(0.34+eq/130, 0.2, 0.85);
          this._pendingCourt = Math.random()<p ? {success:true,type:"net"} : {success:false};
        } else {
          const base=clamp(0.34+eq/130+(cp.breakfast?0.18:0), 0.2, 0.92);
          if(Math.random()<base) this._pendingCourt={success:true,type:cp.target};
          else {
            const blockP = eq<35 ? clamp(0.5-eq/100, 0.1, 0.5) : 0.06;
            this._pendingCourt = Math.random()<blockP ? {blocked:true,target:cp.target} : {success:false};
          }
        }
      }
    } else {
      const t=s.gfType;
      // 维系满意度：不同类型侧重不同
      let sat;
      if(t==="meinu")      sat = flirtMoney*1.5 + flirtTime*0.3 - 16; // 美女吃金钱
      else if(t==="fujie") sat = flirtTime*1.0 + flirtMoney*0.3 - 16; // 富姐吃时间
      else if(t==="net")   sat = flirtMoney*1.2 + flirtTime*0.5 - 12; // 网恋靠"转账"
      else                 sat = flirtTime*0.55 + flirtMoney*0.8 - 14; // 学霸均衡
      if(s.hasHair) sat+=3;   // 大背头：撑场面
      if(s.hasCar)  sat+=6;   // 汽车：接送有面子
      // ---- 异地恋 / 异国恋：维系更难（网恋本就远程，不叠加）----
      let distNote="";
      if(t!=="net" && s.gfOrigin){
        if(s.gfOrigin.cur!==s.cur){ sat-=11; distNote="异国恋"; }            // 跨国：时差、机票、聚少离多
        else if(s.gfOrigin.line!==s.lineType){ sat-=6; distNote="异地恋"; }  // 同国异地
      }
      if(distNote) logs.push(`🌧 ${distNote}·聚少离多，维系格外吃力（满意度 -${s.gfOrigin.cur!==s.cur?11:6}）`);
      if(sat>=0){ const up=this.addStat("gfFavor", Math.round((2+sat*0.4)*this._gfGainMult())); logs.push(`💞 用心经营，女友亲密度 +${up}`); }
      else { const down=Math.round((-sat)*0.7+rand(1,3)); s.gfFavor=clamp(s.gfFavor-down,0,100); logs.push(`💔 维系投入不足，女友亲密度 -${down}`); }

      // ---- 类型专属收益 / 支出 ----
      if(t==="meinu"){
        const cost=Math.round(E.live*2); s.money=Math.max(0,s.money-cost);
        const hp=rand(4,9); s.health=clamp(s.health+hp,0,100);
        logs.push(`💃 美女女友·约会置装 -${E.sym}${fmt(cost)}，身心愉悦 健康 +${hp}`);
      } else if(t==="fujie"){
        const allowance=rand(Math.round(E.live), Math.round(E.live*5)); s.money+=allowance;
        const hp=rand(2,6); s.health=clamp(s.health-hp,0,100);
        logs.push(`💎 富姐女友·随手塞了零花钱 +${E.sym}${fmt(allowance)}（陪她应酬 健康 -${hp}）`);
      } else if(t==="xueba"){
        const cost=Math.round(E.live*1); s.money=Math.max(0,s.money-cost);
        const xg=this.addStat("xuexi", Math.round(rand(4,9)*(s.xuexiMult||1)));
        logs.push(`🤓 学霸女友·一起自习 -${E.sym}${fmt(cost)}，学习力 +${xg}`);
      } else if(t==="net"){
        if(Math.random()<0.65){
          const ask=rand(Math.round(E.live*2), Math.round(E.live*6)); s.money=Math.max(0,s.money-ask); s.netScam=(s.netScam||0)+ask;
          const up=this.addStat("gfFavor", rand(3,7));
          logs.push(`💻 女友说家里急用钱，你转了 ${E.sym}${fmt(ask)}（好感 +${up}）`);
        }
        // 累计转账过多 → 对方突然蒸发
        if((s.netScam||0) >= E.live*14 && Math.random()<0.5){
          s.hasGf=false; s.gfType=null; s.gfOrigin=null; s.gfWarned=false; s.gfFavor=0; this._gfEvent="netbust";
        }
      }

      // ---- 汽车：帮女神搬家、带去 Kaufland 买菜 → 好感稳涨（油费另计） ----
      if(s.hasGf && s.hasCar){
        const up=this.addStat("gfFavor", Math.round(rand(4,8)*this._gfGainMult()));
        const fuel=Math.round(E.live*0.4); s.money=Math.max(0,s.money-fuel);
        logs.push(`🚗 开车帮她搬家、去 Kaufland 买菜，女友亲密度 +${up}（油费 -${E.sym}${fmt(fuel)}）`);
      }

      // ---- 美女：亲密度达标 → 索要 €5000 买衣服（攻略事件，仅一次） ----
      if(s.hasGf && s.gfType==="meinu" && s.gfFavor>=80 && !s.flags.meinuDress){ this._pendingMeinuDress=true; }

      // ---- 吵架预警在先、分手在后 ----
      if(s.hasGf){
        if(s.gfFavor<50){
          if(s.gfWarned){ s.hasGf=false; s.gfType=null; s.gfOrigin=null; s.gfWarned=false; s.gfFavor=0; this._gfEvent="breakup"; }
          else { s.gfWarned=true; s.gfFavor=50; this._gfEvent="warn"; }
        }
        else if(s.gfFavor<60){ if(!s.gfWarned){ s.gfWarned=true; this._gfEvent="warn"; } }
        else s.gfWarned=false;
      }
    }

    // ---- 兄弟亲密度随时间缓慢流失（比女友慢得多：每期 -0~2，且交友投入可抵消） ----
    {
      const upkeep = (alloc.friend>0||money.friend>0) ? rand(0,1) : rand(1,2);
      for(const id in s.friends){ const fr=s.friends[id]; if(fr) fr.fav=clamp((fr.fav||0)-upkeep,0,100); }
    }

    // ---- 基础生活成本（本科按学年12个月，硕士按学期6个月）----
    const months=this.monthsPerTerm();
    const livingYr=E.live*months;
    s.money=Math.max(0,s.money-livingYr);
    logs.push(`🏠 ${this.isMaster()?"本学期(6个月)":"本学年(12个月)"}生活开销 -${E.sym}${fmt(livingYr)}`);
    // ---- 债务利息：助学贷款10%/年，高利贷30%/年 ----
    if(s.loan>0){ s.loan=Math.round(s.loan*1.10); logs.push(`🏦 助学贷款滚息至 ${E.sym}${fmt(s.loan)}（10%/年）`); }
    if(s.shark>0){
      s.shark=Math.round(s.shark*1.30); logs.push(`💸 高利贷滚息至 ${E.sym}${fmt(s.shark)}（30%/年）`);
      // ---- 追债暴打：欠得越多、拖得越久越容易被堵；甩棍可增强防身 ----
      s.sharkAge=(s.sharkAge||0)+1;
      const ratio=s.shark/Math.max(1,E.live*12);
      let prob=clamp(0.08 + ratio*0.14 + s.sharkAge*0.07, 0, 0.85);
      if(Math.random()<prob){
        const fended = s.hasBaton && Math.random()<0.5;   // 甩棍：约五成概率打跑讨债的
        if(fended){
          logs.push(`🥢 讨债的堵到门口，你抄起甩棍拼命，他们见你不好惹，悻悻退去——这次躲过了。`);
        } else {
          const hp=rand(18,34); s.health=clamp(s.health-hp,0,100);
          const med=Math.round(E.live*2 + rand(0,E.tooth[1])); s.money=Math.max(0,s.money-med);
          this._pendingDebtBeat={hp, med, baton:!!s.hasBaton};
          logs.push(`🩸 高利贷追债·被打住院！健康 -${hp}，医药费 ${E.sym}${fmt(med)}`);
        }
      }
    }
    // ---- 兄弟讨债：欠兄弟的钱，日后随机被开口要回（可拒，但伤亲密度，过低则决裂） ----
    if(s.broLoan>0 && s.broLoanFrom && s.friends[s.broLoanFrom] && !this._pendingDebtBeat){
      if(Math.random()<0.5){ this._pendingBroDebt={id:s.broLoanFrom, amt:s.broLoan}; }
    }

    // ---- 时间推进：本科一学年+1岁；硕士每两学期(满一年)才+1岁 ----
    if(this.isMaster()){ if(s.yearInSchool%2===0) s.age++; } else s.age++;
    // ---- 睡眠平衡：精力总量决定健康（兄弟局额外耗精力） ----
    const cap=this.energyCap();
    const used=(alloc.study||0)+(alloc.intern||0)+(alloc.work||0)+(alloc.friend||0)+(alloc.flirt||0)+actEnergy;
    let hpDelta=0;
    if(used>cap){
      // 透支：睡眠不足，按缺口随机掉血，外加少量自然损耗
      const deficit=used-cap, drop=Math.round(deficit*(rand(20,50)/100)*(s.healthDrainMult||1))+rand(0,2);
      hpDelta-=drop; logs.push(`😵 精力透支 ${deficit}%，睡眠不足，健康 -${drop}`);
    } else if(used<cap){
      // 留有余力 → 一定休息回血（保证净增，绝不因为没分完而掉血）
      const surplus=cap-used, heal=Math.max(2, Math.round(surplus*(rand(28,58)/100)));
      hpDelta+=heal; logs.push(`😴 余力 ${surplus}%，休整恢复，健康 +${heal}`);
    }
    // ---- 年龄越大、身体越扛不住：随年龄递增的健康损耗 ----
    const ageDrain=this.ageHealthDrain();
    if(ageDrain>0){ hpDelta-=ageDrain; logs.push(`⏳ 年纪渐长（${s.age}岁），身体机能下滑，健康 -${ageDrain}`); }
    s.health=clamp(s.health+hpDelta,0,100);
    // 拘留/找人占用的可支配时间是"一次性"的：本学期已按缩减后的精力上限结算，用完即清零
    if(s.detentionEnergy){ logs.push(`⏳ 本学期可支配时间被占用 ${s.detentionEnergy} 点（拘留/找人等）。`); s.detentionEnergy=0; }
    // ---- 健身卡：学期末立刻回复「已损失健康」的一半 ----
    if(s.gymThisSem){ const back=Math.round((100-s.health)/2); if(back>0){ s.health=clamp(s.health+back,0,100); logs.push(`🏋️ 健身卡见效，恢复已损失健康的一半 +${back}`); } s.gymThisSem=false; }
    // ---- 换国家首学期已过，下学期起可正常实习 ----
    if(s.countryFirstSem){ s.countryFirstSem=false; }
    // ---- 搏一搏：每学期重置「每项限一次」----
    s.gambleUsed=[];
    // ---- 健身卡：每学期重新询问 ----
    s.semGymAsked=false;
    // ---- 大背头仅当前学期有效，学期末重置（需要时下学期再置办）----
    if(s.hasHair){ s.hasHair=false; logs.push(`💇 大背头只风光一学期，发型乱了——效果重置（可下学期再做）。`); }

    // ---- 随机事件：智齿发作 ----
    if(Math.random()<0.22){
      const pain=rand(4,12), cost=rand(E.tooth[0],E.tooth[1]);
      s.health=clamp(s.health-pain,0,100); s.money=Math.max(0,s.money-cost);
      logs.push(`🦷 随机事件·智齿发作！健康 -${pain}，拔牙花了 ${E.sym}${fmt(cost)}`);
    }
    // ---- 健康过低：小病小灾不断，额外破费（60 以下就开始亮红灯，越低越频繁）----
    if(s.health<60 && Math.random() < (60-s.health)/70){
      const pain=rand(5,15), cost=rand(E.tooth[1], E.tooth[1]*3);
      s.health=clamp(s.health-pain,0,100); s.money=Math.max(0,s.money-cost);
      logs.push(`🤒 身体亮红灯！小病小灾不断，健康 -${pain}，吃药看病 ${E.sym}${fmt(cost)}`);
    }
    // ---- 斯图加特特色随机事件：阿鲁巴（甩棍/认识旭子可降低概率） ----
    this._semEvent=null;
    if(s.lineType==="stuttgart"){
      const prob=this.arubaProb(0.45);
      if(Math.random()<prob){
        const hp=rand(8,18); s.health=clamp(s.health-hp,0,100);
        this._semEvent=`🪜 突发·阿鲁巴！兄弟们架着你往栏杆上"骑"，胯下生风，健康 -${hp}。`;
        logs.push(this._semEvent);
      }
    }
    // ---- 反派兄弟·学期负面事件（仍在联系人里才触发；触发次数越多概率越低，至多一个）----
    this._rollVillain();

    // 健康恢复良好则解除"住院警告"
    if(s.health>=70) s.hospWarned=false;

    // 「有偿实习」解锁改由实习能力升到 Lv2 触发（见 skillLevelAnim）

    // ---- 技能经验积累：本学期各项投入折算为经验，学期末动画结算升级 ----
    this._ensureLvl();
    const su=E.socUnit||130;
    this._xpGain={
      career: Math.round((alloc.intern||0)+(alloc.work||0)),
      // 女室友(xueba)：每学期额外增加学习能力经验
      xuexi:  Math.round((alloc.study||0) + ((s.hasGf&&s.gfType==="xueba")?20:0)),
      bro:    Math.round((alloc.friend||0)+(money.friend||0)/su*8),
      eq:     Math.round((alloc.flirt||0)+(money.flirt||0)/su*8),
    };

    this.render();

    const reveal = isCn
      ? (done)=>this.spinGpa(credits, alloc, yrLabel, logs, done, {gpaBaseCn})
      : (done)=>this.revealCoursesDE(courseData, yrLabel, logs, done);
    let after = makeup ? ()=>this.makeupDone(yrLabel) : ()=>this.yearSummary(yrLabel, logs);
    // 技能经验结算动画（逐项经验条提升，升级显示 +1）——紧贴年度小结之前
    if(this._xpGain && SKILL_KEYS.some(k=>this._xpGain[k]>0)){ const g=this._xpGain; this._xpGain=null; const nx=after; after=()=>this.skillLevelAnim(g, nx); }
    // 投资走势图动画（逐点揭秘盈亏，紧贴年度小结之前）
    if(this._stockAnim){ const a=this._stockAnim; this._stockAnim=null; const nx=after; after=()=>this.assetCurve(a, nx); }
    // 奖学金（绩点进入 2.5 以内）→ 全屏动画提醒
    if(this._pendingScholar){ const sc=this._pendingScholar; this._pendingScholar=null; const gtxt=s.gpaSys==="uk"?`${deToUk(sc.gpa)}% ${ukClass(deToUk(sc.gpa))}`:`绩点 ${sc.gpa}`; const nx=after; after=()=>this.eventSplash({emoji:"🎓", title:"获得奖学金！", sub:`${gtxt} · ${sc.sym}${fmt(sc.amt)}`, color:"#ffcc4d", hold:1900}, nx); }
    // 美女女友"买衣服"攻略事件插在结算前
    if(this._pendingMeinuDress){ this._pendingMeinuDress=false; const nx=after; after=()=>this.meinuDressEvent(nx); }
    // 女友重大事件：分手 / 网恋蒸发 / 吵架预警 → 全屏动画（_gfEvent 由 yearSummary 负责复盘清空）
    if(this._gfEvent==="breakup"||this._gfEvent==="netbust"){ const ev=this._gfEvent; const nx=after; after=()=>this.eventSplash({emoji:"💔", title:"分手", sub:ev==="netbust"?"网恋对象人间蒸发":"感情走到尽头", color:"#ff5b5b"}, nx); }
    else if(this._gfEvent==="warn"){ const nx=after; after=()=>this.eventSplash({emoji:"⚠️", title:"吵架预警", sub:"女友亲密度告急", color:"#ffcc4d", hold:1600}, nx); }
    // 慕尼黑 TUM 第一学期结束：内燃机日薄西山，是否转学斯图加特新专业
    if(s.lineType==="munich" && s.yearInSchool===1 && !s.flags.tumTransferAsked){ s.flags.tumTransferAsked=true; const nx=after; after=()=>this.tumTransferPrompt(nx); }
    // 控制论：毕业前一学期强制获得女友（导师做媒）
    if(s.major==="ctrl" && s.lineType==="stuttgart" && !s.hasGf && !s.flags.ctrlGf && s.creditsEarned>=s.creditGoal-18){ s.flags.ctrlGf=true; const nx=after; after=()=>this.ctrlForceGf(nx); }
    // 脱单进度公布（全屏）
    if(this._pendingCourt){ const info=this._pendingCourt; this._pendingCourt=null; const nx=after; after=()=>this.courtResultEvent(info, nx); }
    // 反派兄弟·负面事件（全屏 + 是否绝交）
    if(this._pendingVillain){ const info=this._pendingVillain; this._pendingVillain=null; const nx=after; after=()=>this.villainEvent(info, nx); }
    // 兄弟讨债剧情（全屏 + 还/拒选择）
    if(this._pendingBroDebt){ const info=this._pendingBroDebt; this._pendingBroDebt=null; const nx=after; after=()=>this.broDebtEvent(info, nx); }
    // 高利贷追债·被打住院剧情
    if(this._pendingDebtBeat){ const info=this._pendingDebtBeat; this._pendingDebtBeat=null; const nx=after; after=()=>this.debtBeatEvent(info, nx); }
    // 技能解锁全屏动画（最先弹出）
    if(this._pendingSkillUnlock){ const sk=this._pendingSkillUnlock; this._pendingSkillUnlock=null; const nx=after; after=()=>this.skillUnlock(sk, nx); }

    // ---- 健康危机：先住院（花钱保命，警告一次），再不注意才暴毙 ----
    const CRIT=15;
    if(s.health<=CRIT){
      if(s.hospWarned){ return reveal(()=>this.endingDeath()); } // 已警告过仍不珍惜身体 → 暴毙
      const nx=after; after=()=>this.hospitalEvent(nx);          // 首次触底 → 住院剧情
    }
    reveal(after);
  },

  /* 健康过低：住院剧情（花钱保命 + 最后警告） */
  hospitalEvent(next){
    const s=this.s; const E=this.econ();
    const cost = Math.round(E.live*3 + rand(0, E.tooth[1]));
    const before=s.health;
    s.money=Math.max(0, s.money-cost);
    s.health=clamp(s.health+rand(28,42), 0, 100); // 抢救回来一些
    s.hospWarned=true; this.render();
    D({loc:"🏥 突发 · 住院", tw:true,
      lines:[
        ["env",`你一头栽倒，救护车呼啸送医。一通检查折腾下来，住院费 ${E.sym}${fmt(cost)}。`],
        ["doc","年轻人，身体是革命的本钱啊！再这么熬下去、糟蹋下去，下次可就不是住院这么简单了——会出人命的！",{big:true}],
        ["you",`健康 ${before} → ${s.health}。这是最后的警告……以后得给身体留点余地了。`,"think"],
      ],
      choices:[{t:"▶ 出院，继续", cls:"gold", f:next}]});
  },

  /* 技能解锁：全屏动画 + 说明 */
  skillUnlock(o, next){
    this.transition({emoji:o.emoji||"✨", title:o.title, sub:"✨ 技能解锁 ✨", color:o.color||"#3fb950", hold:2300}, ()=>{
      D({loc:"✨ 技能解锁", tw:true,
        lines:[
          ["env",`🎉 您已解锁技能：【${o.title}】`],
          ["env", o.desc],
          ["you","能力又上了一个台阶！","think"],
        ],
        choices:[{t:"▶ 继续", cls:"gold", f:next}]});
    });
  },

  /* 技能经验结算动画：逐项填充经验条，升级显示 +N（学期末） */
  skillLevelAnim(gain, next){
    const s=this.s; this._ensureLvl();
    const rows=SKILL_KEYS.map(k=>({k, m:SKILL_META[k], before:s.lvl[k], beforeXp:s.xp[k], g:gain[k]||0}));
    // 立即提交最终状态（防止快速点继续丢数据），动画仅作展示
    const result=rows.map(r=>{
      let lvl=r.before, xp=r.beforeXp+r.g, ups=0;
      while(lvl<10 && xp>=this.xpNeed(lvl)){ xp-=this.xpNeed(lvl); lvl++; ups++; }
      if(lvl>=10) xp=0;
      s.lvl[r.k]=lvl; s.xp[r.k]=xp;
      if(ups>0) this.addStat(r.k, ups*rand(2,4));   // 升级附带能力小幅提升
      const need=this.xpNeed(lvl); const pct=lvl>=10?100:Math.round(xp/need*100);
      return Object.assign({}, r, {lvl, xp, ups, pct});
    });
    this.render();
    // 实习能力升到 Lv2 → 解锁「有偿实习」全屏动画（仅一次）
    let cont=next;
    const careerRow=result.find(r=>r.k==="career");
    if(careerRow && careerRow.before<2 && careerRow.lvl>=2 && !s.flags.paidInternUnlocked){
      s.flags.paidInternUnlocked=true;
      cont=()=>this.skillUnlock({emoji:"💼", title:"有偿实习", color:"#3fb950",
        desc:"实习能力升到 Lv2！从此实习不再无偿——实习开始有工资，事业度越高、涨薪空间越大。"}, next);
    }
    const html=result.map(r=>`
      <div style="margin:11px 0">
        <div style="display:flex;justify-content:space-between;font-size:13px;font-weight:700">
          <span>${r.m.emoji} ${r.m.act} → ${r.m.nm}　<small style="color:var(--dim)">+${r.g} 经验</small></span>
          <span id="lvtag_${r.k}" style="color:${r.m.color}">Lv.${r.before}</span>
        </div>
        <div style="position:relative;height:14px;background:#0a0d12;border:1px solid var(--line);border-radius:7px;overflow:hidden;margin-top:4px">
          <div id="lvfill_${r.k}" style="height:100%;width:${r.before>=10?100:Math.round(r.beforeXp/this.xpNeed(r.before)*100)}%;background:${r.m.color};transition:width .9s ease"></div>
        </div>
        <div id="lvplus_${r.k}" style="height:16px;font-size:13px;font-weight:900;color:${r.m.color}"></div>
      </div>`).join("");

  /* 德国：逐门公布成绩（紧张感）+ 学期/总平均 */
  revealCoursesDE(data, yrLabel, logs, done){

    const s=this.s; const uk=s.gpaSys==="uk";

    const semTxt = uk ? `${deToUk(data.semGpa)}% ${ukClass(deToUk(data.semGpa))}` : `${data.semGpa}`;

    D({loc:`${s.school} · ${yrLabel} · 成绩公布`,
      lines:[["prof2", uk?"成绩出来了——英国硕士按百分制评定：70+ Distinction，60+ Merit，50+ Pass，不到 50 挂科。":"成绩出来了，一门一门看吧——1.0 最佳，5.0 挂科，别紧张。",{big:true}]],
      extra:`<div class="grades">${rows}<div class="gsum" id="gsum"></div></div>`,
      choices:[], anim:false});
    // 逐门揭晓
    let i=0;
    const step=()=>{
      if(i>=data.courses.length){
        const totGpa=avgGpa(s);
        document.getElementById("gsum").innerHTML=
          `<div class="respop">本学期：通过 <b style="color:var(--green)">${data.passed}</b> · 挂科 <b style="color:var(--red)">${data.failed}</b> 学分</div>`+
          `<div>本学期均绩 <b style="color:var(--gold)">${semTxt}</b> · 总均绩 <b style="color:var(--gold)">${totGpa}</b>${uk?"（英国百分制）":"（1.0 最佳 / 5.0 挂）"}</div>`;
        logs.push(`📊 ${yrLabel}：通过 ${data.passed}、挂科 ${data.failed} 学分，学期均绩 ${semTxt}，总均绩 ${totGpa}`);

  /* 绩点轮盘（中国百分制）：少学分+多时间 → 更高绩点 */
  spinGpa(credits, alloc, yrLabel, logs, done, opts){
    const s=this.s;
    const isCn = s.gpaSys==="cn100";
    const studyW=alloc.study/100, load=(credits-20)/40;
    const xb=(s.xuexi||0);
    let gpa;
    if(isCn){
      const base = (opts&&opts.gpaBaseCn!=null) ? opts.gpaBaseCn : (55 + studyW*40 - load*22 + xb*0.12);
      gpa = Math.round(clamp(base + rand(-6,8), 30, 98));
    }else{
      gpa = Math.round(clamp(2.0 + studyW*2.6 - load*1.4 + xb*0.008 + (Math.random()*0.6-0.3), 0.5, 5.0)*10)/10;
    }
    s.gpaTotal+=gpa; s.gpaCount++; s.lastGpa=gpa;

    // 轮盘扇区
    const segs = isCn
      ? [40,50,55,60,65,72,80,88,95]
      : [1.0,1.7,2.3,3.0,3.5,4.0,4.5,5.0];
    // 找最接近目标的扇区索引作为落点
    let idx=0,best=1e9;
    segs.forEach((v,i)=>{const d=Math.abs(v-gpa); if(d<best){best=d;idx=i;}});

    const advisor = isCn ? "prof" : "prof2";
    D({
      loc:`${s.school} · ${yrLabel} · 绩点开奖`,
      lines:[[advisor,"成绩出来了。来，转盘见真章——命运的绩点轮盘，转起来！🎡"]],
      extra:`<div class="wheelwrap">
        <div class="wheel-cont">
          <div class="pointer"></div>
          <canvas id="wheel" width="260" height="260"></canvas>
        </div>
        <div id="wheelRes" class="hint">旋转中…</div>
      </div>`,
      choices:[]
    });
    drawWheel("wheel", segs, isCn);
    // 旋转到目标扇区
    const n=segs.length, seg=360/n;
    const targetAngle = 360*6 + (360 - (idx*seg + seg/2)); // 指针在顶部
    const cv=document.getElementById("wheel");
    requestAnimationFrame(()=>{ cv.style.transform=`rotate(${targetAngle}deg)`; });
    setTimeout(()=>{
      const txt = isCn ? `绩点 <b style="color:var(--gold);font-size:20px">${gpa}</b> 分` : `绩点 <b style="color:var(--gold);font-size:20px">${gpa}</b> / 5.0`;
      document.getElementById("wheelRes").innerHTML=`<span class="respop">🎉 ${txt}</span>`;

      // 奖学金
      const E=this.econ();
      const good = isCn ? gpa>=80 : gpa>=4.0;
      const mid  = isCn ? gpa>=70 : gpa>=3.3;
      let schAward=0;
      if(good){ schAward=E.schHi; s.money+=schAward; logs.push(`🏆 绩点优异，奖学金 +${E.sym}${fmt(schAward)}！`); }
      else if(mid){ schAward=E.schMid; s.money+=schAward; logs.push(`🥈 绩点良好，奖学金 +${E.sym}${fmt(schAward)}`); }
      logs.push(isCn?`📊 本学年绩点：${gpa} 分`:`📊 本学年绩点：${gpa}/5.0`);
      this.render();
      // 获得奖学金 → 全屏动画提醒，再继续
      if(schAward>0) setTimeout(()=>this.eventSplash({emoji:"🎓", title:"获得奖学金！", sub:`绩点 ${gpa} · ${E.sym}${fmt(schAward)}`, color:"#ffcc4d", hold:1800}, done), 1100);
      else setTimeout(done, 1100);
    }, 4700);
  },

  /* 学年总结 + 退学/继续/毕业 判定 */
  yearSummary(yrLabel, logs){
    this._scene="studyYear";
    const s=this.s;
    const isCn=s.gpaSys==="cn100";

    // 学期数值变化 → 直接显示在顶部仪表盘（箭头+增减）
    if(this._semSnap){
      const cur=this._snapStats(), d={};
      for(const k in cur){ const diff=cur[k]-this._semSnap[k]; if(diff) d[k]=diff; }
      this._semSnap=null; this._showDeltas(d);
    }

    const gpaFail = isCn ? (s.lastGpa<60) : (s.lastGpa>=4.5);
    const failOut = s.creditsFailed>30;
    const advisor = isCn ? "prof" : "prof2";
    // 可申诉的德国院校
    const canAppeal = (s.lineType==="braunschweig"||s.lineType==="stuttgart"||s.lineType==="london");

    if(failOut || gpaFail){
      const reason = failOut ? `累计挂科 ${s.creditsFailed} 学分（超过 30）` : `本学期均绩 ${s.lastGpa}（≥4.5 视为不及格）`;
      const choices=[];
      if(canAppeal) choices.push({t:"⚖️ 提起申诉", sub:"也许还有补救的机会", cls:"gold", f:()=>this.appeal()});
      choices.push({t:"…接受退学", cls:"danger", f:()=>this.afterSchoolFail()});
      return D({loc:`${s.school} · ${yrLabel} 结算`, tw:true,
        lines:[[advisor,`同学……${reason}，按规定要劝退了。`,{big:true}],
               ["you", canAppeal?"不行，我得申诉！":"……就这么结束了。","think"]],
        choices});
    }

    // 毕业条件：必须修满目标学分（90/120）→ 自动毕业，直接进入下一步走向
    const goal=s.creditGoal;
    const canGraduate = s.creditsEarned>=goal;

    const lines=[["env","📊 本学期各项变化见顶部仪表盘 ↑（绿色＋为上升、红色－为下降）"]];
    if(this._semEvent){ lines.push(["env", this._semEvent]); this._semEvent=null; }
    // 女友事件
    if(this._gfEvent==="found"){ lines.push(["gf","在一起吧～以后请多关照！",{big:true}],["env","💕 你脱单了！情商面板已切换为「女友亲密度」。把妹的时间与金钱别省，否则会闹分手。"]); }
    else if(this._gfEvent==="warn"){ lines.push(["gf","你最近是不是不太上心？我们好好谈谈。",{big:true}],["env","⚠️ 吵架预警：女友亲密度跌破 60！再不上心就要分手了。"]); }
    else if(this._gfEvent==="breakup"){ lines.push(["gf","算了……我们还是分开吧。",{big:true}],["env","💔 女友亲密度跌破 50，你们分手了。面板已恢复为「情商」。"]); }
    else if(this._gfEvent==="netbust"){ lines.push(["env","💔 你那位「网恋女友」突然失联——账号注销、电话停机。你愣在原地，才回过味来。面板已恢复为「情商」。"]); }
    this._gfEvent=null;

    if(canGraduate){
      // 修够学分 → 那一刻直接进入毕业全屏动画，不再多问一步
      return this.graduate();
    }
    const remain=Math.max(0,goal-s.creditsEarned);
    lines.push([advisor, remain<10
      ? `平均绩点 ${avgGpa(s)}，已修 ${s.creditsEarned}/${goal} 学分——就差 ${remain} 学分了！差这么一口气，要不去找老师通融通融？`
      : `平均绩点 ${avgGpa(s)}，已修 ${s.creditsEarned}/${goal} 学分。继续加油！`]);
    const choices=[];
    // 期末只差不到 10 学分即可毕业：可向老师求情或武力威胁（差得越少成功率越高）
    if(remain>0 && remain<10){
      const pleadP=Math.round(this._mercyProb(remain)*100);
      const forceP=Math.round(this._threatenProb(remain)*100);
      choices.push({t:"🙇 向老师求情", sub:`差 ${remain} 学分·成功率 ${pleadP}%·失败仍可续读`, cls:"gold", f:()=>this.gradMercy(remain)});
      choices.push({t:"💪 武力威胁老师", sub:`成功率 ${forceP}%（更高）·失败将被开除`, cls:"danger", f:()=>this.gradThreaten(remain)});
    }
    choices.push({t:`📚 继续读（升入下一学期）`, sub:`距毕业还差 ${remain} 学分`, cls:"gold", f:()=>this.beginYear()});
    choices.push({t:"🚪 主动退学", sub: s.lineType==="harbin"?"前往德国·不伦瑞克 重读本科":"放弃学业", cls:"danger", f:()=>this.confirmDropout()});
    D({loc:`${s.school} · ${yrLabel} 结算`, lines, choices});
  },

  // 临毕业差几学分时的「求情/威胁」成功率（差得越少越高）
  _mercyProb(remain){ return clamp(0.5 + (10-remain)/10*0.4 + (this.s.eq||0)/400, 0.4, 0.92); },
  _threatenProb(remain){
    const s=this.s; let p=0.65 + (10-remain)/10*0.3 + (s.wuli||0)/300;
    if(s.hasBaton) p+=0.08;
    return clamp(p, 0.5, 0.96);
  },
  gradMercy(remain){
    const s=this.s;
    if(Math.random()<this._mercyProb(remain)){
      s.creditsEarned=s.creditGoal; this.render();
      return this.eventSplash({emoji:"🙏", title:"求情成功", sub:"老师网开一面，放你毕业", color:"#7ee787"}, ()=>this.graduate());
    }
    D({loc:`${s.school} · 求情未果`, tw:true,
      lines:[["prof2","规矩就是规矩，这几个学分你还得自己修回来。",{big:true}]],
      choices:[{t:"📚 回去再修一学期", cls:"gold", f:()=>this.beginYear()}]});
  },
  gradThreaten(remain){
    const s=this.s;
    if(Math.random()<this._threatenProb(remain)){
      s.creditsEarned=s.creditGoal; this.render();
      return this.eventSplash({emoji:"😰", title:"威胁奏效", sub:"老师“通融”了这几分", color:"#ffcc4d"}, ()=>this.graduate());
    }
    this.eventSplash({emoji:"🚫", title:"威胁失败", sub:"惹怒校方·当场开除", color:"#ff5b5b"}, ()=>this.afterSchoolFail());
  },

  confirmDropout(){
    D({loc:"抉择",
      lines:[["bro","真要退学啊？退了可就回不来了，再想想？"],
             ["you","让我再确认一下……","think"]],
      choices:[{t:"确认退学", cls:"danger", f:()=>this.afterSchoolFail()},
               {t:"↩ 再读一年", f:()=>this.studyYear()}]});
  },

  /* ===================== 退学申诉 + 补课学期 ===================== */
  appeal(){
    const s=this.s; const base=0.4;
    const choices=[];
    if(s.hasBaton) choices.push({t:"🥢 带甩棍去申诉", sub:`成功率 ${Math.round((base+0.35)*100)}%`, cls:"gold", f:()=>this._appealResolve(base+0.35)});
    choices.push({t:"📄 据理力争（正常申诉）", sub:`成功率 ${Math.round(base*100)}%`, f:()=>this._appealResolve(base)});
    choices.push({t:"…算了，接受退学", cls:"danger", f:()=>this.afterSchoolFail()});
    D({loc:"⚖️ 退学申诉", tw:true,
      lines:[
        ["env","你决定向校方申诉，争取一个补救机会。"],
        ["you", s.hasBaton?"实在不行……我揣上甩棍去'讲讲道理'，成功率能高些。":"据理力争，赌一个补课的机会。","think"],
      ],
      choices});
  },
  _appealResolve(prob){
    if(Math.random()<prob){
      D({loc:"⚖️ 申诉成功", tw:true,
        lines:[["prof2","……鉴于你的特殊情况，给你一个补课学期，把挂掉的学分补回来！",{big:true}],
               ["you","谢天谢地！这次必须全过！","think"]],
        choices:[{t:"📚 进入补课学期", cls:"gold", f:()=>this.makeupSemester()}]});
    } else {
      D({loc:"⚖️ 申诉失败", tw:true,
        lines:[["prof2","申诉驳回，规定就是规定。",{big:true}],["you","……认了。","think"]],
        choices:[{t:"…接受退学", cls:"danger", f:()=>this.afterSchoolFail()}]});
    }
  },
  makeupSemester(){
    const s=this.s;
    s.yearInSchool++;
    const retake=Math.max(4, Math.min(80, s.creditsFailed));
    const ls=s.lastSocial||{};
    this._budgetMoney={friend:Math.min(ls.friend||0, s.money), flirt:Math.min(ls.flirt||0, s.money), repay:0}; this._budgetWork=null;
    this.budgetPlan(retake, "补课学期", true);
  },
  makeupDone(yrLabel){
    this._scene="studyYear";
    const s=this.s;
    if(this._semSnap){ const cur=this._snapStats(), d={}; for(const k in cur){ const diff=cur[k]-this._semSnap[k]; if(diff) d[k]=diff; } this._semSnap=null; this._showDeltas(d); }
    // 补课后已修满学分 → 直接进入毕业全屏动画
    if(s.creditsEarned>=s.creditGoal) return this.graduate();
    D({loc:"📚 补课学期 · 结算",
      lines:[
        ["env","📊 数值变化见顶部仪表盘 ↑"],
        ["prof2", `补课结束，累计挂科降到 ${s.creditsFailed}/30。`,{big:true}],
      ],
      choices:[{t:"📚 回到正常学期", cls:"gold", f:()=>this.beginYear()},
         {t:"🚪 退学", cls:"danger", f:()=>this.confirmDropout()}]});
  },

  /* 助学贷款额度上限（按币种） */
  loanCap(){ return this.s.cur==="EUR"?10000:(this.s.cur==="GBP"?9000:80000); },
  /* 助学贷款（在校前两年可申请，年息10%，额度按币种） */
  offerLoan(credits, yrLabel, makeup){
    const s=this.s; const E=this.econ(); const cap=this.loanCap(); const room=Math.max(0, cap-s.loan);
    const def=Math.min(Math.round(cap/2), room);
    D({loc:"🏦 助学贷款", tw:true,
      lines:[
        ["env",`国家/学校「助学贷款」——在校前两年可申请，最多 ${E.sym}${fmt(cap)}，年息 10%，低息友好。`],
        ["you",`已欠 ${E.sym}${fmt(s.loan)}，还能再借 ${E.sym}${fmt(room)}。借多少？`,"think"],
      ],
      extra:`<div class="credit-pick">
        <div class="big"><span id="lv">${def}</span><small style="font-size:16px;color:var(--dim)"> ${E.sym}</small></div>
        <input type="range" id="loanAmt" min="0" max="${room}" step="500" value="${def}"
          oninput="document.getElementById('lv').textContent=this.value">
        <div class="hint">借款立即到账，每年滚 10% 利息；以后可在分配界面还款</div>
      </div>`,
      choices:[
        {t:"🏦 确认借款", cls:"gold", f:()=>{
          const amt=Math.min(room, Math.max(0, Math.round(+document.getElementById("loanAmt").value||0)));
          if(amt<=0){ this.toast("借款金额要大于 0"); return; }
          s.money+=amt; s.loan+=amt;
          s.loanCountries=s.loanCountries||[]; if(!s.loanCountries.includes(s.cur)) s.loanCountries.push(s.cur); // 每个国家仅一次
          this.render();
          this.toast(`已借入 ${E.sym}${fmt(amt)}（欠款 ${E.sym}${fmt(s.loan)}）`);
          this.budgetPlan(credits, yrLabel, makeup);
        }},
        {t:"↩ 不借，回去重新规划", f:()=>this.budgetPlan(credits, yrLabel, makeup)}
      ]});
  },

  /* 任意付款场景金钱不足：就地「借钱周转」，借到钱后回到 back 继续付款 */
  offerQuickLoan(need, back){
    const s=this.s; const E=this.econ();
    const gap=Math.max(0, Math.round(need - s.money));
    const borrow=Math.max(gap, Math.round(E.live*2));            // 借够并略有结余
    const choices=[];
    const loanedHere=(s.loanCountries||[]).includes(s.cur);
    if(s.school && (s.yearInSchool||0)<=2 && !loanedHere){
      const cap=this.loanCap(); const room=Math.max(0,cap-(s.loan||0)); const amt=Math.min(room, Math.max(gap, Math.round(cap/2)));
      if(amt>0) choices.push({t:`🏦 助学贷款 ${E.sym}${fmt(amt)}`, sub:"年息10% · 每个国家仅一次", cls:"gold", f:()=>{
        s.money+=amt; s.loan=(s.loan||0)+amt; s.loanCountries=s.loanCountries||[]; if(!s.loanCountries.includes(s.cur))s.loanCountries.push(s.cur);
        this.render(); this.toast(`助学贷款到账 ${E.sym}${fmt(amt)}`); back();
      }});
    }
    choices.push({t:`💸 借高利贷 ${E.sym}${fmt(borrow)}`, sub:"立刻到账 · 年息30% 利滚利", cls:"danger", f:()=>{
      s.shark=(s.shark||0)+borrow; s.money+=borrow; this.render();
      this.toast(`高利贷到账 ${E.sym}${fmt(borrow)}（欠 ${E.sym}${fmt(s.shark)}）`); back();
    }});
    choices.push({t:"↩ 算了，不借", f:back});
    D({loc:"💸 钱不够！", tw:true,
      lines:[["env",`手头现金不足，还差约 ${E.sym}${fmt(gap)}。要不要借钱周转？借到钱可以回去继续付。`],["you","救急要紧……","think"]],
      choices});
  },

  /* 本金不足：助学贷款 / 兄弟借钱 / 高利贷 / 搏一搏 */
  cantAfford(credits, yrLabel, makeup){
    const s=this.s; const E=this.econ();
    const back=()=>this.budgetPlan(credits, yrLabel, makeup);
    const choices=[];
    if(s.hasGf && s.gfType==="fujie" && !s.gfLoanTaken){
      const lendMax=this.fujieLendMax();
      choices.push({t:"💎 找富姐女友借钱", sub:`无息·每位女友仅一次·亲密度 ${s.gfFavor} → 最多 ${E.sym}${fmt(lendMax)}`, cls:"gold", f:()=>this.borrowFujie(credits,yrLabel,makeup,lendMax)});
    } else if(s.hasGf && s.gfType==="fujie" && s.gfLoanTaken){
      choices.push({t:"💎 富姐女友（已借过）", sub:"同一位女友只能借一次", f:()=>{ this.toast("跟这位富姐已经借过一次啦 🙊"); }});
    }
    const loanedHere=(s.loanCountries||[]).includes(s.cur);
    if(s.school && s.yearInSchool<=2 && !loanedHere)
      choices.push({t:"🏦 申请助学贷款", sub:`最多 ${E.sym}${fmt(this.loanCap())} · 年息10%（低息）· 每国仅一次`, cls:"gold", f:()=>this.offerLoan(credits,yrLabel,makeup)});
    else if(s.school && loanedHere)
      choices.push({t:"🏦 助学贷款（本国已申请）", sub:"每个国家的助学贷款只能申请一次", f:()=>{ this.toast("这个国家的助学贷款已经申请过啦 🙊"); }});
    // 向兄弟借钱（无息，成功率看亲密度；日后可能被讨债）
    if(Object.keys(s.friends||{}).length>0)
      choices.push({t:"🧑‍🤝‍🧑 向兄弟借钱", sub:"无息·成功率看亲密度·日后可能讨债", f:()=>this.borrowBrotherMenu(credits,yrLabel,makeup)});
    choices.push({t:"💸 借高利贷", sub:"立刻到账 · 年息30% 利滚利", cls:"danger", f:()=>this.loanShark(credits,yrLabel,makeup)});
    choices.push({t:"🎲 搏一搏（赌一把）", sub:"斗地主 / 赌球 / Polymarket", f:()=>this.gambleMenu(credits,yrLabel,makeup)});
    choices.push({t:"↩ 返回重新分配", f:back});
    D({loc:"🏦 财务周转", tw:true,
      lines:[["env","需要用钱周转？这几条路子能筹钱——正道、歪道、找兄弟，或赌一把。"],["you","钱要么借、要么挣、要么赌……合计合计。","think"]],
      choices});
  },
  // 富姐可借上限：亲密度越高借得越多（无息）
  fujieLendMax(){ const E=this.econ(); return Math.round(E.live*(2+8*(this.s.gfFavor||0)/100)); },
  // 找富姐女友借钱：自定义金额（上限取决于亲密度），无息，每位女友仅一次
  borrowFujie(credits, yrLabel, makeup, lendMax){
    const s=this.s; const E=this.econ();
    const def=Math.round(lendMax*0.6);
    D({loc:"💎 找富姐女友借钱", tw:true,
      lines:[
        ["gf","缺钱花啦？跟我还客气什么～这次我借你，下不为例哦。",{big:true}],
        ["env",`💗 亲密度 ${s.gfFavor} → 最多可借 ${E.sym}${fmt(lendMax)}（无息·每位女友仅一次）。`],
      ],
      extra:`<div class="credit-pick">
        <div class="big"><input type="number" id="fjNum" value="${def}" min="0" max="${lendMax}" inputmode="numeric"
            style="width:150px;background:#0a0d12;border:1px solid var(--line);border-radius:8px;color:var(--gold);font-weight:900;font-size:30px;text-align:center;padding:4px 6px"
            oninput="Game._fjNumSync()"><small style="font-size:16px;color:var(--dim)"> ${E.sym}</small></div>
        <input type="range" id="fjAmt" min="0" max="${lendMax}" step="${E.socStep}" value="${def}" oninput="Game._fjRangeSync()">
        <div class="hint">上限 ${E.sym}${fmt(lendMax)}（亲密度越高借得越多）</div>
      </div>`,
      choices:[
        {t:"💎 借这笔钱", cls:"gold", f:()=>{
          const amt=clamp(Math.round(+(document.getElementById("fjNum")||{}).value||0),0,lendMax);
          if(amt<=0){ this.toast("金额要大于 0"); return; }
          s.gfLoan=(s.gfLoan||0)+amt; s.money+=amt; s.gfLoanTaken=true; this.render();
          this.toast(`富姐借你 ${E.sym}${fmt(amt)}（无息）`);
          this.budgetPlan(credits, yrLabel, makeup);
        }},
        {t:"↩ 返回", f:()=>this.cantAfford(credits, yrLabel, makeup)}
      ]});
  },
  _fjNumSync(){ const r=document.getElementById("fjAmt"), n=document.getElementById("fjNum"); if(r&&n){ const v=clamp(Math.round(+n.value||0),+r.min,+r.max); r.value=v; } },
  _fjRangeSync(){ const r=document.getElementById("fjAmt"), n=document.getElementById("fjNum"); if(r&&n) n.value=r.value; },
  // 向兄弟借钱：选人 → 手输金额 → 按亲密度判定成败
  borrowBrotherMenu(credits, yrLabel, makeup){
    const s=this.s; const back=()=>this.cantAfford(credits, yrLabel, makeup);
    const ids=Object.keys(s.friends||{});
    if(!ids.length){ this.toast("你还没有兄弟可借"); return back(); }
    const choices=ids.map(id=>{ const fr=s.friends[id]; const nm=this.friendInfo(id).nm;
      const succ=Math.round(clamp(0.25+(fr.fav||0)/130+(VILLAINS.includes(id)?0.25:0),0.1,0.97)*100);
      return {t:`${this.friendInfo(id).face} 找 ${nm} 借`, sub:`亲密度 ${fr.fav||0} · 成功率约 ${succ}%`, f:()=>this.borrowBrother(id, credits, yrLabel, makeup)};
    });
    choices.push({t:"↩ 返回", f:back});
    D({loc:"🧑‍🤝‍🧑 向兄弟借钱",
      lines:[["you","张口借钱伤感情，但眼下也只能找兄弟搭把手了。亲密度越高，越愿意借。","think"]],
      choices});
  },
  borrowBrother(id, credits, yrLabel, makeup){
    const s=this.s; const E=this.econ(); const fr=s.friends[id]; const nm=this.friendInfo(id).nm;
    const max=Math.max(E.socStep, Math.round(E.live*8)); const def=Math.round(E.live*3);
    D({loc:`🧑‍🤝‍🧑 向 ${nm} 借钱`,
      lines:[[id,`借多少？咱兄弟一场，能帮就帮——不过日后我手头紧了，可得还我。`,{big:true}]],
      extra:`<div class="credit-pick">
        <div class="big"><input type="number" id="bbNum" value="${def}" min="0" max="${max}" inputmode="numeric"
            style="width:140px;background:#0a0d12;border:1px solid var(--line);border-radius:8px;color:var(--gold);font-weight:900;font-size:30px;text-align:center;padding:4px 6px"
            oninput="Game._bbNumSync()"><small style="font-size:16px;color:var(--dim)"> ${E.sym}</small></div>
        <input type="range" id="bbAmt" min="0" max="${max}" step="${E.socStep}" value="${def}" oninput="Game._bbRangeSync()">
        <div class="hint">亲密度 ${fr.fav||0} · 借越多越可能被婉拒</div>
      </div>`,
      choices:[
        {t:"🤝 开口借", cls:"gold", f:()=>{
          const amt=clamp(Math.round(+(document.getElementById("bbNum")||{}).value||0),0,max);
          if(amt<=0){ this.toast("金额要大于 0"); return; }
          // 成功率：亲密度越高越易，借越多越难
          const ratio=amt/max;
          // 反派讲哥们儿义气、好面子，开口借钱更容易答应
          const prob=clamp(0.25+(fr.fav||0)/130-ratio*0.35+(VILLAINS.includes(id)?0.25:0), 0.05, 0.97);
          if(Math.random()<prob){
            s.money+=amt; s.broLoan=(s.broLoan||0)+amt; s.broLoanFrom=id;
            fr.fav=clamp((fr.fav||0)-rand(3,7),0,100); this.render();
            this.toast(`${nm} 借了你 ${E.sym}${fmt(amt)}（无息）`);
            D({loc:"🤝 借到了", lines:[[id,`拿去吧，兄弟！记得啊，我用钱的时候你得还。`,{big:true}],["env",`💴 借入 ${E.sym}${fmt(amt)}（共欠兄弟 ${E.sym}${fmt(s.broLoan)}）。亲密度略降。`]],
              choices:[{t:"↩ 回去规划", cls:"gold", f:()=>this.budgetPlan(credits, yrLabel, makeup)}]});
          } else {
            fr.fav=clamp((fr.fav||0)-rand(2,5),0,100); this.render();
            D({loc:"🙅 被婉拒", lines:[[id,`不好意思啊兄弟，我最近也紧巴……少借点行不？`,{big:true}],["env","💸 借款失败，亲密度略降。"]],
              choices:[{t:"↩ 换个法子", cls:"gold", f:()=>this.cantAfford(credits, yrLabel, makeup)}]});
          }
        }},
        {t:"↩ 返回", f:()=>this.borrowBrotherMenu(credits, yrLabel, makeup)}
      ]});
  },
  _bbRangeSync(){ const r=document.getElementById("bbAmt"), n=document.getElementById("bbNum"); if(r&&n) n.value=r.value; },
  _bbNumSync(){ const r=document.getElementById("bbAmt"), n=document.getElementById("bbNum"); if(r&&n){ const v=Math.round(+n.value||0); r.value=clamp(v,+r.min,+r.max); } },
  loanShark(credits, yrLabel, makeup){
    const s=this.s; const E=this.econ(); const cap=Math.round(E.live*12);
    D({loc:"💸 高利贷", tw:true,
      lines:[["env","巷子口的「金主」叼着烟打量你：借钱可以，年息三成，利滚利——还不上，后果自负。"],["you","三成利……是真狠。但眼下也没辙了。","think"]],
      extra:`<div class="credit-pick">
        <div class="big"><span id="lsv">${Math.min(3000,cap)}</span><small style="font-size:16px;color:var(--dim)"> ${E.sym}</small></div>
        <input type="range" id="lsAmt" min="0" max="${cap}" step="500" value="${Math.min(3000,cap)}"
          oninput="document.getElementById('lsv').textContent=this.value">
        <div class="hint">立刻到账，每年滚 30% 利息（比助学贷款狠得多）</div>
      </div>`,
      choices:[
        {t:"💸 确认借款", cls:"danger", f:()=>{
          const amt=Math.min(cap, Math.max(0, Math.round(+document.getElementById("lsAmt").value||0)));
          s.money+=amt; s.shark=(s.shark||0)+amt; this.render();
          this.toast(`高利贷 +${E.sym}${fmt(amt)}（欠 ${E.sym}${fmt(s.shark)}）`);
          this.budgetPlan(credits, yrLabel, makeup);
        }},
        {t:"↩ 算了", f:()=>this.cantAfford(credits, yrLabel, makeup)}
      ]});
  },
  // 搏一搏下注上限（投资股票无上限，但赌博必须有封顶，防止一把梭哈输光家底）
  gambleCap(){ return this.s.cur==="EUR"?10000:(this.s.cur==="GBP"?10000:100000); },
  gambleMenu(credits, yrLabel, makeup){
    const s=this.s; const used=s.gambleUsed||(s.gambleUsed=[]);
    const games=[
      {k:"ddz", nm:"🃏 斗地主", win:0.5,  mult:2.0, desc:"50% 翻倍 · 可买记牌器提升胜率"},
      {k:"ball",nm:"⚽ 赌球",   win:0.45, mult:2.2, desc:"45% 拿 2.2 倍"},
      {k:"poly",nm:"📊 Polymarket 下注", win:0.4, mult:2.6, desc:"40% 拿 2.6 倍"},
    ];
    D({loc:"🎲 搏一搏", tw:true,
      lines:[["env",`手头还有 ${cursym()}${fmt(s.money)}。富贵险中求，押哪个？（每项本回合限玩一次）`]],
      choices: games.map(g=> used.includes(g.k)
          ? {t:`${g.nm}（本回合已玩）`, sub:"每项每回合只能来一次", f:()=>{ this.toast("这一项本回合已经玩过啦 🎲"); }}
          : {t:`${g.nm}`, sub:g.desc, f:()=>this.gamblePlay(g, credits, yrLabel, makeup)})
        .concat([{t:"↩ 不赌了", f:()=>this.cantAfford(credits, yrLabel, makeup)}])});
  },
  // 记牌器价格（按币种）
  cardCounterPrice(){ return this.s.cur==="EUR"?300:(this.s.cur==="GBP"?270:2400); },
  _gbRangeSync(){ const r=document.getElementById("gbAmt"), n=document.getElementById("gbNum"); if(r&&n) n.value=r.value; },
  _gbNumSync(){ const r=document.getElementById("gbAmt"), n=document.getElementById("gbNum"); if(r&&n){ const v=Math.round(+n.value||0); r.value=clamp(v,+r.min,+r.max); } },
  gamblePlay(g, credits, yrLabel, makeup){
    const s=this.s; const cap=this.gambleCap(); const max=Math.min(s.money, cap);
    const isDDZ = g.k==="ddz";
    const hasCC = isDDZ && s.hasCardCounter;
    const winP = clamp(g.win + (hasCC?0.18:0), 0, 0.95);   // 斗地主 + 记牌器：胜率 +18%
    const def=Math.round(max/2); const step=Math.max(100,Math.round(max/40));
    const ccPrice=this.cardCounterPrice();
    const choices=[];
    // 斗地主：可花钱购买记牌器提升胜率
    if(isDDZ && !s.hasCardCounter){
      choices.push({t:`🎴 买记牌器（${cursym()}${fmt(ccPrice)}）`, sub:`胜率 ${Math.round(g.win*100)}% → ${Math.round((g.win+0.18)*100)}%`, f:()=>{
        if(s.money<ccPrice){ this.toast("钱不够买记牌器 💸"); return; }
        s.money-=ccPrice; s.hasCardCounter=true; this.render();
        this.toast("入手·记牌器 🎴 斗地主胜率提升！");
        this.gamblePlay(g, credits, yrLabel, makeup);
      }});
    }
    choices.push(
      {t:"🎲 梭哈！", cls:"gold", f:()=>{
        const bet=clamp(Math.round(+(document.getElementById("gbNum")||{}).value||0), 0, max);
        if(bet<=0){ this.toast("押注金额要大于 0"); return; }
        s.gambleUsed=s.gambleUsed||[]; if(!s.gambleUsed.includes(g.k)) s.gambleUsed.push(g.k); // 每项本回合限一次
        const win=Math.random()<winP;
        if(win){ const gain=Math.round(bet*(g.mult-1)); s.money+=gain; this.render();
          D({loc:`🎲 ${g.nm} · 赢了！`, tw:true, lines:[["env",`🎉 赢了！+${cursym()}${fmt(gain)}（本金 ${cursym()}${fmt(bet)} ×${g.mult}${hasCC?" · 记牌器加成":""}）`],["you","富贵险中求！","think"]],
            choices:[{t:"↩ 回去规划", cls:"gold", f:()=>this.budgetPlan(credits, yrLabel, makeup)},{t:"🎲 再赌一把", f:()=>this.gambleMenu(credits, yrLabel, makeup)}]});
        } else { s.money=Math.max(0,s.money-bet); this.render();
          D({loc:`🎲 ${g.nm} · 输了`, tw:true, lines:[["env",`💸 输光本金 -${cursym()}${fmt(bet)}。`],["you","……下次一定。","think"]],
            choices:[{t:"↩ 回去想办法", cls:"gold", f:()=>this.cantAfford(credits, yrLabel, makeup)}]});
        }
      }},
      {t:"↩ 返回", f:()=>this.gambleMenu(credits, yrLabel, makeup)}
    );
    D({loc:`🎲 ${g.nm}`,
      lines:[["env",`${g.desc}${hasCC?"（已装记牌器 🎴）":""}。押多少？可拖动或直接输入。输了血本无归，赢了乘 ${g.mult}。`]],
      extra:`<div class="credit-pick">
        <div class="big"><input type="number" id="gbNum" value="${def}" min="0" max="${max}" inputmode="numeric"
            style="width:140px;background:#0a0d12;border:1px solid var(--line);border-radius:8px;color:var(--gold);font-weight:900;font-size:30px;text-align:center;padding:4px 6px"
            oninput="Game._gbNumSync()"><small style="font-size:16px;color:var(--dim)"> ${cursym()}</small></div>
        <input type="range" id="gbAmt" min="0" max="${max}" step="${step}" value="${def}"
          oninput="Game._gbRangeSync()">
        <div class="hint">手头 ${cursym()}${fmt(s.money)} · 单注上限 ${cursym()}${fmt(cap)} · 当前胜率 ${Math.round(winP*100)}%</div>
      </div>`,
      choices});
  },

  /* 退学 / 毕业未走红旗 后的去向（按线路分流） */
  afterSchoolFail(){
    this._scene="afterSchoolFail";
    const s=this.s; const lt=this.s.lineType;
    // 辍学 50% 概率获得一个技能升级点（每个学校仅一次）
    const dkey="dropPt_"+(s.school||lt);

  // 德国院校申请费：每次申请 €1000（无论是否录取）
  germanAppFee(){ return this.s.cur==="EUR"?1000:(this.s.cur==="GBP"?900:8000); },
  applyMaster(){
    const s=this.s;
    this.mark(()=>this.applyMaster());
    const g=avgGpa(s);
    const isCn=s.gpaSys==="cn100";
    // 德国制：低=好(5-g)；百分制：高=好(g-60)
    const baseProb = clamp(isCn
      ? 0.05 + ((g-60)/40)*0.7
      : 0.08 + ((5-g)/4)*0.62, 0.05, 0.92);
    // 刷绩点复读（布伦瑞克重读本科）后再战 TUM：录取率最低 80%，随成绩继续提高
    const muProb = s.flags.brGrad ? clamp(Math.max(0.80, baseProb), 0.80, 0.97) : baseProb;
    const gradeDesc = isCn ? `${g} 分（百分制，越高越好）` : `${g}（1.0 最佳 / 5.0 挂）`;
    D({loc:"硕士申请",
      lines:[
        ["prof2",`你本科均绩 ${gradeDesc}。两所学校等你挑——`],
        ["prof2",`慕尼黑工大（TUM）：宽进严出但门槛不低，你这成绩约 ${Math.round(muProb*100)}% 命中，免学费，但报名要先无条件交 €1000 申请费；斯图加特（司徒）：100% 录取，每学期 €1500 学费。`],
      ],
      choices:[
        {t:"🦁 赌慕尼黑 TUM（申请费 €1000）", sub:`成功率约 ${Math.round(muProb*100)}% · 申请费不退`, cls:"gold", f:()=>{
          const fee=this.germanAppFee();
          s.money=Math.max(0,s.money-fee); this.render();
          this.toast(`已交 TUM 申请费 ${cursym()}${fmt(fee)}（不退）`);
          if(Math.random()<muProb){
            this.toast("🎉 TUM offer 到手！");
            this.enterMunich();
          }else{
            const failChoices=[];
            if(!s.flags.brGrad) failChoices.push({t:"✈️ 去布伦瑞克重读本科（刷绩点）", sub:"重读一遍本科冲高绩点，再战 TUM 成功率大增", cls:"gold", f:()=>this.enterBraunschweig()});
            failChoices.push({t:"🏰 接受斯图加特 offer", f:()=>this.enterStuttgart()},
                       {t:"🚩 回国进红旗", f:()=>this.endingHongqi()},
                       {t:"🌃 去上海闯荡", f:()=>this.enterShanghai("car")});
            D({loc:"硕士申请",
              lines:[
                ["prof2","很遗憾，TUM 发来拒信……绩点还是差了那么一点。"],
                ["you", s.flags.brGrad?"再战还是没成……保底去司徒吧。":"唉，要不去德国重读本科刷高绩点，回头再冲 TUM？","think"],
              ],
              choices:failChoices});
          }
        }},
        {t:"🏰 稳进斯图加特（司徒）", sub:"100% offer · 学费€1500/学期", f:()=>this.enterStuttgart()}
      ]});
  },

    s._transferCarried = carried;
    s.school="斯图加特大学（司徒）"; s.gpaSys="de5";
    s.creditsEarned=carried; s.creditsFailed=0; s.yearInSchool=0; s.gpaTotal=0; s.gpaCount=0;
    s.creditGoal=120; s.lineType="stuttgart";
    // 女友需在学习阶段靠情商自行脱单，不再自动赠送
    this.moveCountry("EUR");
    const fee=this.germanAppFee(); s.money=Math.max(0,s.money-fee-1500); // 申请费€1000 + 学费€1500
    if(!s.studentIds.includes(s.school)) s.studentIds.push(s.school);
    this.render();
    this.transition({emoji:"🏰", title:"斯图加特 · 司徒", sub:"关卡通过 · 入学", color:"#4dd0e1"}, ()=>{

      s.flags.jennySkill=true;
      s.examBonus=(s.examBonus||0)+0.10;          // 通过率加成

      this._ensureLvl(); if((s.lvl.xuexi||1)<10){ s.lvl.xuexi=(s.lvl.xuexi||1)+1; } // 立刻升一级学习等级
      out.push(["env",`📚 杰尼龟传你「学霸笔记」——学习等级立刻 +1（现 Lv.${s.lvl.xuexi}），考试通过率与成绩都提升！往后请他吃饭还能继续涨学习经验。`]);
    }
    if(id==="zhao"){
      if(s.major!=="ad" && !s.canStock){

        out.push(["env","📈 你早已会炒股，赵老师把压箱底的「庄家心法」也教给你——今后炒股收益更高，发币割韭菜也更容易让人上车！"]);
      } else if(s.canStock){
        out.push(["env","📈 你和赵老师又切磋了几手行情心得。"]);
      }

  // 结识兄弟的实际花费：仅在结识孔老师后享 25% 折扣（人脉引荐），下限 5 点
  recruitCost(id){
    const s=this.s; const base=(PEOPLE[id]&&PEOPLE[id].cost)||14;
    const f = (s.friends.kong && id!=="kong") ? 0.75 : 1;     // 孔老师人脉广，引荐打 75 折
    return Math.max(5, Math.round(base*f));

  recruitMenu(back){

    const disc = !!s.friends.kong;
    const choices=unmet.map(id=>{ const p=PEOPLE[id]; const base=p.cost||14; const cost=this.recruitCost(id);
      return {t:`${CHARS[id]?CHARS[id].face:"🧑"} 结交 ${p.nm}　消耗义气 ${cost}${cost<base?`（原价 ${base}）`:""}`, sub:`🧠 技能：${p.skill||"—"}　·　${gainText(p.get)}（你有义气 ${s.bro}）`,
        f:()=>{ if(s.bro<cost){ this.toast("兄弟义气不够 🥲"); return; } this.recruitBrother(id, cost, back); }};
    });
    choices.push({t:"↩ 返回", f:back});
    D({loc:"🧲 结识新兄弟",
      lines:[["bro","江湖朋友多了好办事——掏出你的兄弟义气，我给你引荐几位。",{big:true}],["you",`现有兄弟义气 ${s.bro}。结交一位要花掉一些义气。${disc?"\n💡 孔老师人脉引荐，结交价打 75 折。":""}`,"think"]],

  /* ===================== 联系人面板（女友 / 兄弟） ===================== */
  openContacts(){

  // 简洁联系人面板：每行只显示「人名（亲密度）」+ 两个紧凑操作按钮
  contactsPanel(back){
    const s=this.s; const E=this.econ(); const treat=Math.round(E.live*0.4);
    this._contactsBack=back;
    const tn={meinu:"美女",fujie:"富姐",xueba:"女室友",net:"网恋对象"};
    const cbtn=(label,fn,danger)=>`<button onclick="${fn}" style="appearance:none;border:1px solid ${danger?'#5a2424':'var(--line)'};background:${danger?'#241414':'var(--panel2)'};color:var(--txt);padding:7px 9px;border-radius:9px;font-size:12.5px;font-weight:600;cursor:pointer;white-space:nowrap">${label}</button>`;
    const row=(left,btns)=>`<div style="display:flex;align-items:center;gap:6px;padding:8px 2px;border-bottom:1px dashed var(--line)"><span style="flex:1;font-size:14px;min-width:0">${left}</span>${btns}</div>`;
    const rows=[];
    // 女友 / 单身
    if(s.hasGf){
      const ld = this.isLongDistance();
      const inviteBtn = ld ? cbtn(`✈️团聚${s.semFlags&&s.semFlags.inviteTried?"(已试)":""}`,"Game.cInvite()") : "";
      rows.push(row(`💗 女友（${tn[s.gfType]||"女友"}）<b style="color:var(--pink)">（${s.gfFavor}）</b>${s.gfWarned?' ⚠️':''}${ld?' 🌧️异地':''}`, cbtn("🎁送礼物","Game.cGift()")+inviteBtn+cbtn("💔分手","Game.cBreak()",true)));
    }
    else rows.push(`<div style="padding:8px 2px;border-bottom:1px dashed var(--line);font-size:14px;color:var(--dim)">💗 感情状态：单身</div>`);
    // 兄弟
    const ids=Object.keys(s.friends||{});
    if(ids.length) ids.forEach(id=>{ const fr=s.friends[id]; const fi=this.friendInfo(id);
      const tb=this._treatBonus(id); const used=(s.semTreated||[]).includes(id);
      const tag = (tb && !used) ? ` <span style="color:var(--gold);font-size:10.5px">🎁${tb.label}</span>` : "";
      rows.push(row(`${fi.face} ${fi.nm}<b style="color:var(--gold)">（${fr.fav||0}）</b>${tag}`, cbtn("🍻请吃饭",`Game.cTreat('${id}')`)+cbtn("✂️绝交",`Game.cCut('${id}')`,true)));
    });
    else rows.push(`<div style="padding:8px 2px;font-size:14px;color:var(--dim)">🧑‍🤝‍🧑 暂无结识的兄弟</div>`);
    const blocked=(s.blocked||[]).length?`<div class="hint" style="text-align:left;margin-top:6px">🚫 已拉黑：${s.blocked.map(k=>({meinu:"美女",fujie:"富姐",xueba:"女室友"}[k]||k)).join("、")}（无法再攻略）</div>`:"";
    D({loc:"📇 联系人",
      lines:[["env",`📇 联系人 · 请吃饭 ${E.sym}${fmt(treat)}/次${s.semTreatN?`（已请 ${s.semTreatN} 次·递减）`:""}`]],
      extra:`<div style="background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:2px 11px">${rows.join("")}</div>${blocked}`,
      choices:[{t:"↩ 返回", cls:"gold", f:back}]});
  },
  cGift(){ this.giftGf(this._contactsBack); },
  cInvite(){ this.inviteGfOver(()=>this.contactsPanel(this._contactsBack)); },
  cBreak(){ this.breakUp({sub:"你主动结束了这段关系", lines:[["you","对不起，我们还是分开吧。","think"],["env","💔 你主动提出了分手。面板已切回「情商」。"]]}, this._contactsBack); },
  cCut(id){ this.cutBrotherMenu(id, ()=>this.contactsPanel(this._contactsBack)); },
  cTreat(id){
    const s=this.s; const E=this.econ(); const treat=Math.round(E.live*0.4); const back=this._contactsBack;
    const fr=s.friends[id]; if(!fr) return; const nm=this.friendInfo(id).nm;
    if(s.money<treat){ return this.offerQuickLoan(treat, ()=>this.contactsPanel(back)); }
    const tb=this._treatBonus(id); const used=(s.semTreated||[]).includes(id);
    const decay=Math.pow(0.6, s.semTreatN||0);
    // 反派（小苦逼/昂哥/加菲猫）爱占小便宜，请一顿饭亲密度涨得格外快
    const villBoost=VILLAINS.includes(id)?1.8:1;
    const gain=Math.max(1, Math.round(rand(8,16)*decay*villBoost));
    s.money-=treat; fr.fav=clamp((fr.fav||0)+gain,0,100); this.addStat("bro",Math.max(1,Math.round(rand(1,3)*decay)));
    s.semTreatN=(s.semTreatN||0)+1;
    let extraMsg="";
    if(tb && !used){
      s.semTreated=s.semTreated||[]; s.semTreated.push(id);
      if(tb.kind==="aruba"){ s.xuziTreats=(s.xuziTreats||0)+1; extraMsg="　旭子领情，往后阿鲁巴更收敛 🪜↓"; }
      else { const g=this.addStat(tb.stat, rand(3,6)); if(g>0) extraMsg=`　${tb.label.replace("↑","")} +${g}`; }

    this.render();

  /* ===================== 反派兄弟·学期负面事件 + 绝交系统 ===================== */
  // 学期结算时掷骰：在联系人里的反派各自按"已触发次数"递减概率，至多触发一个
  _rollVillain(){
    const s=this.s; this._pendingVillain=null;
    const present=VILLAINS.filter(id=>s.friends[id]);
    if(!present.length) return;
    for(const id of present){
      if(id==="garf" && s.flags.warnedGarf) continue;   // 勇哥护卫队：免疫加菲猫精神内耗
      const fr=s.friends[id]; const n=fr.triggers||0;
      const base = id==="ang"?0.4:0.5;
      const prob = clamp(base*Math.pow(0.55,n), 0.04, 0.6);
      if(Math.random()<prob){ fr.triggers=n+1; this._pendingVillain={id}; break; }
    }
  },

  // 给女友送礼物：自定义金额，增加亲密度（边际递减）
  // 送礼亲密度：每「1% 现金」恢复 1 点（每点最低消耗按币种 100€ 等值），越有钱每点越贵
  giftPointCost(){ const s=this.s; const floor = s.cur==="GBP"?90:(s.cur==="CNY"?800:100); return Math.max(floor, Math.round(s.money*0.01)); },
  giftGf(back){
    const s=this.s; const E=this.econ(); const sym=cursym(); const max=s.money;
    const per=this.giftPointCost();
    const def=Math.min(max, per*5);
    D({loc:"🎁 给女友送礼物", tw:true,
      lines:[["gf","哎呀，你也太有心了吧～",{big:true}],["env",`手头 ${sym}${fmt(max)}。每花 ${sym}${fmt(per)}（约 1% 现金、最低 ${sym}${fmt(per)}）亲密度 +1。${s.semGiftN?`本学期已送 ${s.semGiftN} 次。`:""}`]],
      extra:`<div class="stockbox"><input type="number" id="giftAmt" value="${def}" min="0" max="${max}" inputmode="numeric" style="width:160px;background:#0a0d12;border:1px solid var(--line);border-radius:8px;color:var(--gold);font-weight:900;font-size:26px;text-align:center;padding:6px"><div class="hint">手头 ${sym}${fmt(max)} · 每 ${sym}${fmt(per)} 换 1 点亲密度</div></div>`,
      choices:[
        {t:"🎁 送出礼物", cls:"gold", f:()=>{
          const amt=clamp(Math.round(+(document.getElementById("giftAmt")||{}).value||0),0,max);
          if(amt<=0){ this.toast("金额要大于 0"); return; }
          s.money-=amt;

  // 年底结算投资（resolveYear / 上海推进一年时调用）：波动收益 + 准备走势图动画
  // 纳指：平均 +15%，上下波动 25%（约 -10%~+40%）；A股：平均 -20%，上下波动 80%（约 -100%~+60%）
  settleStock(logs){
    const s=this.s; const p=s.pendingStock; if(!p) return;
    s.pendingStock=null; const sym=cursym();
    const zb=s.flags.zhaoStockBoost?12:0;   // 赵老师庄家心法：平均收益 +12%
    let mult, vol, title;
    if(p.type==="nasdaq"){ mult=Math.max(0, 1+(15+zb+(Math.random()*2-1)*25)/100); vol=0.05; title="定投纳指"; }
    else if(p.type==="air"){ const r=Math.random(); mult = r<0.10?5 : (r<0.30?2 : 0); vol=0.22; title="炒空气币"; }
    else { mult=Math.max(0, 1+(-20+zb+(Math.random()*2-1)*80)/100); vol=0.16; title="All in A股"; }
    const finalVal=Math.round(p.staked*mult); const profit=finalVal-p.staked;
    s.money+=finalVal;                                  // 本金已在建仓时扣除，这里返还终值
    if(profit<0) s.stockLoss=(s.stockLoss||0)+(-profit)*RATES[s.cur];
    logs.push(`📈 ${title}年底结算：本金 ${sym}${fmt(p.staked)} → ${sym}${fmt(finalVal)}（${profit>=0?"净赚":"亏损"} ${sym}${fmt(Math.abs(profit))}）`);
    // 走势图动画数据（结算时逐点揭秘悬念）
    this._stockAnim={title, invest:p.staked, points:this._genPath(p.staked, mult, vol, 16), profit, sym};
  },

  _coinCompensate(id, next){
    const s=this.s; const E=this.econ(); const fr=s.friends[id]; const nm=this.friendInfo(id).nm;
    const amt=(s.coin.investors||{})[id]||0; const max=Math.min(amt, s.money);
    const comp=clamp(Math.round(+(document.getElementById("cmpNum")||{}).value||0), 0, max);
    s.money-=comp;
    const ratio = amt>0 ? comp/amt : 1;
    const forgiveP=clamp(0.12+ratio*0.82, 0.1, 0.97);
    s._coinQueue.shift();
    let line;
    if(Math.random()<forgiveP){ fr.fav=clamp((fr.fav||0)+rand(0,6),0,100);
      line=["env",`✅ ${nm} 收下 ${E.sym}${fmt(comp)} 赔偿，气也消了，关系保住（亲密度 ${fr.fav}）。`]; }
    else { delete s.friends[id]; this.addStat("bro",-rand(3,8));
      line=["env",`💔 ${nm} 嫌 ${E.sym}${fmt(comp)} 太少，钱收了人还是绝交了，兄弟义气受损。`]; }
    this.render();
    D({loc:"💴 赔偿", tw:true, lines:[line], choices:[{t:"▶ 下一位", cls:"gold", f:()=>this._coinCrashNext(next)}]});
  },
  _coinCutInvestor(id, next){
    const s=this.s; const fr=s.friends[id]; const nm=this.friendInfo(id).nm;
    delete s.friends[id]; this.addStat("bro",-rand(5,12));
    s._coinQueue.shift(); this.render();

  /* ===================== 上海支线 ===================== */
  // 岗位元数据：名称 / 基础年薪
  jobMeta(job){ return ({
    quant:   {nm:"量化机构",     base:1000000},
    newforce:{nm:"造车新势力",   base:600000},
    car:     {nm:"传统车企",     base:300000},
  })[job] || {nm:"传统车企", base:300000}; },
  // 实际年薪：量化＝60万+毕业证*10万；新势力＝40万+毕业证*5万；其余按基薪×毕业证加成
  jobSalary(job){
    const n=this.s.diplomas.length||0;
    if(job==="quant")    return 600000 + n*100000;
    if(job==="newforce") return 400000 + n*50000;
    return Math.round(this.jobMeta(job).base * this.degreeMult());

  shanghaiJobMenu(){

    if(s.flags.beatBoss && !s.flags.blacklistDone){ s.flags.blacklistDone=true; return this.endingBlacklist(); }

    let choices;

    else return this.enterShanghai("car"); // 内燃机/无方向：只能进传统车企

  // 上海·一年时间规划（参照读书的多项分配：工作/社交/女友/健身）
