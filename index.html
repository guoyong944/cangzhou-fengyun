  _readShAlloc(){ const a={work:0,social:0,love:0,fit:0}; document.querySelectorAll('#shAlloc input').forEach(i=>a[i.dataset.sk]=+i.value); return a; },
  _shSync(){ let t=0; document.querySelectorAll('#shAlloc input').forEach(i=>{ t+=+i.value; const el=document.getElementById("sha_"+i.dataset.sk); if(el) el.textContent=i.value; });
    const p=document.getElementById("shPool"); if(p) p.textContent=t; const n=document.getElementById("shNote");
    if(n) n.innerHTML = t>100?`<span style="color:var(--red)">超 ${t-100}·更耗健康</span>`:(t<100?`<span style="color:var(--green)">余 ${100-t}·更养身</span>`:`<span style="color:var(--gold)">刚好</span>`); },

  shanghaiAdvanceYear(){ this.coinCrashCheck(()=>this._shanghaiAdvanceYear0()); },
  _shanghaiAdvanceYear0(){
    const s=this.s; s.shYears++; s.age++;
    const logs=[]; const a=s.lastShAlloc||{work:50,social:15,love:15,fit:20};
    s.money += s.incomeY; logs.push(`💼 年薪到账 +¥${fmt(s.incomeY)}`);
    this.autoRepayAtWork(logs);
    s.money = Math.max(0, s.money - s.costY); logs.push(`🏠 上海生活开销 -¥${fmt(s.costY)}`);
    this.settleStock(logs); // 年底结算投资（可能设置走势图动画）
    // 工作分配 → 年终奖 + 涨薪机会
    if((a.work||0)>0){
      const bonus=Math.round(s.incomeY*(a.work/100)*0.2); if(bonus>0){ s.money+=bonus; logs.push(`🎯 工作投入·年终奖 +¥${fmt(bonus)}`); }
      if(a.work>=40 && Math.random()<a.work/240){ s.incomeY=Math.round(s.incomeY*1.12); logs.push(`📈 表现出色·涨薪！年薪升至 ¥${fmt(s.incomeY)}`); }
    }
    // 社交 → 兄弟义气/人脉
    if((a.social||0)>0){ const g=this.addStat("bro",Math.round(a.social*0.1)); this.addStat("renmai",Math.round(a.social*0.06)); if(g) logs.push(`🍻 社交，兄弟义气 +${g}`); }
    // 女友 → 亲密度
    if(s.hasGf){ const gd=Math.round(((a.love||0)-25)*0.4); s.gfFavor=clamp(s.gfFavor+gd,0,100); logs.push(`${gd>=0?"💞":"💔"} 陪伴女友，亲密度 ${gd>=0?"+":""}${gd}`); }
    // 健康：岗位强度损耗 + 年龄 − 健身/余力
    const adrain=this.ageHealthDrain();
    const jobDrain = s.job==="quant"?rand(6,14) : (s.job==="newforce"?rand(12,22) : rand(1,4));
    const used=(a.work||0)+(a.social||0)+(a.love||0)+(a.fit||0);
    const over = used>100?Math.round((used-100)*(rand(20,45)/100)):0;
    const heal = Math.round((a.fit||0)*0.22) + (used<100?Math.round((100-used)*0.15):0);
    const net = heal - jobDrain - adrain - over;
    s.health=clamp(s.health+net,0,100);
    logs.push(`🩺 岗位强度 -${jobDrain}${over?`　透支 -${over}`:""}${adrain?`　年龄 -${adrain}`:""}　健身/休息 +${heal}（净 ${net>=0?"+":""}${net}）`);
    this.render();
    // 先放投资走势图动画（若有建仓），再走后续判定
    const proceed=()=>{
      if(s.health<=0) return this.endingDeath();
      // 传统车企：干满两年触发裁员 → 回老家送外卖
      if(s.job==="car" && s.shYears>=2 && !this.isBuffett()) return this.carLayoffEvent(logs);
      // 造车新势力：健康掉到一定程度 → 生病住院 → 辞职抉择
      if(s.job==="newforce" && s.health<35 && !s.flags.newforceQuit){ s.flags.newforceQuit=true; return this.newforceHospitalEvent(logs); }
      if(this.isBuffett()) return this.endingBuffett();

  aachenRound(){

    if(s.papers>=5) return this.endingScholarLord();
    if(s.phdYear>=8){ // 延毕过久 → 博士退学兜底

    D({loc:`🔬 亚琛博士 · 第${s.phdYear+1}年 · 时间规划`, art:"germany",
      lines:[
        ["prof2",`论文进度 ${s.papers}/5，博士第 ${s.phdYear+1} 年。每月 €3000 津贴照发。分配这一年的精力——科研多投论文，也别忘社交，留点余力休息养身。`,{big:true}],
      ],
      extra:`<div class="alloc" id="phdAlloc">
        <div class="row"><div class="nm">科研<small>投论文·涨学习力</small></div>
          <input type="range" min="0" max="100" step="5" value="${la.research}" data-k="research" oninput="Game._phdAllocSync()">
          <div class="amt" id="pamt_research">${la.research}</div></div>
        <div class="row"><div class="nm">社交<small>兄弟义气</small></div>
          <input type="range" min="0" max="100" step="5" value="${la.social}" data-k="social" oninput="Game._phdAllocSync()">
          <div class="amt" id="pamt_social">${la.social}</div></div>
        <div class="pool">已用精力 <b id="phdPoolUsed">0</b> / ${cap}　<span id="phdSleepNote"></span></div>
      </div>`,
      choices:[
        {t:"🔬 确定，投入这一年", cls:"gold", f:()=>{ const a=this._readPhdAlloc(); s.lastPhdAlloc=a; this.aachenResolve(a); }},
      ]});
    this._phdAllocSync();
  },
  _readPhdAlloc(){ const a={research:0,social:0}; document.querySelectorAll('#phdAlloc input').forEach(i=>a[i.dataset.k]=+i.value); return a; },
  _phdAllocSync(){
    let used=0; document.querySelectorAll('#phdAlloc input').forEach(i=>{ used+=+i.value; const el=document.getElementById("pamt_"+i.dataset.k); if(el) el.textContent=i.value; });
    const cap=this.energyCap(); const pu=document.getElementById("phdPoolUsed"); if(pu) pu.textContent=used;
    const note=document.getElementById("phdSleepNote"); if(!note) return;
    if(used>cap) note.innerHTML=`<span style="color:#f5a623">超 ${used-cap}%·睡眠不足（有可能影响健康）</span>`;
    else if(used<cap) note.innerHTML=`<span style="color:var(--green)">余 ${cap-used}%·可休息回血</span>`;
    else note.innerHTML=`<span style="color:var(--gold)">刚好</span>`;
  },
  aachenResolve(alloc){ this.coinCrashCheck(()=>this._aachenResolve0(alloc)); },
  _aachenResolve0(alloc){
    const s=this.s; const E=this.econ(); s.phdYear++; s.age++;
    const logs=[];
    // 收入：博士每月 €3000 工资
    const income=3000*12, living=E.live*12;
    s.money += income; this.autoRepayAtWork(logs); s.money=Math.max(0, s.money - living);
    logs.push(`🎓 博士工资 +€${fmt(income)}（€3000/月），生活开销 -€${fmt(living)}`);
    // 健康：精力透支掉血，留有余力则休息回血（保底 +1）
    const cap=this.energyCap();
    const used=(alloc.research||0)+(alloc.social||0);
    let hp=0;
    if(used>cap){ const dx=Math.round((used-cap)*(rand(20,50)/100)*(s.healthDrainMult||1))+rand(0,2); hp-=dx; logs.push(`😵 精力透支，睡眠不足，健康 -${dx}`); }
    else if(used<cap){ const heal=Math.max(2,Math.round((cap-used)*(rand(28,58)/100))); hp+=heal; logs.push(`😴 留有余力，休整恢复，健康 +${heal}`); }
    const ad=this.ageHealthDrain(); if(ad>0){ hp-=ad; logs.push(`⏳ 年纪渐长（${s.age}岁），健康 -${ad}`); }
    s.health=clamp(s.health+hp,0,100);
    // 社交
    if(alloc.social>0){ const g=this.addStat("bro", Math.round(alloc.social*0.25*(s.broMult||1))); if(g>0) logs.push(`🍻 兄弟义气 +${g}`); }
    // 学习力
    if(alloc.research>0){ const xg=this.addStat("xuexi", Math.round(alloc.research*0.04*(s.xuexiMult||1))); if(xg>0) logs.push(`🧠 钻研学问，学习力 +${xg}`); }
    // 论文投稿：科研时间决定投稿篇数与中稿率（+ 学习力）
    const r=(alloc.research||0)/100;
    const attempts=Math.max(1, Math.round(r*3 + 0.5));
    const pPass=clamp(0.18 + r*0.5 + (s.xuexi||0)/350, 0.08, 0.92);
    const subs=[]; let got=0;
    for(let i=0;i<attempts;i++){ const ok=(Math.random()<pPass) && (s.papers+got)<5; if(ok) got++; subs.push(ok); }
    s.papers=Math.min(5, s.papers+got);
    logs.push(got>0?`📄 ${got} 篇论文中稿（累计 ${s.papers}/5）`:`📄 今年投稿全被拒，颗粒无收……`);
    this.render();
    const proceed=()=>{
      if(s.health<=0) return this.endingDeath();
      if(s.papers>=5) return this.endingScholarLord();
      // 博士第二年：回合肥结婚（邀请好友贺喜·随礼）
      if(s.phdYear>=2 && !s.flags.phdMarried){ s.flags.phdMarried=true; return this.phdMarriageEvent(logs); }
      D({loc:`🔬 亚琛博士 · 第${s.phdYear}年小结`, art:"germany", lines:[["env",logs.join("\n")]],
        choices:[{t:"▶ 继续", cls:"gold", f:()=>this.aachenRound()}]});
    };
    // 先逐篇公布投稿结果，再处理后续
    const afterReveal=()=>{ if(s.health<=15 && !s.hospWarned) return this.hospitalEvent(proceed); proceed(); };
    this.revealPapers(subs, afterReveal);
  },
  // 逐篇公布投稿结果（替代"公布每门课成绩"）
  revealPapers(subs, done){
    const s=this.s;
    const rows=subs.map((ok,i)=>`<div class="crow" id="prow_${i}"><span class="cn">投稿论文 ${i+1}</span><span class="cg" id="pcg_${i}">投稿中…</span></div>`).join("");
    D({loc:`🔬 亚琛博士 · 第${s.phdYear}年 · 投稿结果`, art:"germany",
      lines:[["prof2","投出去的稿子，期刊编辑部陆续回信了——一封一封看吧。",{big:true}]],
      extra:`<div class="grades">${rows}<div class="gsum" id="pgsum"></div></div>`, anim:false, choices:[]});
    if(!document.getElementById("pgsum")) return done(); // 无 DOM（测试）直接继续
    let i=0;
    const step=()=>{
      if(i>=subs.length){
        const el=document.getElementById("pgsum");
        if(el) el.innerHTML=`<div class="respop">论文进度 <b style="color:var(--gold)">${s.papers}/5</b></div>`;
        return setTimeout(done, 1200);
      }
      const el=document.getElementById("pcg_"+i), row=document.getElementById("prow_"+i);
      if(el){ el.innerHTML = subs[i] ? `<b style="color:var(--green)">中稿</b> ✅` : `<b style="color:var(--red)">被拒</b> ❌`;
        el.classList.add("respop"); if(row) row.classList.add("lit"); }
      i++; setTimeout(step, 650);
    };
    setTimeout(step, 700);
  },

  // 生成一条从 start 到 start*mult 的价格路径（带波动）
  _genPath(start, mult, vol, n){
    const target=start*mult;
    // 走势形态随机：0=先跌到近乎血本无归再反弹，1=先冲高再跳水，2=普通波动。让折线更有戏剧性。
    const mode=rand(0,2);
    const extreme = mode===0 ? start*(0.03+Math.random()*0.22)    // 先暴跌（跌到本金 3%~25%）
                  : mode===1 ? start*(1.35+Math.random()*0.95)    // 先暴涨（冲到本金 135%~230%）
                  : null;
    const ki = Math.max(2, Math.floor((n-1)*(0.35+Math.random()*0.3)));  // 极值点位置
    const pts=[Math.round(start)];
    for(let i=1;i<n-1;i++){
      let base;
      if(extreme!=null && i<=ki){ const t=i/ki; base=start+(extreme-start)*t; }                 // 起点 → 极值
      else if(extreme!=null){ const t=(i-ki)/((n-1)-ki); base=extreme+(target-extreme)*t; }      // 极值 → 终值
      else { const t=i/(n-1); base=start+(target-start)*t; }
      const noise=base*vol*(Math.random()*2-1);
      pts.push(Math.max(0,Math.round(base+noise)));
    }
    pts.push(Math.max(0,Math.round(target))); return pts;
  },
  // 年度资产走势曲线动画（紧张刺激地逐点跳动，最后揭晓收益）
  assetCurve(o, next){
    const pts=o.points, n=pts.length, sym=o.sym||cursym();
    const W=320,H=150,pad=14;
    const min=Math.min(...pts), max=Math.max(...pts), rng=(max-min)||1;
    const X=i=>pad+i*(W-2*pad)/(n-1), Y=v=>H-pad-(v-min)/rng*(H-2*pad);
    D({loc:"📈 年度资产走势",
      lines:[["env",`${o.title||"本年度投资"}　投入 ${sym}${fmt(o.invest)}`]],
      extra:`<div class="stockbox">
        <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:170px;background:#0a0d12;border-radius:8px">
          <polyline id="curveLine" fill="none" stroke="var(--gold)" stroke-width="2.5" points=""/>
          <circle id="curveDot" r="4" fill="#fff" style="display:none"/>
        </svg>
        <div class="reel" id="curveVal">${sym}${fmt(pts[0])}</div>
        <div class="hint" id="curveNote">实时行情跳动中……</div>
      </div>`,
      choices:[{t:"▶ 查看收益", cls:"gold", id:"curveGo", f:next}]});
    const line=document.getElementById("curveLine"), dot=document.getElementById("curveDot"),
          valEl=document.getElementById("curveVal"), go=document.getElementById("curveGo");
    if(!line){ return; }
    if(go) go.style.display="none";
    let i=0; const pStr=[];
    (this._curveTimers||[]).forEach(clearTimeout); this._curveTimers=[];
    const step=()=>{
      const x=X(i), y=Y(pts[i]); pStr.push(`${x.toFixed(1)},${y.toFixed(1)}`);
      line.setAttribute("points", pStr.join(" "));
      if(dot){ dot.style.display=""; dot.setAttribute("cx",x); dot.setAttribute("cy",y); }
      if(valEl){ const up=pts[i]>=pts[0]; valEl.textContent=sym+fmt(pts[i]); valEl.style.color=up?"var(--green)":"var(--red)"; }
      i++;
      if(i<n){ this._curveTimers.push(setTimeout(step,95)); }
      else { const note=document.getElementById("curveNote"); const p=o.profit;
        if(note) note.innerHTML=`收盘：本金 ${sym}${fmt(o.invest)} → <b style="color:${p>=0?'var(--green)':'var(--red)'}">${sym}${fmt(o.invest+p)}</b>（${p>=0?'+':''}${sym}${fmt(p)}）`;
        if(go) go.style.display=""; }
    };
    this._curveTimers.push(setTimeout(step,300));
  },

  /* 战斗系统：横屏=玩手游(攻击)，竖屏=放抖音(回血)              */
  /* ========================================================= */
  battle(cfg){
    this._scene=null;
    const s=this.s;
    const me={hp:100,max:100};
    const en={hp:cfg.hp,max:cfg.hp};
    const log=[];
    let busy=false, ended=false;

    const render=()=>{
      const landscape = isLandscape();
      const fx=this._fx; this._fx=null;
      const enFloat = fx&&fx.target==="enemy" ? `<div class="dmgfloat down">-${fx.dmg}</div>` : "";
      const meFloat = fx&&fx.target==="me" ? `<div class="dmgfloat ${fx.heal?'up':'down'}">${fx.heal?'+':'-'}${fx.dmg}</div>` : "";
      sceneRaw(`<div class="loc">⚔️ 战斗</div>
        <div id="battle">
          <div class="fighter ${fx&&fx.target==='enemy'?'shake':''}">
            ${enFloat}
            <div class="top"><span style="font-size:18px">${cfg.emoji} ${cfg.name}</span><span>${en.hp}/${en.max}</span></div>
            <div class="hpbar"><i style="width:${en.hp/en.max*100}%"></i></div>
          </div>
          <div class="fighter ${fx&&fx.target==='me'&&!fx.heal?'shake':''}">
            ${meFloat}
            <div class="top"><span>🧑 你${s.hasBaton?" 🥢":""}</span><span>${me.hp}/${me.max}</span></div>
            <div class="hpbar"><i style="width:${me.hp/me.max*100}%;background:linear-gradient(90deg,#3fb950,#58a6ff)"></i></div>
          </div>
          <div class="orient">📱 当前：<b>${landscape?"横屏 → 玩手游（攻击）":"竖屏 → 放抖音（回血/降攻）"}</b><br>
            <small>把手机${landscape?"竖过来可切换为防御":"横过来可切换为攻击"}，或直接点下方按钮</small>
          </div>
          <button class="bigbtn" id="actBtn">${landscape?"🎮 横屏·玩手游 出击！":"📲 竖屏·放抖音 回血！"}</button>
          <div class="blog" id="blog">${log.slice(-6).map(l=>"· "+l).join("<br>")||"开打！"}</div>
        </div>`, [], {anim:false});
      document.getElementById("actBtn").onclick=act;
    };

    const enemyTurn=()=>{
      const dmg=Math.round(rand(cfg.atk[0],cfg.atk[1]) * (cfg.rigged?1.3:1));
      me.hp=Math.max(0,me.hp-dmg);
      this._fx={target:"me", dmg:dmg};
      log.push(`${cfg.name} 反击，你 -${dmg}`);
      if(me.hp<=0){ ended=true; render();
        setTimeout(()=>cfg.onLose&&cfg.onLose(),700); return; }
      busy=false; render();
    };

    const act=()=>{
      if(busy||ended) return; busy=true;
      if(isLandscape()){
        // 攻击
        let dmg=rand(8,16) + (s.hasBaton?rand(6,12):0);
        if(cfg.rigged) dmg=Math.round(dmg*0.55); // 序幕削弱：打不过
        en.hp=Math.max(0,en.hp-dmg);
        this._fx={target:"enemy", dmg:dmg};
        log.push(`你${s.hasBaton?"抡起甩棍":"挥拳"}，造成 ${dmg} 伤害`);
        render();
        if(en.hp<=0){ ended=true; setTimeout(()=>cfg.onWin&&cfg.onWin(),700); return; }
        setTimeout(enemyTurn,500);
      }else{
        // 回血/降攻
        const heal=rand(6,14);
        me.hp=Math.min(me.max,me.hp+heal);
        this._fx={target:"me", dmg:heal, heal:true};
        log.push(`你刷抖音回了口气，+${heal} 状态`);
        render();
        setTimeout(enemyTurn,500);
      }
    };

    this._battleResize=render;
    render();
  },
};

/* ---------------- 工具函数 ---------------- */
function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function fmt(n){return Math.round(n).toLocaleString("en-US");}
function cursym(){return ({CNY:"¥",EUR:"€",GBP:"£"})[Game.s&&Game.s.cur]||"¥";}
function mny(n){return cursym()+fmt(n);}
function avgGpa(s){ if(!s.gpaCount) return s.gpaSys==="de5"?"0.0":(s.gpaSys==="uk"?"—":"0");
  const a=s.gpaTotal/s.gpaCount;
  if(s.gpaSys==="uk"){ const p=deToUk(a); return `${p}% ${ukClass(p)}`; }
  return s.gpaSys==="de5"?a.toFixed(1):Math.round(a); }
// 英国硕士绩点：把内部德国分制(1.0最佳~5.0挂)换算成英国百分制与等级
function deToUk(de){ return clamp(Math.round(95-(de-1)*14), 25, 95); }
function ukClass(pct){ return pct>=70?"Distinction":(pct>=60?"Merit":(pct>=50?"Pass":"Fail")); }
function isLandscape(){
  if(window.matchMedia) return window.matchMedia("(orientation: landscape)").matches;
  return window.innerWidth>window.innerHeight;
}

/* 渲染一个场景：内容 + 选项按钮 */
function sceneRaw(html, choices, opts){
  opts=opts||{};
  const scr=document.getElementById("screen");
  let btns="";
  if(choices&&choices.length){
    btns=`<div class="choices">`+choices.map((c,i)=>
      `<button class="choice ${c.cls||''}" ${c.id?`id="${c.id}"`:''} ${c.dis?'disabled':''} data-i="${i}">${c.t}${c.sub?`<span class="sub">${c.sub}</span>`:''}</button>`
    ).join("")+`</div>`;
  }
  scr.innerHTML=html+btns;
  scr.scrollTop=0; window.scrollTo(0,0);
  // 入场动画：顶层元素依次淡入上滑（战斗等高频刷新场景跳过）
  if(opts.anim!==false){
    let i=0;
    const stag=el=>{ el.classList.add("anim-in"); el.style.animationDelay=(i*0.07)+"s"; i++; };
    [...scr.children].forEach(el=>{
      if(el.classList.contains("chat")||el.classList.contains("choices")) [...el.children].forEach(stag);
      else stag(el);
    });
  }
  if(choices) choices.forEach((c,i)=>{
    const b=scr.querySelector(`button[data-i="${i}"]`);
    if(b) b.onclick=()=>c.f();
  });
}

function renderLine(l){
  const who=Array.isArray(l)?l[0]:l.who;
  let text=Array.isArray(l)?l[1]:l.text;
  const o3=Array.isArray(l)?l[2]:l;
  const opt=(o3 && typeof o3==="object")?o3:{};
  const think = o3==="think" || opt.think;
  const big = !!opt.big;
  if(who==="env") return `<div class="msg env"><div class="bub">${text}</div></div>`;
  if(who==="end") return `<div class="msg end"><div class="bub">${text}</div></div>`;
  // 「室友老铁」personalized 为随机指定的具体室友
  let c=CHARS[who]||{name:who,face:"❓",side:"left"};
  if((who==="bro"||who==="roommate") && Game.s && Game.s.roommate) c={name:Game.s.roommate.name, face:Game.s.roommate.face, side:"left", color:"#ff7a3c"};
  const center = c.side==="center";
  const ring = big?`style="box-shadow:0 0 0 2px ${c.color||'var(--accent)'},0 4px 12px rgba(0,0,0,.5)"`:"";
  return `<div class="msg ${c.side}${big?' bigface':''}">`+
    (center?"":`<div class="face" ${ring}>${c.face}</div>`)+
    `<div class="col"><div class="who" style="color:${c.color||'var(--dim)'}">${c.name}</div>`+
    `<div class="bub${think?' think':''}">${text}</div></div></div>`;
}
/* 逐字打字机：依次显示气泡并打字，点击任意处跳过 */
function typeChat(scr){
  const msgs=[...scr.querySelectorAll(".chat .msg")];
  if(!msgs.length) return;
  const ch=scr.querySelector(".choices");
  if(ch) ch.style.display="none";
  const full=msgs.map(m=>{ const b=m.querySelector(".bub"); const t=b.textContent; b.textContent=""; return t; });
  msgs.forEach(m=>{ m.style.opacity="0"; });
  let i=0, timer=null, done=false;
  const finishAll=()=>{
    done=true; if(timer)clearInterval(timer);
    msgs.forEach((m,k)=>{ m.style.opacity="1"; const b=m.querySelector(".bub"); b.textContent=full[k]; b.classList.remove("typing"); });
    if(ch) ch.style.display="";
    scr.removeEventListener("click", skip, true);
  };
  const skip=e=>{ if(done)return; finishAll(); };
  const nextMsg=()=>{
    if(i>=msgs.length){ finishAll(); return; }
    const m=msgs[i], b=m.querySelector(".bub");
    m.style.opacity="1"; m.classList.add("anim-in"); m.style.animationDelay="0s";
    const chars=Array.from(full[i]); let ci=0; b.classList.add("typing");
    timer=setInterval(()=>{
      ci++; b.textContent=chars.slice(0,ci).join("");
      if(ci>=chars.length){ clearInterval(timer); b.classList.remove("typing"); i++; setTimeout(nextMsg,300); }
    }, 26);
  };
  scr.addEventListener("click", skip, true);
  nextMsg();
}
/* 对话场景：{loc, title, art, lines:[[who,text,{think,big}],...], choices, anim, tw} */
function D(o){
  let html="";
  if(o.loc)   html+=`<div class="loc">${o.loc}</div>`;
  if(o.title) html+=`<h1 class="title">${o.title}</h1>`;
  if(o.art)   html+=art(o.art);
  if(o.lines&&o.lines.length) html+=`<div class="chat">`+o.lines.map(renderLine).join("")+`</div>`;
  if(o.extra) html+=o.extra;
  sceneRaw(html, o.choices, {anim:o.tw?false:o.anim});
  if(o.tw) typeChat(document.getElementById("screen"));
}

function particles(emoji,n){
  let s="";
  for(let i=0;i<n;i++){
    const left=Math.random()*100, dur=4+Math.random()*5, delay=Math.random()*6, sz=12+Math.random()*16;
    s+=`<span class="pcl" style="left:${left}%;font-size:${sz}px;animation-duration:${dur}s;animation-delay:-${delay}s">${emoji}</span>`;

}

/* 画轮盘 */
function drawWheel(id, segs, isCn){
  const cv=document.getElementById(id); if(!cv) return;
  const ctx=cv.getContext("2d"); const n=segs.length; const R=130; const cx=130, cy=130;
  const colors=["#ff7a3c","#ffcc4d","#3fb950","#58a6ff","#bc8cff","#ff8ecb","#ff5b5b","#4dd0e1","#9ccc65"];
  cv.style.transform="rotate(0deg)";
  ctx.clearRect(0,0,260,260);
  for(let i=0;i<n;i++){
    const a0=(i/n)*2*Math.PI - Math.PI/2 - Math.PI/n;
    const a1=((i+1)/n)*2*Math.PI - Math.PI/2 - Math.PI/n;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,R,a0,a1); ctx.closePath();
    ctx.fillStyle=colors[i%colors.length]; ctx.fill();
    // 文本
    ctx.save(); ctx.translate(cx,cy); ctx.rotate((a0+a1)/2);
    ctx.fillStyle="#0d1117"; ctx.font="bold 16px sans-serif"; ctx.textAlign="right";
    ctx.fillText(isCn?segs[i]:segs[i].toFixed(1), R-12, 6); ctx.restore();
  }
  // 中心
  ctx.beginPath(); ctx.arc(cx,cy,18,0,2*Math.PI); ctx.fillStyle="#161b22"; ctx.fill();
  ctx.strokeStyle="#ffcc4d"; ctx.lineWidth=3; ctx.stroke();
}
