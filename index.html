    });
    this._bpSync();
  },
  // 预算规划界面工作/实习时间读取
  _readWork(){ const r=document.getElementById("bwRange"); return r ? +r.value : (this._budgetWork||0); },
  // 预算规划界面的实时同步（收入按本界面设定的打工/实习时间估算）
  _bpSync(){
    document.querySelectorAll('input[data-m]').forEach(i=>{ const el=document.getElementById("m_"+i.dataset.m); if(el) el.textContent=cursym()+fmt(+i.value); });
    const work=this._readWork(); this._budgetWork=work;
    const bwa=document.getElementById("bwAmt"); if(bwa) bwa.textContent=work;
    const m=this._readMoney();
    const ms=document.getElementById("moneySpend"); if(ms) ms.textContent=cursym()+fmt((m.friend||0)+(m.flirt||0));
    const el=document.getElementById("budget"); if(!el) return;
    const ek=this.s.career>=20?"intern":"work";
    const alloc=Object.assign({study:0,intern:0,work:0,friend:0,flirt:0}, this.s.lastAlloc||{study:40,friend:20});
    alloc[ek]=work;
    const p=this._projectBudget(alloc, m); const sym=cursym(); const bad=p.endBal<0;
    el.innerHTML=
      `<div class="brow">📈 预计收入　<b style="color:var(--green)">+${sym}${fmt(p.income)}</b><small>（按本界面${this.s.career>=20?"实习":"打工"}时间 ${work} 估算：实习 ${sym}${fmt(p.internInc)} · 打工 ${sym}${fmt(p.workInc)}）</small></div>`+
      `<div class="brow">📉 预计开支　<b style="color:var(--red)">-${sym}${fmt(p.expense)}</b><small>（生活 ${sym}${fmt(p.living)} · 社交 ${sym}${fmt(p.social)}${p.repay?` · 还债 ${sym}${fmt(p.repay)}`:""}${p.activity?` · 兄弟局 ${sym}${fmt(p.activity)}`:""}）</small></div>`+
      `<div class="brow bsum ${bad?'bad':''}">🏦 学期末预计结余　<b>${sym}${fmt(p.endBal)}</b>${bad?' ⚠️ 偏紧，注意':' ✅'}</div>`;
  },
  _readAlloc(){ const a={study:0,intern:0,work:0,friend:0,flirt:0};
    document.querySelectorAll('#alloc input').forEach(i=>a[i.dataset.k]=+i.value);
    // 收入型时间（实习/打工）在预算界面锁定，回填进来
    const ek=this.s.career>=20?"intern":"work"; a[ek]=this._budgetWork||0;
    // 富姐：维系时间锁死，回填为 flirt
    if(this.s.hasGf && this.s.gfType==="fujie") a.flirt=this.s.gfTimeLock||0;
    return a; },
  _readMoney(){ const m={friend:0,flirt:0,repay:0};
    document.querySelectorAll('input[data-m]').forEach(i=>m[i.dataset.m]=+i.value);
    const rn=document.getElementById("repayNum");
    if(rn){ const cap=Math.max(0, Math.min(this.s.money, this.totalDebt())); m.repay=clamp(Math.round(+rn.value||0),0,cap); }
    return m; },
  // 还债：滑块(步进1，可达最大值) ↔ 数字输入 双向同步（在预算规划界面）
  _repayRangeSync(){ const r=document.getElementById("repayRange"), n=document.getElementById("repayNum"); if(r&&n) n.value=r.value; this._bpSync(); },
  _repayNumSync(){ const r=document.getElementById("repayRange"), n=document.getElementById("repayNum"); if(r&&n){ const v=clamp(Math.round(+n.value||0),+n.min,+n.max); r.value=v; } this._bpSync(); },
  _repaySet(v){ const r=document.getElementById("repayRange"), n=document.getElementById("repayNum"); if(n) n.value=v; if(r) r.value=v; this._bpSync(); },
  _projectBudget(alloc, money){
    const s=this.s; const E=this._allocCtx.E;
    const workInc = alloc.work>0 ? Math.round(alloc.work*E.workRate + (E.workRand[0]+E.workRand[1])/2) : 0;
    const internInc = (s.career>=20 && alloc.intern>0) ? alloc.intern*this.internMonthlyPerPoint()*this.monthsPerTerm() : 0;
    const social = (money.friend||0)+(money.flirt||0);
    const repay = money.repay||0;
    const living = E.live*this.monthsPerTerm();
    const activity = this.activityCost()+this.courtCost();
    const income = workInc + internInc;
    const expense = living + social + repay + activity;
    return {workInc, internInc, social, repay, living, activity, income, expense, endBal: s.money + income - expense};
  },
  _allocSync(){
    let used=0;
    document.querySelectorAll('#alloc input').forEach(i=>{ used+=+i.value; document.getElementById("amt_"+i.dataset.k).textContent=i.value; });
    const work=this._budgetWork||0;            // 预算界面锁定的实习/打工时间
    const fuj=(this.s.hasGf&&this.s.gfType==="fujie")?(this.s.gfTimeLock||0):0;  // 富姐锁死的维系时间
    const actE=this.activityEnergy()+this.courtEnergy(); const tot=used+work+fuj+actE;
    const parts=[]; if(work) parts.push(`${work}(${this.s.career>=20?"实习":"打工"})`); if(fuj) parts.push(`${fuj}(富姐)`); if(actE) parts.push(`${actE}(活动/脱单)`);
    document.getElementById("poolUsed").textContent = parts.length? `${used}+${parts.join("+")}=${tot}` : used;
    const note=document.getElementById("sleepNote");
    const cap=this.energyCap();
    if(tot>cap) note.innerHTML=`<span style="color:var(--red)">超 ${tot-cap}%·睡眠不足⚠️</span>`;
    else if(tot<cap) note.innerHTML=`<span style="color:var(--green)">余 ${cap-tot}%·可休息回血</span>`;
    else note.innerHTML=`<span style="color:var(--gold)">刚好</span>`;
    this._budgetSync();
  },
  // 「开始上课」界面的预算只读展示：金钱用预算规划阶段已定的 _budgetMoney
  _budgetSync(){
    const el=document.getElementById("budget"); if(!el||!this._allocCtx) return;
    const money=this._budgetMoney||{friend:0,flirt:0,repay:0};
    const p=this._projectBudget(this._readAlloc(), money);
    const sym=cursym(); const bad=p.endBal<0;
    el.innerHTML=
      `<div class="brow">📈 预计收入　<b style="color:var(--green)">+${sym}${fmt(p.income)}</b>`+
      `<small>（实习 ${sym}${fmt(p.internInc)} · 打工 ${sym}${fmt(p.workInc)}）</small></div>`+
      `<div class="brow">📉 预计开支　<b style="color:var(--red)">-${sym}${fmt(p.expense)}</b>`+
      `<small>（生活 ${sym}${fmt(p.living)} · 社交 ${sym}${fmt(p.social)}${p.activity?` · 活动 ${sym}${fmt(p.activity)}`:""}${p.repay?` · 还债 ${sym}${fmt(p.repay)}`:""}）</small></div>`+
      `<div class="brow bsum ${bad?'bad':''}">🏦 学期末预计结余　<b>${sym}${fmt(p.endBal)}</b>${bad?' ❌ 资金不足，回预算规划调整':' ✅'}</div>`;
  },

  /* 结算一个学年 */
  resolveYear(credits, alloc, money, yrLabel, makeup){
    const s=this.s;
    const E=this.econ();
    this._statDeltas=null; clearTimeout(this._deltaTimer); // 清掉上学期的变化箭头
    this._semSnap=this._snapStats(); // 学期开始快照（用于仪表盘变化箭头）
    const moneySpent=(money.friend||0)+(money.flirt||0);
    s.money-=moneySpent;
    // 还债：按利息高→低（高利贷30% → 助学贷款10% → 富姐0% → 兄弟0%）
    if(money.repay>0) this.applyRepay(money.repay);
    // 兄弟局 + 脱单早餐 费用与时间，开学一并扣
    const actCost=this.activityCost()+this.courtCost(), actEnergy=this.activityEnergy()+this.courtEnergy();
    if(actCost>0){ s.money=Math.max(0,s.money-actCost); }
    s.semActivities=[];

    const logs=[];
    const isCn = s.gpaSys==="cn100";
    const careerBefore0=s.career; // 用于检测「事业度突破20→解锁有偿实习」

    // ---- 通过率（含学校难度修正 + 学习力 + 随机扰动） ----
    const studyW=alloc.study/100;
    const load=(credits-40)/40;
    // 难度修正：>0 更易过；慕尼黑“严出”更难
    const diffMap={braunschweig:0.14, stuttgart:0.14, london:0.14, munich:-0.12};
    const diffBonus = diffMap[s.lineType]||0;
    let passRate = 0.6 + studyW*0.55 - load*0.3 + (s.xuexi||0)/400 + diffBonus + (s.examBonus||0);
    passRate=clamp(passRate,0.12,0.99);
    // 中国百分制基准（高=好）
    const gpaBaseCn = 55 + studyW*40 - load*22 + (s.xuexi||0)*0.12 + diffBonus*40;
    // 德国制：1.0 最佳，5.0 不及格（低=好）
    const gpaBaseDe = clamp(4.2 - studyW*2.8 + load*0.9 - (s.xuexi||0)*0.008 - diffBonus*1.0, 1.0, 5.0);

    // ---- 学分 / 成绩结算 ----
    let courseData=null;
    if(isCn){
      let passed=0;
      for(let i=0;i<credits;i+=2){ if(Math.random()<passRate) passed+=2; }
      passed=Math.min(passed,credits);
      const failed=credits-passed;
      s.creditsEarned+=passed; s.creditsFailed+=failed;
      logs.push(`📚 选 ${credits} 学分 → 通过 ${passed}，挂科 ${failed}`);
    } else {
      // 德国：拆成 4-6 学分的课程，逐门判定（1.0最佳，5.0挂科）
      const courses=[]; let remain=credits;
      while(remain>0){ let c=Math.min(remain, rand(4,6)); if(remain-c>0 && remain-c<4) c=remain; courses.push({cr:c}); remain-=c; }
      let passed=0, failed=0, gsum=0;
      courses.forEach((c,idx)=>{
        const pass=Math.random()<passRate;
        let grade;
        if(pass){ grade=clamp(gpaBaseDe + (Math.random()*0.8-0.4), 1.0, 4.0); passed+=c.cr; }
        else { grade=5.0; failed+=c.cr; }
        c.pass=pass; c.grade=Math.round(grade*10)/10; c.name=`课程 ${idx+1}`;
        gsum+=c.grade;
      });
      const semGpa=Math.round(gsum/courses.length*10)/10;
      if(makeup){
        // 补课：通过的课从已挂学分移除并计入已修；挂掉的维持
        s.creditsEarned+=passed; s.creditsFailed=Math.max(0, s.creditsFailed-passed);
      } else {
        s.creditsEarned+=passed; s.creditsFailed+=failed;
        if(semGpa<=1.5){ s.money+=E.schHi; logs.push(`🏆 优异奖学金 +${E.sym}${fmt(E.schHi)}`); }
        else if(semGpa<=2.3){ s.money+=E.schMid; logs.push(`🥈 良好奖学金 +${E.sym}${fmt(E.schMid)}`); }
      }
      s.gpaTotal+=semGpa; s.gpaCount++; s.lastGpa=semGpa;
      courseData={courses, passed, failed, semGpa};
    }

    // ---- 打工 / 实习 收入 + 事业度 ----
    if(alloc.work>0){
      const inc=Math.round(alloc.work*E.workRate + rand(E.workRand[0],E.workRand[1]));
      s.money+=inc; this.addStat("career", Math.round(alloc.work*0.1));
      logs.push(`🧹 打工到手 +${E.sym}${fmt(inc)}（事业度微涨）`);
    }
    if(alloc.intern>0){
      const cBefore=s.career;
      this.addStat("career", Math.round(alloc.intern*0.5));
      if(cBefore>=20){
        const per=this.internMonthlyPerPoint();
        const inc=Math.round(alloc.intern*per*this.monthsPerTerm()*(0.85+Math.random()*0.3)); // 随机浮动（按学期月数）
        s.money+=inc; logs.push(`💼 实习收入 +${E.sym}${fmt(inc)}（事业度↑）`);
        // 事业度越高，越有机会涨薪（持久提升每点薪资）
        if(Math.random() < s.career/220){
          s.internRaiseMult = Math.round((s.internRaiseMult + rand(10,30)/100)*100)/100;
          this.toast(`📈 实习涨薪！每点薪资 ×${s.internRaiseMult}`);
          logs.push(`📈 实习涨薪，每点薪资倍率 ×${s.internRaiseMult}`);
        }
      } else {
        logs.push(`💼 无偿实习攒经验，事业度 ${cBefore}→${s.career}${s.career>=20?"（已达20，下学期可赚钱！）":""}`);
      }
    }

    // ---- 年底结算上学期建仓的投资 ----
    this.settleStock(logs);

    // ---- 学习力随用功增长（安徽人成长更快）----
    if(alloc.study>0){ const xg=this.addStat("xuexi", Math.round(alloc.study*0.05*(s.xuexiMult||1))); if(xg>0) logs.push(`🧠 勤学苦练，学习力 +${xg}`); }
    // ---- 社交：兄弟义气（边际递减）----
    if(alloc.friend>0||money.friend>0){
      const raw=Math.round((alloc.friend*0.25 + (money.friend/E.socUnit)*0.6 + rand(0,4)) * (s.broMult||1) * (s.hasBoots?1.2:1));
      const g=this.addStat("bro", raw);
      if(g>0) logs.push(`🍻 兄弟义气 +${g}${s.hasBoots?"（马丁靴气场加成）":""}`);
    }
    // ---- 把妹 / 女友：情商训练（单身）+ 按类型维系关系 ----
    this._gfEvent=null;
    const flirtTime = alloc.flirt;
    const flirtMoney = money.flirt/E.socUnit; // 归一化
    if(!s.hasGf){
      // 单身时把妹只历练情商
      if(flirtTime>0||flirtMoney>0){ const g=this.addStat("eq", Math.round((alloc.flirt*0.22 + flirtMoney*0.5 + rand(0,3))*(s.eqMult||1)*(s.hasHair?1.25:1))); if(g>0) logs.push(`💘 把妹历练，情商 +${g}${s.hasHair?"（大背头加成）":""}`); }
      // ---- 主动脱单尝试结算（学期末按情商定成败，过低则被拉黑）----
      if(s.courtPlan){
        const cp=s.courtPlan; s.courtPlan=null; const eq=s.eq||0;
        if(cp.mode==="net"){
          const p=clamp(0.15+eq/140, 0.1, 0.8);
          this._pendingCourt = Math.random()<p ? {success:true,type:"net"} : {success:false};
        } else {
          const base=clamp(0.15+eq/150+(cp.breakfast?0.15:0), 0.05, 0.9);
          if(Math.random()<base) this._pendingCourt={success:true,type:cp.target};
          else {
            const blockP = eq<35 ? clamp(0.5-eq/100, 0.1, 0.5) : 0.06;
            this._pendingCourt = Math.random()<blockP ? {blocked:true,target:cp.target} : {success:false};
          }
        }
      }
    } else {
      const t=s.gfType;
      // 维系满意度：不同类型侧重不同
      let sat;
      if(t==="meinu")      sat = flirtMoney*1.5 + flirtTime*0.3 - 16; // 美女吃金钱
      else if(t==="fujie") sat = flirtTime*1.0 + flirtMoney*0.3 - 16; // 富姐吃时间
      else if(t==="net")   sat = flirtMoney*1.2 + flirtTime*0.5 - 12; // 网恋靠"转账"
      else                 sat = flirtTime*0.55 + flirtMoney*0.8 - 14; // 学霸均衡
      if(s.hasHair) sat+=3;   // 大背头：撑场面
      if(s.hasCar)  sat+=6;   // 汽车：接送有面子
      // ---- 异地恋 / 异国恋：维系更难（网恋本就远程，不叠加）----
      let distNote="";
      if(t!=="net" && s.gfOrigin){
        if(s.gfOrigin.cur!==s.cur){ sat-=11; distNote="异国恋"; }            // 跨国：时差、机票、聚少离多
        else if(s.gfOrigin.line!==s.lineType){ sat-=6; distNote="异地恋"; }  // 同国异地
      }
      if(distNote) logs.push(`🌧 ${distNote}·聚少离多，维系格外吃力（满意度 -${s.gfOrigin.cur!==s.cur?11:6}）`);
      if(sat>=0){ const up=this.addStat("gfFavor", Math.round(2+sat*0.4)); logs.push(`💞 用心经营，女友亲密度 +${up}`); }
      else { const down=Math.round((-sat)*0.7+rand(1,3)); s.gfFavor=clamp(s.gfFavor-down,0,100); logs.push(`💔 维系投入不足，女友亲密度 -${down}`); }

      // ---- 类型专属收益 / 支出 ----
      if(t==="meinu"){
        const cost=Math.round(E.live*2); s.money=Math.max(0,s.money-cost);
        const hp=rand(4,9); s.health=clamp(s.health+hp,0,100);
        logs.push(`💃 美女女友·约会置装 -${E.sym}${fmt(cost)}，身心愉悦 健康 +${hp}`);
      } else if(t==="fujie"){
        const allowance=rand(Math.round(E.live), Math.round(E.live*5)); s.money+=allowance;
        const hp=rand(2,6); s.health=clamp(s.health-hp,0,100);
        logs.push(`💎 富姐女友·随手塞了零花钱 +${E.sym}${fmt(allowance)}（陪她应酬 健康 -${hp}）`);
      } else if(t==="xueba"){
        const cost=Math.round(E.live*1); s.money=Math.max(0,s.money-cost);
        const xg=this.addStat("xuexi", Math.round(rand(4,9)*(s.xuexiMult||1)));
        logs.push(`🤓 学霸女友·一起自习 -${E.sym}${fmt(cost)}，学习力 +${xg}`);
      } else if(t==="net"){
        if(Math.random()<0.65){
          const ask=rand(Math.round(E.live*2), Math.round(E.live*6)); s.money=Math.max(0,s.money-ask); s.netScam=(s.netScam||0)+ask;
          const up=this.addStat("gfFavor", rand(3,7));
          logs.push(`💻 女友说家里急用钱，你转了 ${E.sym}${fmt(ask)}（好感 +${up}）`);
        }
        // 累计转账过多 → 对方突然蒸发
        if((s.netScam||0) >= E.live*14 && Math.random()<0.5){
          s.hasGf=false; s.gfType=null; s.gfOrigin=null; s.gfWarned=false; s.gfFavor=0; this._gfEvent="netbust";
        }
      }

      // ---- 汽车：帮女神搬家、带去 Kaufland 买菜 → 好感稳涨（油费另计） ----
      if(s.hasGf && s.hasCar){
        const up=this.addStat("gfFavor", rand(4,8));
        const fuel=Math.round(E.live*0.4); s.money=Math.max(0,s.money-fuel);
        logs.push(`🚗 开车帮她搬家、去 Kaufland 买菜，女友亲密度 +${up}（油费 -${E.sym}${fmt(fuel)}）`);
      }

      // ---- 美女：亲密度达标 → 索要 €5000 买衣服（攻略事件，仅一次） ----
      if(s.hasGf && s.gfType==="meinu" && s.gfFavor>=80 && !s.flags.meinuDress){ this._pendingMeinuDress=true; }

      // ---- 吵架预警在先、分手在后 ----
      if(s.hasGf){
        if(s.gfFavor<50){
          if(s.gfWarned){ s.hasGf=false; s.gfType=null; s.gfOrigin=null; s.gfWarned=false; s.gfFavor=0; this._gfEvent="breakup"; }
          else { s.gfWarned=true; s.gfFavor=50; this._gfEvent="warn"; }
        }
        else if(s.gfFavor<60){ if(!s.gfWarned){ s.gfWarned=true; this._gfEvent="warn"; } }
        else s.gfWarned=false;
      }
    }

    // ---- 兄弟亲密度随时间缓慢流失（比女友慢得多：每期 -0~2，且交友投入可抵消） ----
    {
      const upkeep = (alloc.friend>0||money.friend>0) ? rand(0,1) : rand(1,2);
      for(const id in s.friends){ const fr=s.friends[id]; if(fr) fr.fav=clamp((fr.fav||0)-upkeep,0,100); }
    }

    // ---- 基础生活成本（本科按学年12个月，硕士按学期6个月）----
    const months=this.monthsPerTerm();
    const livingYr=E.live*months;
    s.money=Math.max(0,s.money-livingYr);
    logs.push(`🏠 ${this.isMaster()?"本学期(6个月)":"本学年(12个月)"}生活开销 -${E.sym}${fmt(livingYr)}`);
    // ---- 债务利息：助学贷款10%/年，高利贷30%/年 ----
    if(s.loan>0){ s.loan=Math.round(s.loan*1.10); logs.push(`🏦 助学贷款滚息至 ${E.sym}${fmt(s.loan)}（10%/年）`); }
    if(s.shark>0){
      s.shark=Math.round(s.shark*1.30); logs.push(`💸 高利贷滚息至 ${E.sym}${fmt(s.shark)}（30%/年）`);
      // ---- 追债暴打：欠得越多、拖得越久越容易被堵；甩棍可增强防身 ----
      s.sharkAge=(s.sharkAge||0)+1;
      const ratio=s.shark/Math.max(1,E.live*12);
      let prob=clamp(0.08 + ratio*0.14 + s.sharkAge*0.07, 0, 0.85);
      if(Math.random()<prob){
        const fended = s.hasBaton && Math.random()<0.5;   // 甩棍：约五成概率打跑讨债的
        if(fended){
          logs.push(`🥢 讨债的堵到门口，你抄起甩棍拼命，他们见你不好惹，悻悻退去——这次躲过了。`);
        } else {
          const hp=rand(18,34); s.health=clamp(s.health-hp,0,100);
          const med=Math.round(E.live*2 + rand(0,E.tooth[1])); s.money=Math.max(0,s.money-med);
          this._pendingDebtBeat={hp, med, baton:!!s.hasBaton};
          logs.push(`🩸 高利贷追债·被打住院！健康 -${hp}，医药费 ${E.sym}${fmt(med)}`);
        }
      }
    }
    // ---- 兄弟讨债：欠兄弟的钱，日后随机被开口要回（可拒，但伤亲密度，过低则决裂） ----
    if(s.broLoan>0 && s.broLoanFrom && s.friends[s.broLoanFrom] && !this._pendingDebtBeat){
      if(Math.random()<0.5){ this._pendingBroDebt={id:s.broLoanFrom, amt:s.broLoan}; }
    }

    // ---- 时间推进：本科一学年+1岁；硕士每两学期(满一年)才+1岁 ----
    if(this.isMaster()){ if(s.yearInSchool%2===0) s.age++; } else s.age++;
    // ---- 睡眠平衡：精力总量决定健康（兄弟局额外耗精力） ----
    const cap=this.energyCap();
    const used=(alloc.study||0)+(alloc.intern||0)+(alloc.work||0)+(alloc.friend||0)+(alloc.flirt||0)+actEnergy;
    let hpDelta=-rand(0,2); // 年龄自然小幅下降
    if(used>cap){
      const deficit=used-cap, drop=Math.round(deficit*(rand(20,50)/100)*(s.healthDrainMult||1));
      hpDelta-=drop; logs.push(`😵 精力透支 ${deficit}%，睡眠不足，健康 -${drop}`);
    } else if(used<cap){
      const surplus=cap-used, heal=Math.round(surplus*(rand(10,35)/100));
      hpDelta+=heal; logs.push(`😴 余力 ${surplus}%，休整恢复，健康 +${heal}`);
    }
    // ---- 年龄越大、身体越扛不住：随年龄递增的健康损耗 ----
    const ageDrain=this.ageHealthDrain();
    if(ageDrain>0){ hpDelta-=ageDrain; logs.push(`⏳ 年纪渐长（${s.age}岁），身体机能下滑，健康 -${ageDrain}`); }
    s.health=clamp(s.health+hpDelta,0,100);

    // ---- 随机事件：智齿发作 ----
    if(Math.random()<0.22){
      const pain=rand(4,12), cost=rand(E.tooth[0],E.tooth[1]);
      s.health=clamp(s.health-pain,0,100); s.money=Math.max(0,s.money-cost);
      logs.push(`🦷 随机事件·智齿发作！健康 -${pain}，拔牙花了 ${E.sym}${fmt(cost)}`);
    }
    // ---- 健康过低：小病小灾不断，额外破费（60 以下就开始亮红灯，越低越频繁）----
    if(s.health<60 && Math.random() < (60-s.health)/70){
      const pain=rand(5,15), cost=rand(E.tooth[1], E.tooth[1]*3);
      s.health=clamp(s.health-pain,0,100); s.money=Math.max(0,s.money-cost);
      logs.push(`🤒 身体亮红灯！小病小灾不断，健康 -${pain}，吃药看病 ${E.sym}${fmt(cost)}`);
    }
    // ---- 斯图加特特色随机事件：阿鲁巴（甩棍/认识旭子可降低概率） ----
    this._semEvent=null;
    if(s.lineType==="stuttgart"){
      let prob=0.45;
      if(s.hasBaton) prob-=0.22;          // 有甩棍能反抗
      if(s.friends.xuzi) prob-=0.30;      // 旭子是阿鲁巴队长，给面子
      prob=clamp(prob,0.05,0.6);
      if(Math.random()<prob){
        const hp=rand(8,18); s.health=clamp(s.health-hp,0,100);
        this._semEvent=`🪜 突发·阿鲁巴！兄弟们架着你往栏杆上"骑"，胯下生风，健康 -${hp}。`;
        logs.push(this._semEvent);
      }
    }

    // 健康恢复良好则解除"住院警告"
    if(s.health>=70) s.hospWarned=false;

    // ---- 技能解锁：事业度首次突破 20 → 有偿实习 ----
    if(careerBefore0<20 && s.career>=20){
      this._pendingSkillUnlock={emoji:"💼", title:"有偿实习", color:"#3fb950",
        desc:"事业度突破 20！实习不再无偿——从此实习有工资，事业度越高、涨薪空间越大。"};
    }

    this.render();

    const reveal = isCn
      ? (done)=>this.spinGpa(credits, alloc, yrLabel, logs, done, {gpaBaseCn})
      : (done)=>this.revealCoursesDE(courseData, yrLabel, logs, done);
    let after = makeup ? ()=>this.makeupDone(yrLabel) : ()=>this.yearSummary(yrLabel, logs);
    // 投资走势图动画（逐点揭秘盈亏，紧贴年度小结之前）
    if(this._stockAnim){ const a=this._stockAnim; this._stockAnim=null; const nx=after; after=()=>this.assetCurve(a, nx); }
    // 美女女友"买衣服"攻略事件插在结算前
    if(this._pendingMeinuDress){ this._pendingMeinuDress=false; const nx=after; after=()=>this.meinuDressEvent(nx); }
    // 女友重大事件：分手 / 网恋蒸发 / 吵架预警 → 全屏动画（_gfEvent 由 yearSummary 负责复盘清空）
    if(this._gfEvent==="breakup"||this._gfEvent==="netbust"){ const ev=this._gfEvent; const nx=after; after=()=>this.eventSplash({emoji:"💔", title:"分手", sub:ev==="netbust"?"网恋对象人间蒸发":"感情走到尽头", color:"#ff5b5b"}, nx); }
    else if(this._gfEvent==="warn"){ const nx=after; after=()=>this.eventSplash({emoji:"⚠️", title:"吵架预警", sub:"女友亲密度告急", color:"#ffcc4d", hold:1600}, nx); }
    // 脱单进度公布（全屏）
    if(this._pendingCourt){ const info=this._pendingCourt; this._pendingCourt=null; const nx=after; after=()=>this.courtResultEvent(info, nx); }
    // 兄弟讨债剧情（全屏 + 还/拒选择）
    if(this._pendingBroDebt){ const info=this._pendingBroDebt; this._pendingBroDebt=null; const nx=after; after=()=>this.broDebtEvent(info, nx); }
    // 高利贷追债·被打住院剧情
    if(this._pendingDebtBeat){ const info=this._pendingDebtBeat; this._pendingDebtBeat=null; const nx=after; after=()=>this.debtBeatEvent(info, nx); }
    // 技能解锁全屏动画（最先弹出）
    if(this._pendingSkillUnlock){ const sk=this._pendingSkillUnlock; this._pendingSkillUnlock=null; const nx=after; after=()=>this.skillUnlock(sk, nx); }

    // ---- 健康危机：先住院（花钱保命，警告一次），再不注意才暴毙 ----
    const CRIT=15;
    if(s.health<=CRIT){
      if(s.hospWarned){ return reveal(()=>this.endingDeath()); } // 已警告过仍不珍惜身体 → 暴毙
      const nx=after; after=()=>this.hospitalEvent(nx);          // 首次触底 → 住院剧情
    }
    reveal(after);
  },

  /* 健康过低：住院剧情（花钱保命 + 最后警告） */
  hospitalEvent(next){
    const s=this.s; const E=this.econ();
    const cost = Math.round(E.live*3 + rand(0, E.tooth[1]));
    const before=s.health;
    s.money=Math.max(0, s.money-cost);
    s.health=clamp(s.health+rand(28,42), 0, 100); // 抢救回来一些
    s.hospWarned=true; this.render();
    D({loc:"🏥 突发 · 住院", tw:true,
      lines:[
        ["env",`你一头栽倒，救护车呼啸送医。一通检查折腾下来，住院费 ${E.sym}${fmt(cost)}。`],
        ["doc","年轻人，身体是革命的本钱啊！再这么熬下去、糟蹋下去，下次可就不是住院这么简单了——会出人命的！",{big:true}],
        ["you",`健康 ${before} → ${s.health}。这是最后的警告……以后得给身体留点余地了。`,"think"],
      ],
      choices:[{t:"▶ 出院，继续", cls:"gold", f:next}]});
  },

  /* 技能解锁：全屏动画 + 说明 */
  skillUnlock(o, next){
    this.transition({emoji:o.emoji||"✨", title:o.title, sub:"✨ 技能解锁 ✨", color:o.color||"#3fb950", hold:2300}, ()=>{
      D({loc:"✨ 技能解锁", tw:true,
        lines:[
          ["env",`🎉 您已解锁技能：【${o.title}】`],
          ["env", o.desc],
          ["you","能力又上了一个台阶！","think"],
        ],
        choices:[{t:"▶ 继续", cls:"gold", f:next}]});
    });
  },

  /* 高利贷追债·被打住院 */
  debtBeatEvent(info, next){
    const s=this.s;
    D({loc:"🩸 高利贷追债", tw:true,
      lines:[
        ["env","几个纹身大汉堵在门口：「钱呢？三成利可不是闹着玩的！」一顿拳脚招呼下来——"],
        info.baton
          ? ["you",`甩棍也没能压住人多势众，还是挨了揍，被抬进医院。健康 -${info.hp}，医药费 ${cursym()}${fmt(info.med)}。`,"think"]
          : ["you",`你毫无还手之力，被打得住进了医院。健康 -${info.hp}，医药费 ${cursym()}${fmt(info.med)}。${s.hasBaton?"":"（要是有根甩棍傍身就好了……）"}`,"think"],
        ["env","债不还清，这样的日子就没个头。卧床养伤，也耽误了不少光阴。"],
      ],
      choices:[{t:"▶ 咬牙撑住，继续", cls:"gold", f:next}]});
  },

  /* 兄弟讨债：还 / 拒（拒绝伤亲密度，过低则决裂） */
  broDebtEvent(info, next){
    const s=this.s; const id=info.id; const fr=s.friends[id]; const nm=this.friendInfo(id).nm;
    const owe=s.broLoan||0;
    if(!fr || owe<=0) return next();
    this.eventSplash({emoji:"📞", title:"兄弟讨债", sub:`${nm} 开口要钱了`, color:"#ff7a3c"}, ()=>{
      const canPay=s.money>=owe;
      D({loc:"📞 兄弟讨债", tw:true,
        lines:[[id,`兄弟，上次借你的 ${cursym()}${fmt(owe)}，我这阵子急用，能还我不？`,{big:true}],["you","当初真亏了他……可这钱……","think"]],
        choices:[
          {t:`💴 全额还清（${cursym()}${fmt(owe)}）`, sub:canPay?"还钱·亲密度回升":"现金不够，无法选择", cls:"gold", f:()=>{
            if(s.money<owe){ this.toast("现金不够还清"); return; }
            s.money-=owe; s.broLoan=0; s.broLoanFrom=null; fr.fav=clamp((fr.fav||0)+rand(8,15),0,100); this.render();
            D({loc:"💴 还清了", lines:[[id,"够意思！这才是兄弟！",{big:true}],["env",`✅ 还清 ${cursym()}${fmt(owe)}，与 ${nm} 亲密度回升（现 ${fr.fav}）。`]],
              choices:[{t:"▶ 继续", cls:"gold", f:next}]});
          }},
          {t:"🙅 拒绝 / 拖着", sub:"亲密度大跌·过低则决裂", cls:"danger", f:()=>{
            fr.fav=clamp((fr.fav||0)-rand(20,35),0,100); this.render();
            if(fr.fav<=10) return this.cutBrotherFallout(id, next);
            D({loc:"🙅 你拒绝了", lines:[[id,"……行，我记住了。",{big:true}],["env",`💢 ${nm} 很不满，亲密度大跌（现 ${fr.fav}）。再这样就要决裂了。`]],
              choices:[{t:"▶ 继续", cls:"gold", f:next}]});
          }}
        ]});
    });
  },
  cutBrotherFallout(id, next){
    const s=this.s; const nm=this.friendInfo(id).nm;
    delete s.friends[id]; s.broLoan=0; s.broLoanFrom=null; s.bro=clamp(s.bro-rand(8,15),0,100); this.render();
    this.eventSplash({emoji:"✂️", title:"兄弟决裂", sub:`${nm} 与你割袍断义`, color:"#ff5b5b"}, ()=>{
      D({loc:"✂️ 兄弟决裂", tw:true,
        lines:[[id,"钱我不要了，朋友也别做了！",{big:true}],["env",`💔 你赖账不还，与 ${nm} 彻底决裂，兄弟义气大损。`],["you","为了点钱，丢了个兄弟。","think"]],
        choices:[{t:"▶ 继续", cls:"gold", f:next}]});
    });
  },

  /* 德国：逐门公布成绩（紧张感）+ 学期/总平均 */
  revealCoursesDE(data, yrLabel, logs, done){
    this._scene="studyYear";
    const s=this.s;
    const rows=data.courses.map((c,i)=>
      `<div class="crow" id="crow_${i}"><span class="cn">${c.name}（${c.cr}学分）</span>`+
      `<span class="cg" id="cg_${i}">…</span></div>`).join("");
    D({loc:`${s.school} · ${yrLabel} · 成绩公布`,
      lines:[["prof2","成绩出来了，一门一门看吧——1.0 最佳，5.0 挂科，别紧张。",{big:true}]],
      extra:`<div class="grades">${rows}<div class="gsum" id="gsum"></div></div>`,
      choices:[], anim:false});
    // 逐门揭晓
    let i=0;
    const step=()=>{
      if(i>=data.courses.length){
        const totGpa=avgGpa(s);
        document.getElementById("gsum").innerHTML=
          `<div class="respop">本学期：通过 <b style="color:var(--green)">${data.passed}</b> · 挂科 <b style="color:var(--red)">${data.failed}</b> 学分</div>`+
          `<div>本学期均绩 <b style="color:var(--gold)">${data.semGpa}</b> · 总均绩 <b style="color:var(--gold)">${totGpa}</b>（1.0 最佳 / 5.0 挂）</div>`;
        logs.push(`📊 ${yrLabel}：通过 ${data.passed}、挂科 ${data.failed} 学分，学期均绩 ${data.semGpa}，总均绩 ${totGpa}`);
        this.render();
        setTimeout(done, 1300);
        return;
      }
      const c=data.courses[i], el=document.getElementById("cg_"+i), row=document.getElementById("crow_"+i);
      if(el){
        el.innerHTML = c.pass ? `<b style="color:var(--green)">${c.grade}</b> ✅` : `<b style="color:var(--red)">${c.grade}</b> ❌挂`;
        el.classList.add("respop"); if(row) row.classList.add("lit");
      }
      i++; setTimeout(step, 650);
    };
    setTimeout(step, 700);
  },

  /* 绩点轮盘（中国百分制）：少学分+多时间 → 更高绩点 */
  spinGpa(credits, alloc, yrLabel, logs, done, opts){
    const s=this.s;
    const isCn = s.gpaSys==="cn100";
    const studyW=alloc.study/100, load=(credits-20)/40;
    const xb=(s.xuexi||0);
    let gpa;
    if(isCn){
      const base = (opts&&opts.gpaBaseCn!=null) ? opts.gpaBaseCn : (55 + studyW*40 - load*22 + xb*0.12);
      gpa = Math.round(clamp(base + rand(-6,8), 30, 98));
    }else{
      gpa = Math.round(clamp(2.0 + studyW*2.6 - load*1.4 + xb*0.008 + (Math.random()*0.6-0.3), 0.5, 5.0)*10)/10;
    }
    s.gpaTotal+=gpa; s.gpaCount++; s.lastGpa=gpa;

    // 轮盘扇区
    const segs = isCn
      ? [40,50,55,60,65,72,80,88,95]
      : [1.0,1.7,2.3,3.0,3.5,4.0,4.5,5.0];
    // 找最接近目标的扇区索引作为落点
    let idx=0,best=1e9;
    segs.forEach((v,i)=>{const d=Math.abs(v-gpa); if(d<best){best=d;idx=i;}});

    const advisor = isCn ? "prof" : "prof2";
    D({
      loc:`${s.school} · ${yrLabel} · 绩点开奖`,
      lines:[[advisor,"成绩出来了。来，转盘见真章——命运的绩点轮盘，转起来！🎡"]],
      extra:`<div class="wheelwrap">
        <div class="wheel-cont">
          <div class="pointer"></div>
          <canvas id="wheel" width="260" height="260"></canvas>
        </div>
        <div id="wheelRes" class="hint">旋转中…</div>
      </div>`,
      choices:[]
    });
    drawWheel("wheel", segs, isCn);
    // 旋转到目标扇区
    const n=segs.length, seg=360/n;
    const targetAngle = 360*6 + (360 - (idx*seg + seg/2)); // 指针在顶部
    const cv=document.getElementById("wheel");
    requestAnimationFrame(()=>{ cv.style.transform=`rotate(${targetAngle}deg)`; });
    setTimeout(()=>{
      const txt = isCn ? `绩点 <b style="color:var(--gold);font-size:20px">${gpa}</b> 分` : `绩点 <b style="color:var(--gold);font-size:20px">${gpa}</b> / 5.0`;
      document.getElementById("wheelRes").innerHTML=`<span class="respop">🎉 ${txt}</span>`;

      // 奖学金
      const E=this.econ();
      const good = isCn ? gpa>=80 : gpa>=4.0;
      const mid  = isCn ? gpa>=70 : gpa>=3.3;
      if(good){ const sch=E.schHi; s.money+=sch; logs.push(`🏆 绩点优异，奖学金 +${E.sym}${fmt(sch)}！`); }
      else if(mid){ const sch=E.schMid; s.money+=sch; logs.push(`🥈 绩点良好，奖学金 +${E.sym}${fmt(sch)}`); }
      logs.push(isCn?`📊 本学年绩点：${gpa} 分`:`📊 本学年绩点：${gpa}/5.0`);
      this.render();
      setTimeout(done, 1100);
    }, 4700);
  },

  /* 学年总结 + 退学/继续/毕业 判定 */
  yearSummary(yrLabel, logs){
    this._scene="studyYear";
    const s=this.s;
    const isCn=s.gpaSys==="cn100";

    // 学期数值变化 → 直接显示在顶部仪表盘（箭头+增减）
    if(this._semSnap){
      const cur=this._snapStats(), d={};
      for(const k in cur){ const diff=cur[k]-this._semSnap[k]; if(diff) d[k]=diff; }
      this._semSnap=null; this._showDeltas(d);
    }

    const gpaFail = isCn ? (s.lastGpa<60) : (s.lastGpa>=4.5);
    const failOut = s.creditsFailed>30;
    const advisor = isCn ? "prof" : "prof2";
    // 可申诉的德国院校
    const canAppeal = (s.lineType==="braunschweig"||s.lineType==="stuttgart"||s.lineType==="london");

    if(failOut || gpaFail){
      const reason = failOut ? `累计挂科 ${s.creditsFailed} 学分（超过 30）` : `本学期均绩 ${s.lastGpa}（≥4.5 视为不及格）`;
      const choices=[];
      if(canAppeal) choices.push({t:"⚖️ 提起申诉", sub:"也许还有补救的机会", cls:"gold", f:()=>this.appeal()});
      choices.push({t:"…接受退学", cls:"danger", f:()=>this.afterSchoolFail()});
      return D({loc:`${s.school} · ${yrLabel} 结算`, tw:true,
        lines:[[advisor,`同学……${reason}，按规定要劝退了。`,{big:true}],
               ["you", canAppeal?"不行，我得申诉！":"……就这么结束了。","think"]],
        choices});
    }

    // 毕业条件：必须修满目标学分（90/120）→ 自动毕业，直接进入下一步走向
    const goal=s.creditGoal;
    const canGraduate = s.creditsEarned>=goal;

    const lines=[["env","📊 本学期各项变化见顶部仪表盘 ↑（绿色＋为上升、红色－为下降）"]];
    if(this._semEvent){ lines.push(["env", this._semEvent]); this._semEvent=null; }
    // 女友事件
    if(this._gfEvent==="found"){ lines.push(["gf","在一起吧～以后请多关照！",{big:true}],["env","💕 你脱单了！情商面板已切换为「女友亲密度」。把妹的时间与金钱别省，否则会闹分手。"]); }
    else if(this._gfEvent==="warn"){ lines.push(["gf","你最近是不是不太上心？我们好好谈谈。",{big:true}],["env","⚠️ 吵架预警：女友亲密度跌破 60！再不上心就要分手了。"]); }
    else if(this._gfEvent==="breakup"){ lines.push(["gf","算了……我们还是分开吧。",{big:true}],["env","💔 女友亲密度跌破 50，你们分手了。面板已恢复为「情商」。"]); }
    else if(this._gfEvent==="netbust"){ lines.push(["env","💔 你那位「网恋女友」突然失联——账号注销、电话停机。你愣在原地，才回过味来。面板已恢复为「情商」。"]); }
    this._gfEvent=null;

    if(canGraduate){
      // 修够学分 → 自动毕业
      lines.push([advisor,`恭喜！已修满 ${s.creditsEarned}/${goal} 学分，平均绩点 ${avgGpa(s)}——你毕业啦！`,{big:true}]);
      return D({loc:`${s.school} · ${yrLabel} 结算`, lines,
        choices:[{t:"🎓 毕业，看看接下来的路", cls:"gold", f:()=>this.graduate()}]});
    }
    lines.push([advisor, `平均绩点 ${avgGpa(s)}，已修 ${s.creditsEarned}/${goal} 学分。继续加油！`]);
    D({loc:`${s.school} · ${yrLabel} 结算`, lines,
      choices:[
        {t:`📚 继续读（升入下一学期）`, sub:`距毕业还差 ${Math.max(0,goal-s.creditsEarned)} 学分`, cls:"gold", f:()=>this.beginYear()},
        {t:"🚪 主动退学", sub:"放弃学业", cls:"danger", f:()=>this.confirmDropout()}
      ]});
  },

  confirmDropout(){
    D({loc:"抉择",
      lines:[["bro","真要退学啊？退了可就回不来了，再想想？"],
             ["you","让我再确认一下……","think"]],
      choices:[{t:"确认退学", cls:"danger", f:()=>this.afterSchoolFail()},
               {t:"↩ 再读一年", f:()=>this.studyYear()}]});
  },

  /* ===================== 退学申诉 + 补课学期 ===================== */
  appeal(){
    const s=this.s; const base=0.4;
    const choices=[];
    if(s.hasBaton) choices.push({t:"🥢 带甩棍去申诉", sub:`成功率 ${Math.round((base+0.35)*100)}%`, cls:"gold", f:()=>this._appealResolve(base+0.35)});
    choices.push({t:"📄 据理力争（正常申诉）", sub:`成功率 ${Math.round(base*100)}%`, f:()=>this._appealResolve(base)});
    choices.push({t:"…算了，接受退学", cls:"danger", f:()=>this.afterSchoolFail()});
    D({loc:"⚖️ 退学申诉", tw:true,
      lines:[
        ["env","你决定向校方申诉，争取一个补救机会。"],
        ["you", s.hasBaton?"实在不行……我揣上甩棍去'讲讲道理'，成功率能高些。":"据理力争，赌一个补课的机会。","think"],
      ],
      choices});
  },
  _appealResolve(prob){
    if(Math.random()<prob){
      D({loc:"⚖️ 申诉成功", tw:true,
        lines:[["prof2","……鉴于你的特殊情况，给你一个补课学期，把挂掉的学分补回来！",{big:true}],
               ["you","谢天谢地！这次必须全过！","think"]],
        choices:[{t:"📚 进入补课学期", cls:"gold", f:()=>this.makeupSemester()}]});
    } else {
      D({loc:"⚖️ 申诉失败", tw:true,
        lines:[["prof2","申诉驳回，规定就是规定。",{big:true}],["you","……认了。","think"]],
        choices:[{t:"…接受退学", cls:"danger", f:()=>this.afterSchoolFail()}]});
    }
  },
  makeupSemester(){
    const s=this.s;
    s.yearInSchool++;
    const retake=Math.max(4, Math.min(80, s.creditsFailed));
    this._budgetMoney={friend:0,flirt:0,repay:0}; this._budgetWork=null;
    this.budgetPlan(retake, "补课学期", true);
  },
  makeupDone(yrLabel){
    this._scene="studyYear";
    const s=this.s;
    if(this._semSnap){ const cur=this._snapStats(), d={}; for(const k in cur){ const diff=cur[k]-this._semSnap[k]; if(diff) d[k]=diff; } this._semSnap=null; this._showDeltas(d); }
    const grad=s.creditsEarned>=s.creditGoal;
    const choices = grad
      ? [{t:"🎓 毕业！", cls:"gold", f:()=>this.graduate()}]
      : [{t:"📚 回到正常学期", cls:"gold", f:()=>this.beginYear()},
         {t:"🚪 退学", cls:"danger", f:()=>this.confirmDropout()}];
    D({loc:"📚 补课学期 · 结算",
      lines:[
        ["env","📊 数值变化见顶部仪表盘 ↑"],
        ["prof2", `补课结束，累计挂科降到 ${s.creditsFailed}/30。${grad?"学分也修满了！":""}`,{big:true}],
        ["you", s.creditsFailed>30?"还是太多……":"缓过来了，继续！","think"],
      ],
      choices});
  },

  /* 助学贷款额度上限（按币种） */
  loanCap(){ return this.s.cur==="EUR"?10000:(this.s.cur==="GBP"?9000:80000); },
  /* 助学贷款（在校前两年可申请，年息10%，额度按币种） */
  offerLoan(credits, yrLabel, makeup){
    const s=this.s; const E=this.econ(); const cap=this.loanCap(); const room=Math.max(0, cap-s.loan);
    const def=Math.min(Math.round(cap/2), room);
    D({loc:"🏦 助学贷款", tw:true,
      lines:[
        ["env",`国家/学校「助学贷款」——在校前两年可申请，最多 ${E.sym}${fmt(cap)}，年息 10%，低息友好。`],
        ["you",`已欠 ${E.sym}${fmt(s.loan)}，还能再借 ${E.sym}${fmt(room)}。借多少？`,"think"],
      ],
      extra:`<div class="credit-pick">
        <div class="big"><span id="lv">${def}</span><small style="font-size:16px;color:var(--dim)"> ${E.sym}</small></div>
        <input type="range" id="loanAmt" min="0" max="${room}" step="500" value="${def}"
          oninput="document.getElementById('lv').textContent=this.value">
        <div class="hint">借款立即到账，每年滚 10% 利息；以后可在分配界面还款</div>
      </div>`,
      choices:[
        {t:"🏦 确认借款", cls:"gold", f:()=>{
          const amt=Math.min(room, Math.max(0, Math.round(+document.getElementById("loanAmt").value||0)));
          s.money+=amt; s.loan+=amt; this.render();
          this.toast(`已借入 ${E.sym}${fmt(amt)}（欠款 ${E.sym}${fmt(s.loan)}）`);
          this.budgetPlan(credits, yrLabel, makeup);
        }},
        {t:"↩ 不借，回去重新规划", f:()=>this.budgetPlan(credits, yrLabel, makeup)}
      ]});
  },

  /* 本金不足：助学贷款 / 兄弟借钱 / 高利贷 / 搏一搏 */
  cantAfford(credits, yrLabel, makeup){
    const s=this.s; const E=this.econ();
    const back=()=>this.budgetPlan(credits, yrLabel, makeup);
    const choices=[];
    if(s.hasGf && s.gfType==="fujie"){
      const lend=Math.round(E.live*6);
      choices.push({t:"💎 找富姐女友周转", sub:`无息借 ${E.sym}${fmt(lend)}（随时还）`, cls:"gold", f:()=>{
        s.gfLoan=(s.gfLoan||0)+lend; s.money+=lend; this.render();
        this.toast(`富姐借你 ${E.sym}${fmt(lend)}（无息）`); back();
      }});
    }
    if(s.school && s.yearInSchool<=2 && s.loan<this.loanCap())
      choices.push({t:"🏦 申请助学贷款", sub:`最多 ${E.sym}${fmt(this.loanCap())} · 年息10%（低息）`, cls:"gold", f:()=>this.offerLoan(credits,yrLabel,makeup)});
    // 向兄弟借钱（无息，成功率看亲密度；日后可能被讨债）
    if(Object.keys(s.friends||{}).length>0)
      choices.push({t:"🧑‍🤝‍🧑 向兄弟借钱", sub:"无息·成功率看亲密度·日后可能讨债", f:()=>this.borrowBrotherMenu(credits,yrLabel,makeup)});
    choices.push({t:"💸 借高利贷", sub:"立刻到账 · 年息30% 利滚利", cls:"danger", f:()=>this.loanShark(credits,yrLabel,makeup)});
    choices.push({t:"🎲 搏一搏（赌一把）", sub:"斗地主 / 赌球 / Polymarket", f:()=>this.gambleMenu(credits,yrLabel,makeup)});
    choices.push({t:"↩ 返回重新分配", f:back});
    D({loc:"🏦 财务周转", tw:true,
      lines:[["env","需要用钱周转？这几条路子能筹钱——正道、歪道、找兄弟，或赌一把。"],["you","钱要么借、要么挣、要么赌……合计合计。","think"]],
      choices});
  },
  // 向兄弟借钱：选人 → 手输金额 → 按亲密度判定成败
  borrowBrotherMenu(credits, yrLabel, makeup){
    const s=this.s; const back=()=>this.cantAfford(credits, yrLabel, makeup);
    const ids=Object.keys(s.friends||{});
    if(!ids.length){ this.toast("你还没有兄弟可借"); return back(); }
    const choices=ids.map(id=>{ const fr=s.friends[id]; const nm=this.friendInfo(id).nm;
      const succ=Math.round(clamp(0.25+(fr.fav||0)/130,0.1,0.95)*100);
      return {t:`${this.friendInfo(id).face} 找 ${nm} 借`, sub:`亲密度 ${fr.fav||0} · 成功率约 ${succ}%`, f:()=>this.borrowBrother(id, credits, yrLabel, makeup)};
    });
    choices.push({t:"↩ 返回", f:back});
    D({loc:"🧑‍🤝‍🧑 向兄弟借钱",
      lines:[["you","张口借钱伤感情，但眼下也只能找兄弟搭把手了。亲密度越高，越愿意借。","think"]],
      choices});
  },
  borrowBrother(id, credits, yrLabel, makeup){
    const s=this.s; const E=this.econ(); const fr=s.friends[id]; const nm=this.friendInfo(id).nm;
    const max=Math.max(E.socStep, Math.round(E.live*8)); const def=Math.round(E.live*3);
    D({loc:`🧑‍🤝‍🧑 向 ${nm} 借钱`,
      lines:[[id,`借多少？咱兄弟一场，能帮就帮——不过日后我手头紧了，可得还我。`,{big:true}]],
      extra:`<div class="credit-pick">
        <div class="big"><input type="number" id="bbNum" value="${def}" min="0" max="${max}" inputmode="numeric"
            style="width:140px;background:#0a0d12;border:1px solid var(--line);border-radius:8px;color:var(--gold);font-weight:900;font-size:30px;text-align:center;padding:4px 6px"
            oninput="Game._bbNumSync()"><small style="font-size:16px;color:var(--dim)"> ${E.sym}</small></div>
        <input type="range" id="bbAmt" min="0" max="${max}" step="${E.socStep}" value="${def}" oninput="Game._bbRangeSync()">
        <div class="hint">亲密度 ${fr.fav||0} · 借越多越可能被婉拒</div>
      </div>`,
      choices:[
        {t:"🤝 开口借", cls:"gold", f:()=>{
          const amt=clamp(Math.round(+(document.getElementById("bbNum")||{}).value||0),0,max);
          if(amt<=0){ this.toast("金额要大于 0"); return; }
          // 成功率：亲密度越高越易，借越多越难
          const ratio=amt/max;
          const prob=clamp(0.25+(fr.fav||0)/130-ratio*0.35, 0.05, 0.95);
          if(Math.random()<prob){
            s.money+=amt; s.broLoan=(s.broLoan||0)+amt; s.broLoanFrom=id;
            fr.fav=clamp((fr.fav||0)-rand(3,7),0,100); this.render();
            this.toast(`${nm} 借了你 ${E.sym}${fmt(amt)}（无息）`);
            D({loc:"🤝 借到了", lines:[[id,`拿去吧，兄弟！记得啊，我用钱的时候你得还。`,{big:true}],["env",`💴 借入 ${E.sym}${fmt(amt)}（共欠兄弟 ${E.sym}${fmt(s.broLoan)}）。亲密度略降。`]],
              choices:[{t:"↩ 回去规划", cls:"gold", f:()=>this.budgetPlan(credits, yrLabel, makeup)}]});
          } else {
            fr.fav=clamp((fr.fav||0)-rand(2,5),0,100); this.render();
            D({loc:"🙅 被婉拒", lines:[[id,`不好意思啊兄弟，我最近也紧巴……少借点行不？`,{big:true}],["env","💸 借款失败，亲密度略降。"]],
              choices:[{t:"↩ 换个法子", cls:"gold", f:()=>this.cantAfford(credits, yrLabel, makeup)}]});
          }
        }},
        {t:"↩ 返回", f:()=>this.borrowBrotherMenu(credits, yrLabel, makeup)}
      ]});
  },
  _bbRangeSync(){ const r=document.getElementById("bbAmt"), n=document.getElementById("bbNum"); if(r&&n) n.value=r.value; },
  _bbNumSync(){ const r=document.getElementById("bbAmt"), n=document.getElementById("bbNum"); if(r&&n){ const v=Math.round(+n.value||0); r.value=clamp(v,+r.min,+r.max); } },
  loanShark(credits, yrLabel, makeup){
    const s=this.s; const E=this.econ(); const cap=Math.round(E.live*12);
    D({loc:"💸 高利贷", tw:true,
      lines:[["env","巷子口的「金主」叼着烟打量你：借钱可以，年息三成，利滚利——还不上，后果自负。"],["you","三成利……是真狠。但眼下也没辙了。","think"]],
      extra:`<div class="credit-pick">
        <div class="big"><span id="lsv">${Math.min(3000,cap)}</span><small style="font-size:16px;color:var(--dim)"> ${E.sym}</small></div>
        <input type="range" id="lsAmt" min="0" max="${cap}" step="500" value="${Math.min(3000,cap)}"
          oninput="document.getElementById('lsv').textContent=this.value">
        <div class="hint">立刻到账，每年滚 30% 利息（比助学贷款狠得多）</div>
      </div>`,
      choices:[
        {t:"💸 确认借款", cls:"danger", f:()=>{
          const amt=Math.min(cap, Math.max(0, Math.round(+document.getElementById("lsAmt").value||0)));
          s.money+=amt; s.shark=(s.shark||0)+amt; this.render();
          this.toast(`高利贷 +${E.sym}${fmt(amt)}（欠 ${E.sym}${fmt(s.shark)}）`);
          this.budgetPlan(credits, yrLabel, makeup);
        }},
        {t:"↩ 算了", f:()=>this.cantAfford(credits, yrLabel, makeup)}
      ]});
  },
  // 搏一搏下注上限（投资股票无上限，但赌博必须有封顶，防止一把梭哈输光家底）
  gambleCap(){ return this.s.cur==="EUR"?10000:(this.s.cur==="GBP"?10000:100000); },
  gambleMenu(credits, yrLabel, makeup){
    const s=this.s;
    const games=[
      {k:"ddz", nm:"🃏 斗地主", win:0.5,  mult:2.0, desc:"50% 翻倍 · 可买记牌器提升胜率"},
      {k:"ball",nm:"⚽ 赌球",   win:0.45, mult:2.2, desc:"45% 拿 2.2 倍"},
      {k:"poly",nm:"📊 Polymarket 下注", win:0.4, mult:2.6, desc:"40% 拿 2.6 倍"},
    ];
    D({loc:"🎲 搏一搏", tw:true,
      lines:[["env",`手头还有 ${cursym()}${fmt(s.money)}。富贵险中求，押哪个？`]],
      choices: games.map(g=>({t:`${g.nm}`, sub:g.desc, f:()=>this.gamblePlay(g, credits, yrLabel, makeup)}))
        .concat([{t:"↩ 不赌了", f:()=>this.cantAfford(credits, yrLabel, makeup)}])});
  },
  // 记牌器价格（按币种）
  cardCounterPrice(){ return this.s.cur==="EUR"?300:(this.s.cur==="GBP"?270:2400); },
  _gbRangeSync(){ const r=document.getElementById("gbAmt"), n=document.getElementById("gbNum"); if(r&&n) n.value=r.value; },
  _gbNumSync(){ const r=document.getElementById("gbAmt"), n=document.getElementById("gbNum"); if(r&&n){ const v=Math.round(+n.value||0); r.value=clamp(v,+r.min,+r.max); } },
  gamblePlay(g, credits, yrLabel, makeup){
    const s=this.s; const cap=this.gambleCap(); const max=Math.min(s.money, cap);
    const isDDZ = g.k==="ddz";
    const hasCC = isDDZ && s.hasCardCounter;
    const winP = clamp(g.win + (hasCC?0.18:0), 0, 0.95);   // 斗地主 + 记牌器：胜率 +18%
    const def=Math.round(max/2); const step=Math.max(100,Math.round(max/40));
    const ccPrice=this.cardCounterPrice();
    const choices=[];
    // 斗地主：可花钱购买记牌器提升胜率
    if(isDDZ && !s.hasCardCounter){
      choices.push({t:`🎴 买记牌器（${cursym()}${fmt(ccPrice)}）`, sub:`胜率 ${Math.round(g.win*100)}% → ${Math.round((g.win+0.18)*100)}%`, f:()=>{
        if(s.money<ccPrice){ this.toast("钱不够买记牌器 💸"); return; }
        s.money-=ccPrice; s.hasCardCounter=true; this.render();
        this.toast("入手·记牌器 🎴 斗地主胜率提升！");
        this.gamblePlay(g, credits, yrLabel, makeup);
      }});
    }
    choices.push(
      {t:"🎲 梭哈！", cls:"gold", f:()=>{
        const bet=clamp(Math.round(+(document.getElementById("gbNum")||{}).value||0), 0, max);
        if(bet<=0){ this.toast("押注金额要大于 0"); return; }
        const win=Math.random()<winP;
        if(win){ const gain=Math.round(bet*(g.mult-1)); s.money+=gain; this.render();
          D({loc:`🎲 ${g.nm} · 赢了！`, tw:true, lines:[["env",`🎉 赢了！+${cursym()}${fmt(gain)}（本金 ${cursym()}${fmt(bet)} ×${g.mult}${hasCC?" · 记牌器加成":""}）`],["you","富贵险中求！","think"]],
            choices:[{t:"↩ 回去规划", cls:"gold", f:()=>this.budgetPlan(credits, yrLabel, makeup)},{t:"🎲 再赌一把", f:()=>this.gambleMenu(credits, yrLabel, makeup)}]});
        } else { s.money=Math.max(0,s.money-bet); this.render();
          D({loc:`🎲 ${g.nm} · 输了`, tw:true, lines:[["env",`💸 输光本金 -${cursym()}${fmt(bet)}。`],["you","……下次一定。","think"]],
            choices:[{t:"↩ 回去想办法", cls:"gold", f:()=>this.cantAfford(credits, yrLabel, makeup)}]});
        }
      }},
      {t:"↩ 返回", f:()=>this.gambleMenu(credits, yrLabel, makeup)}
    );
    D({loc:`🎲 ${g.nm}`,
      lines:[["env",`${g.desc}${hasCC?"（已装记牌器 🎴）":""}。押多少？可拖动或直接输入。输了血本无归，赢了乘 ${g.mult}。`]],
      extra:`<div class="credit-pick">
        <div class="big"><input type="number" id="gbNum" value="${def}" min="0" max="${max}" inputmode="numeric"
            style="width:140px;background:#0a0d12;border:1px solid var(--line);border-radius:8px;color:var(--gold);font-weight:900;font-size:30px;text-align:center;padding:4px 6px"
            oninput="Game._gbNumSync()"><small style="font-size:16px;color:var(--dim)"> ${cursym()}</small></div>
        <input type="range" id="gbAmt" min="0" max="${max}" step="${step}" value="${def}"
          oninput="Game._gbRangeSync()">
        <div class="hint">手头 ${cursym()}${fmt(s.money)} · 单注上限 ${cursym()}${fmt(cap)} · 当前胜率 ${Math.round(winP*100)}%</div>
      </div>`,
      choices});
  },

  /* 退学 / 毕业未走红旗 后的去向（按线路分流） */
  afterSchoolFail(){
    this._scene="afterSchoolFail";
    this.mark(()=>this.afterSchoolFail());

  applyMaster(){
    const s=this.s;
    this.mark(()=>this.applyMaster());
    const g=avgGpa(s);
    const isCn=s.gpaSys==="cn100";
    // 德国制：低=好(5-g)；百分制：高=好(g-60)
    const muProb = isCn
      ? clamp(0.05 + ((g-60)/40)*0.7, 0.05, 0.82)
      : clamp(0.08 + ((5-g)/4)*0.62, 0.05, 0.78);
    const gradeDesc = isCn ? `${g} 分（百分制，越高越好）` : `${g}（1.0 最佳 / 5.0 挂）`;
    D({loc:"硕士申请",
      lines:[
        ["prof2",`你本科均绩 ${gradeDesc}。两所学校等你挑——`],
        ["prof2",`慕尼黑工大（TUM）：宽进严出但门槛不低，你这成绩约 ${Math.round(muProb*100)}% 命中，免学费，但报名要先无条件交 €1000 申请费；斯图加特（司徒）：100% 录取，每学期 €1500 学费。`],
        ["you","稳一手，还是赌一把名校？","think"],
      ],
      choices:[
        {t:"🦁 赌慕尼黑 TUM（申请费 €1000）", sub:`成功率约 ${Math.round(muProb*100)}% · 申请费不退`, cls:"gold", f:()=>{
          const fee=s.cur==="EUR"?1000:(s.cur==="GBP"?900:8000);
          s.money=Math.max(0,s.money-fee); this.render();
          this.toast(`已交 TUM 申请费 ${cursym()}${fmt(fee)}（不退）`);
          if(Math.random()<muProb){
            this.toast("🎉 TUM offer 到手！");
            this.enterMunich();
          }else{
            D({loc:"硕士申请",
              lines:[
                ["prof2","很遗憾，TUM 发来拒信……绩点还是差了那么一点。"],
                ["you","唉，保底去司徒？还是另作打算……","think"],
              ],
              choices:[{t:"🏰 接受斯图加特 offer", f:()=>this.enterStuttgart()},
                       {t:"🚩 回国进红旗", f:()=>this.endingHongqi()},
                       {t:"🌃 去上海闯荡", f:()=>this.enterShanghai("car")}]});
          }
        }},
        {t:"🏰 稳进斯图加特（司徒）", sub:"100% offer · 学费€1500/学期", f:()=>this.enterStuttgart()}
      ]});
  },

  /* ===================== 学期初活动 ===================== */
  // 兄弟活动：每次活动 花钱(整学期 ${per}) + 5点时间(强制在时间界面扣除)
  activityCost(){ return (this.s.semActivities||[]).length * ACT_WEEKS * ACT_WEEKLY; },
  activityEnergy(){ return (this.s.semActivities||[]).length * 5; },
  // 脱单尝试占用的时间：网恋5、图书馆搭讪10
  courtEnergy(){ const c=this.s.courtPlan; if(!c) return 0; return c.mode==="net"?5:10; },
  // 脱单尝试的额外金钱（图书馆买早餐）
  courtCost(){ const c=this.s.courtPlan; if(c && c.mode==="library" && c.breakfast) return Math.round(this.econ().live*0.3); return 0; },
  semesterStart(){
    this._scene="semesterStart";
    const s=this.s; const E=this.econ(); const f=s.semFlags||(s.semFlags={});
    const picked=(s.semActivities||[]).length;
    const lines=[["bro",`${this.yrLabelFor(s.yearInSchool+1)}开学前，安排一下这学期：兄弟活动、脱单、人脉，再去预算规划与上课。`,{big:true}]];
    if(picked) lines.push(["env",`本学期已约：${s.semActivities.map(k=>k==="hot"?"火锅":"烧烤").join("、")}（开学扣 ${E.sym}${fmt(this.activityCost())}，强制占用时间 ${this.activityEnergy()}）`]);
    if(s.courtPlan) lines.push(["env",`💘 脱单计划：${this._courtPlanDesc()}（强制占用时间 ${this.courtEnergy()}）`]);
    const choices=[];
    // 慕尼黑：女友的汉堡毕业典礼（保留原专属事件）
    if(s.lineType==="munich" && s.hasGf && !s.flags.hamburgDone)
      choices.push({t:"🚄 去汉堡参加女友毕业典礼", sub:"专属事件 · 消耗金钱", f:()=>this.hamburgEvent()});
    choices.push({t:"🍻 兄弟活动（火锅 / 烧烤）", sub:"兄弟义气↑ · 各花钱+5点时间 · 可能结识猛人", f:()=>this.broActivityMenu()});
    if(!s.hasGf) choices.push({t:`💘 尝试脱单${s.courtPlan?"（已设策略·可改）":""}`, sub:"网恋 / 图书馆搭讪 · 学期末看情商定成败", f:()=>this.courtMenu(()=>this.semesterStart())});
    const unmet=Object.keys(PEOPLE).filter(id=>!s.friends[id]);
    if(unmet.length) choices.push({t:"🧲 结识新兄弟（花兄弟义气）", sub:`掏出义气结交新朋友（现有义气 ${s.bro}）`, f:()=>this.recruitMenu(()=>this.semesterStart())});
    choices.push({t:"📇 联系人（女友 / 兄弟）", sub:"查看亲密度 · 维系 / 分手 / 绝交", f:()=>this.contactsPanel(()=>this.semesterStart())});
    choices.push({t:"📚 开始上课（先预算，再选课）", cls:"gold", f:()=>this.studyYear()});
    D({loc:`${s.school} · 学期初`, lines, choices});
  },
  broActivityMenu(){
    const s=this.s; const E=this.econ(); const f=s.semFlags||(s.semFlags={}); const per=ACT_WEEKS*ACT_WEEKLY;
    const choices=[];
    if(!f.huoguo)  choices.push({t:`🍲 兄弟火锅（${E.sym}${fmt(per)} + 5点时间）`, sub:"兄弟义气↑ · 可能结识猛人", f:()=>this.doActivity("hot")});
    if(!f.shaokao) choices.push({t:`🍢 兄弟烧烤（${E.sym}${fmt(per)} + 5点时间）`, sub:"兄弟义气↑ · 可能结识贵人", f:()=>this.doActivity("bbq")});

  /* ===================== 结识新兄弟（消耗兄弟义气） ===================== */
  // 结识兄弟的实际花费：认识孔老师打 7 折；每参加过一次兄弟活动再降 5%（最低 6 折），下限 5 点
  recruitCost(id){
    const s=this.s; const base=(PEOPLE[id]&&PEOPLE[id].cost)||14;
    let f=1;
    if(s.friends.kong && id!=="kong") f*=0.7;                  // 孔老师人脉广，引荐打折
    f*=Math.max(0.6, 1-(s.actCount||0)*0.05);                  // 常混兄弟局，人头熟、价更低
    return Math.max(5, Math.round(base*f));
  },
  recruitMenu(back){
    const s=this.s;
    const unmet=Object.keys(PEOPLE).filter(id=>!s.friends[id]);
    if(!unmet.length){ this.toast("能结识的兄弟都认识啦"); return back(); }
    const disc = (s.friends.kong || (s.actCount||0)>0);
    const choices=unmet.map(id=>{ const p=PEOPLE[id]; const base=p.cost||14; const cost=this.recruitCost(id);
      return {t:`${CHARS[id]?CHARS[id].face:"🧑"} 结交 ${p.nm}　消耗义气 ${cost}${cost<base?`（原价 ${base}）`:""}`, sub:`${gainText(p.get)}（你有义气 ${s.bro}）`,
        f:()=>{ if(s.bro<cost){ this.toast("兄弟义气不够 🥲"); return; } this.recruitBrother(id, cost, back); }};
    });
    choices.push({t:"↩ 返回", f:back});
    D({loc:"🧲 结识新兄弟",
      lines:[["bro","江湖朋友多了好办事——掏出你的兄弟义气，我给你引荐几位。",{big:true}],["you",`现有兄弟义气 ${s.bro}。结交一位要花掉一些义气。${disc?"\n💡 多混兄弟局、认识孔老师，结交价更低。":""}`,"think"]],
      choices});
  },
  recruitBrother(id, cost, back){
    const s=this.s; const p=PEOPLE[id];
    s.bro=clamp(s.bro-cost,0,100);
    s.friends[id]={fav:rand(35,55)};
    for(const k in p.get){ this.addStat(k, p.get[k]); }
    if(id==="yong") s.flags.warnedGarf=true;
    this.render();
    const extra=[];
    if(id==="yong") extra.push(["env","🛡️ 勇哥提醒：【远离加菲猫】——往后碰到加菲猫，你能避开他的精神内耗。"]);
    if(id==="xuzi") extra.push(["env","🛡️ 旭子是阿鲁巴队长，今后被阿鲁巴的概率大幅降低。"]);
    if(id==="garf"){
      s.flags.garfMovePending=true; // 下学期触发被动搬家
      if(s.flags.warnedGarf) extra.push(["env","💡 想起勇哥的告诫，你和加菲猫客气两句，没被他的 emo 拖下水。"]);
      else { const hp=rand(6,14); s.health=clamp(s.health-hp,0,100); this.render();
        extra.push(["garf","哥们儿，我跟你掏心窝子唠唠我那些破事儿……",{big:true}],["env",`🧠 被加菲猫的 emo 暴击，精神内耗，健康 -${hp}。`]); }
      extra.push(["env","🏠 跟加菲猫走得近，下学期怕是要被他拉着一起「被动搬家」……"]);
    }
    // 全屏动画：新朋友进入联系人
    this.eventSplash({emoji:CHARS[id]?CHARS[id].face:"🤝", title:`${p.nm} 加入联系人`, sub:"🤝 结识新兄弟", color:"#ffcc4d", hold:1900}, ()=>{
      D({loc:"🤝 结识新兄弟", tw:true,
        lines:[[id, p.intro, {big:true}], ["you",`结识【${p.nm}】！（${gainText(p.get)}，花费义气 ${cost}）`,"think"], ...extra],
        choices:[{t:"↩ 返回", cls:"gold", f:back}]});
    });

  contactsPanel(back){
    const s=this.s; const E=this.econ(); const treat=Math.round(E.live*0.4);
    const tn={meinu:"美女",fujie:"富姐",xueba:"学霸",net:"网恋对象"};
    const lines=[["env","📇 联系人 —— 你的人际关系一览。"]];
    lines.push(s.hasGf
      ? ["env",`💗 女友（${tn[s.gfType]||"女友"}）· 亲密度 ${s.gfFavor}/100${s.gfWarned?"　⚠️ 吵架预警":""}`]
      : ["env","💗 感情状态：单身"]);
    const ids=Object.keys(s.friends||{});
    if(ids.length) ids.forEach(id=>lines.push(["env",`🧑‍🤝‍🧑 ${this.friendInfo(id).nm}${id==="roommate"?"（室友）":""} · 亲密度 ${s.friends[id].fav||0}/100`]));
    else lines.push(["env","🧑‍🤝‍🧑 暂无结识的兄弟"]);
    // 被拉黑的攻略对象
    if((s.blocked||[]).length) lines.push(["env",`🚫 已拉黑：${s.blocked.map(k=>({meinu:"美女",fujie:"富姐",xueba:"学霸"}[k]||k)).join("、")}（无法再攻略）`]);
    const choices=[];
    if(s.hasGf){
      choices.push({t:"🎁 给女友送礼物", sub:`自定义金额 · 增加亲密度（现 ${s.gfFavor}）`, cls:"gold", f:()=>this.giftGf(back)});
      choices.push({t:"💔 主动分手", cls:"danger", f:()=>this.breakUp(
        {sub:"你主动结束了这段关系", lines:[["you","对不起，我们还是分开吧。","think"],["env","💔 你主动提出了分手。面板已切回「情商」。"]]}, back)});
    }
    ids.forEach(id=>{
      const fr=s.friends[id]; const nm=this.friendInfo(id).nm;
      choices.push({t:`🍻 请 ${nm} 吃饭（${E.sym}${fmt(treat)}）`, sub:`维系亲密度（现 ${fr.fav||0}）`, f:()=>{
        if(s.money<treat){ this.toast("钱不够"); return; }
        s.money-=treat; fr.fav=clamp((fr.fav||0)+rand(8,16),0,100); this.addStat("bro",rand(1,3)); this.render();
        this.toast(`和 ${nm} 感情升温（亲密度 ${fr.fav}）`); this.contactsPanel(back);
      }});
      choices.push({t:`✂️ 与 ${nm} 绝交`, cls:"danger", f:()=>this.cutBrother(id, ()=>this.contactsPanel(back))});
    });
    choices.push({t:"↩ 返回", cls:"gold", f:back});
    D({loc:"📇 联系人", lines, choices});
  },
  cutBrother(id, back){
    const s=this.s; const nm=this.friendInfo(id).nm;
    const owed=(s.broLoanFrom===id)?(s.broLoan||0):0;
    delete s.friends[id];
    if(s.broLoanFrom===id){ s.broLoan=0; s.broLoanFrom=null; } // 绝交：债务一笔勾销，但义气受损
    s.bro=clamp(s.bro-rand(6,12),0,100);
    // 与加菲猫断交：勇哥（反猫先锋）大为赞许，好感大涨
    const extra=[]; let yongUp=0;
    if(id==="garf" && s.friends.yong){ yongUp=rand(10,18); s.friends.yong.fav=clamp((s.friends.yong.fav||0)+yongUp,0,100);
      this.addStat("bro",rand(2,5)); extra.push(["yong","早该跟那负能量货色掰了！这事儿办得地道，哥服你。",{big:true}],["env",`👍 勇哥对你刮目相看，勇哥好感度 +${yongUp}。`]); }
    this.render();
    this.eventSplash({emoji:"✂️", title:"兄弟决裂", sub:`你与 ${nm} 割袍断义`, color:"#ff5b5b"}, ()=>{
      D({loc:"✂️ 兄弟决裂", tw:true,
        lines:[[id,"行，从此咱俩一刀两断！",{big:true}],["env",`💔 你与 ${nm} 绝交，兄弟义气受损。${owed?`（欠他的 ${cursym()}${fmt(owed)} 也算清了，但情分没了）`:""}`], ...extra, ["you","道不同，不相为谋。","think"]],
        choices:[{t:"↩ 返回", cls:"gold", f:back}]});
    });

  // 给女友送礼物：自定义金额，增加亲密度（边际递减）

  // 选了火锅/烧烤后，先决定怎么备菜（风险活动）
  doActivity(kind){

      lines:[["bro",`整${nm}！分头采购——买对了大家高兴，买错了可要挨一顿喷。你去干啥？`,{big:true}]],

        {t:"🥩 去 Kaufland 买肉", sub:"风险 · 费精力", f:()=>this._shop(kind,"跑去 Kaufland 抢特价肉")},
        {t:"🥬 去亚洲超市买菜", sub:"风险 · 费精力", f:()=>this._shop(kind,"钻进亚超淘食材")},

  _shop(kind, what){
    const s=this.s;
    const succ = Math.random() < clamp(0.5 + s.eq/250 + s.bro/400, 0.35, 0.85);
    const delta = succ ? rand(4,8) : -rand(3,6);
    this._activityOutcome(kind, delta, {what, succ});
  },
  _activityOutcome(kind, shopBro, shop){
    const s=this.s; const f=s.semFlags; const nm=kind==="hot"?"火锅":"烧烤";
    f[kind==="hot"?"huoguo":"shaokao"]=true;
    s.semActivities=s.semActivities||[]; s.semActivities.push(kind);
    s.actCount=(s.actCount||0)+1;   // 累计参加的兄弟活动，越多结交新兄弟越便宜
    const baseBro=rand(4,8);
    const broGain=this.addStat("bro", baseBro+(shopBro||0)); this.render();
    const lines=[];
    if(shop) lines.push(["env", shop.succ ? `你${shop.what}，办得地道，兄弟们直竖大拇指！（兄弟义气 +${shopBro}）`
                                          : `你${shop.what}，结果买错了被一顿猛喷……（兄弟义气 ${shopBro}）`]);
    else lines.push(["env","你懒得动弹，蹭了顿现成的。"]);
    // 认识新人：兄弟义气越高、人脉越高，越容易
    const pool = kind==="hot" ? ["xuzi","feizi","yong"] : ["kong","garf","jenny"];
    const unmet = pool.filter(id=>!s.friends[id]);
    const meetProb = clamp(0.3 + s.bro/160 + s.renmai/220, 0.3, 0.95);
    if(unmet.length && Math.random()<meetProb) return this.meetPerson(unmet[rand(0,unmet.length-1)], nm, lines);
    lines.push(["env",`兄弟${nm}下肚，兄弟义气 +${broGain}。`], ["you","下次再聚！","think"]);
    D({loc:`${s.school} · 兄弟${nm}`, lines, choices:[{t:"↩ 返回", f:()=>this.semesterStart()}]});
  },
  meetPerson(id, nm, lines){
    const s=this.s; const p=PEOPLE[id];
    s.friends[id]={fav:10};
    for(const k in p.get){ this.addStat(k, p.get[k]); }
    this.render();
    lines=lines||[];

        <input class="amt-in" id="stkAmt" type="number" min="0" step="1000" value="${Math.min(a[1], s.money)}">

  // 建仓：本金立即锁定，结果年底揭晓
  stageStock(type, amt, back){
    const s=this.s;
    if(s.money<amt){ this.toast("本金不够"); return; }
    s.money-=amt; s.pendingStock={type, staked:amt}; this.render();
    this.toast(`已建仓 ${cursym()}${fmt(amt)} 📈（年底结算）`);
    D({loc:"📈 建仓成功", art: s.lineType==="shanghai"?"shanghai":null,
      lines:[
        ["env", type==="nasdaq"
          ? `📊 定投纳指 ${cursym()}${fmt(amt)}，本金已锁定——年底用走势图揭晓盈亏（平均 +15%，上下波动 25%）。`
          : `🎰 All in A股 ${cursym()}${fmt(amt)}，筹码已押上——年底揭晓（平均 -20%，上下波动 80%，赌的就是心跳）。`],
        ["you","就等年底见分晓了。","think"],
      ],
      choices:[{t:"↩ 返回", f:back}]});
  },
  // 年底结算投资（resolveYear / 上海推进一年时调用）：波动收益 + 准备走势图动画
  // 纳指：平均 +15%，上下波动 25%（约 -10%~+40%）；A股：平均 -20%，上下波动 80%（约 -100%~+60%）
  settleStock(logs){
    const s=this.s; const p=s.pendingStock; if(!p) return;
    s.pendingStock=null; const sym=cursym();
    let mult, vol, title;
    if(p.type==="nasdaq"){ mult=Math.max(0, 1+(15+(Math.random()*2-1)*25)/100); vol=0.05; title="定投纳指"; }
    else { mult=Math.max(0, 1+(-20+(Math.random()*2-1)*80)/100); vol=0.16; title="All in A股"; }
    const finalVal=Math.round(p.staked*mult); const profit=finalVal-p.staked;
    s.money+=finalVal;                                  // 本金已在建仓时扣除，这里返还终值
    if(profit<0) s.stockLoss=(s.stockLoss||0)+(-profit)*RATES[s.cur];
    logs.push(`📈 ${title}年底结算：本金 ${sym}${fmt(p.staked)} → ${sym}${fmt(finalVal)}（${profit>=0?"净赚":"亏损"} ${sym}${fmt(Math.abs(profit))}）`);
    // 走势图动画数据（结算时逐点揭秘悬念）
    this._stockAnim={title, invest:p.staked, points:this._genPath(p.staked, mult, vol, 16), profit, sym};
  },

  isBuffett(){ const s=this.s;
    if(s.cur==="GBP") return (s.hasGf && s.money>=1000000) || s.money>=2000000;

  // 上海岗位：只有斯图加特「自动驾驶」方向才解锁量化机构，否则只能进车企
  shanghaiJob(){ return this.s.major==="ad" ? "quant" : "car"; },

    this._scene="shanghaiHub";

    this.mark(()=>this.shanghaiHub()); // 命运抉择点（供坏结局回滚）

    ];
    if(!s.flags.hefeiDone) choices.push({t:"🧧 旭子的婚礼请柬", sub:"合肥支线", f:()=>this.hefeiInvite()});

  shanghaiAdvanceYear(){
    const s=this.s; s.shYears++; s.age++;
    const logs=[];
    s.money += s.incomeY; logs.push(`💼 年薪到账 +¥${fmt(s.incomeY)}`);
    s.money = Math.max(0, s.money - s.costY); logs.push(`🏠 上海生活开销 -¥${fmt(s.costY)}`);
    this.settleStock(logs); // 年底结算投资（可能设置走势图动画）
    const adrain=this.ageHealthDrain();
    if(s.job==="quant"){ const d=rand(6,14)+adrain; s.health=clamp(s.health-d,0,100); logs.push(`🩺 高强度工作${adrain?`+年纪渐长`:""}，健康 -${d}`); }
    else { const d=rand(1,4)+adrain; s.health=clamp(s.health-d,0,100); if(adrain) logs.push(`⏳ 年纪渐长，健康 -${d}`); }
    this.render();
    // 先放投资走势图动画（若有建仓），再走后续判定
    const proceed=()=>{
      if(s.health<=0) return this.endingDeath();
      if(s.job==="car" && s.shYears>=3 && Math.random() < (s.shYears-2)*0.3) return this.endingShanghaiCar();
      if(this.isBuffett()) return this.endingBuffett();
      if(s.money<=0) return this.endingDelivery("存款见底");
      if(s.age>=35) return this.endingDelivery("35 岁大限已到，仍未实现财务自由");
      // 工作第一年：女友赴英留学（铺垫）
      if(s.hasGf && !s.flags.gfToUK && s.shYears>=1){ s.flags.gfToUK=true; return this.gfGoesToUK(logs); }
      // 第二年起：女友发来赴英邀请
      if(s.hasGf && s.flags.gfToUK && !s.flags.londonOffered && s.shYears>=2){ s.flags.londonOffered=true; return this.londonDecision(); }
      D({loc:`🌃 上海 · 第${s.shYears}年小结`,
        lines:[["env",logs.join("\n")]],
        choices:[{t:"▶ 继续", cls:"gold", f:()=>this.shanghaiHub()}]});
    };
    if(this._stockAnim){ const a=this._stockAnim; this._stockAnim=null; return this.assetCurve(a, proceed); }
    proceed();
  },

  settleResearchInvest(iv, next){
    const s=this.s; const sym=cursym(); const amt=iv.amt;

    const finalVal=Math.round(amt*mult); const profit=finalVal-amt;
    const pts=this._genPath(amt, mult, vol, 16);

        lines:[["env",`${title}：投入 ${sym}${fmt(amt)} → 收回 ${sym}${fmt(finalVal)}，收益 ${profit>=0?"+":""}${sym}${fmt(profit)}。`],["you", profit>=0?"赚了！":"亏麻了……","think"]],

    if(s.money<=0) return this.endingDelivery("伦敦坐吃山空");

    D({loc:"🔬 研究员 · 年度小结",

  // 生成一条从 start 到 start*mult 的价格路径（带波动）
  _genPath(start, mult, vol, n){
    const pts=[Math.round(start)]; const target=start*mult;
    for(let i=1;i<n-1;i++){ const t=i/(n-1); const base=start+(target-start)*t; const noise=base*vol*(Math.random()*2-1); pts.push(Math.max(0,Math.round(base+noise))); }
    pts.push(Math.max(0,Math.round(target))); return pts;
  },
  // 年度资产走势曲线动画（紧张刺激地逐点跳动，最后揭晓收益）
  assetCurve(o, next){
    const pts=o.points, n=pts.length, sym=o.sym||cursym();
    const W=320,H=150,pad=14;
    const min=Math.min(...pts), max=Math.max(...pts), rng=(max-min)||1;
    const X=i=>pad+i*(W-2*pad)/(n-1), Y=v=>H-pad-(v-min)/rng*(H-2*pad);
    D({loc:"📈 年度资产走势",
      lines:[["env",`${o.title||"本年度投资"}　投入 ${sym}${fmt(o.invest)}`]],
      extra:`<div class="stockbox">
        <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:170px;background:#0a0d12;border-radius:8px">
          <polyline id="curveLine" fill="none" stroke="var(--gold)" stroke-width="2.5" points=""/>
          <circle id="curveDot" r="4" fill="#fff" style="display:none"/>
        </svg>
        <div class="reel" id="curveVal">${sym}${fmt(pts[0])}</div>
        <div class="hint" id="curveNote">实时行情跳动中……</div>
      </div>`,
      choices:[{t:"▶ 查看收益", cls:"gold", id:"curveGo", f:next}]});
    const line=document.getElementById("curveLine"), dot=document.getElementById("curveDot"),
          valEl=document.getElementById("curveVal"), go=document.getElementById("curveGo");
    if(!line){ return; }
    if(go) go.style.display="none";
    let i=0; const pStr=[];
    (this._curveTimers||[]).forEach(clearTimeout); this._curveTimers=[];
    const step=()=>{
      const x=X(i), y=Y(pts[i]); pStr.push(`${x.toFixed(1)},${y.toFixed(1)}`);
      line.setAttribute("points", pStr.join(" "));
      if(dot){ dot.style.display=""; dot.setAttribute("cx",x); dot.setAttribute("cy",y); }

  /* 战斗系统：横屏=玩手游(攻击)，竖屏=放抖音(回血)              */
  /* ========================================================= */
  battle(cfg){
    this._scene=null;
    const s=this.s;
    const me={hp:100,max:100};
    const en={hp:cfg.hp,max:cfg.hp};
    const log=[];
    let busy=false, ended=false;

    const render=()=>{
      const landscape = isLandscape();
      const fx=this._fx; this._fx=null;
      const enFloat = fx&&fx.target==="enemy" ? `<div class="dmgfloat down">-${fx.dmg}</div>` : "";
      const meFloat = fx&&fx.target==="me" ? `<div class="dmgfloat ${fx.heal?'up':'down'}">${fx.heal?'+':'-'}${fx.dmg}</div>` : "";
      sceneRaw(`<div class="loc">⚔️ 战斗</div>
        <div id="battle">
          <div class="fighter ${fx&&fx.target==='enemy'?'shake':''}">
            ${enFloat}
            <div class="top"><span style="font-size:18px">${cfg.emoji} ${cfg.name}</span><span>${en.hp}/${en.max}</span></div>
            <div class="hpbar"><i style="width:${en.hp/en.max*100}%"></i></div>
          </div>
          <div class="fighter ${fx&&fx.target==='me'&&!fx.heal?'shake':''}">
            ${meFloat}
            <div class="top"><span>🧑 你${s.hasBaton?" 🥢":""}</span><span>${me.hp}/${me.max}</span></div>
            <div class="hpbar"><i style="width:${me.hp/me.max*100}%;background:linear-gradient(90deg,#3fb950,#58a6ff)"></i></div>
          </div>
          <div class="orient">📱 当前：<b>${landscape?"横屏 → 玩手游（攻击）":"竖屏 → 放抖音（回血/降攻）"}</b><br>
            <small>把手机${landscape?"竖过来可切换为防御":"横过来可切换为攻击"}，或直接点下方按钮</small>
          </div>
          <button class="bigbtn" id="actBtn">${landscape?"🎮 横屏·玩手游 出击！":"📲 竖屏·放抖音 回血！"}</button>
          <div class="blog" id="blog">${log.slice(-6).map(l=>"· "+l).join("<br>")||"开打！"}</div>
        </div>`, [], {anim:false});
      document.getElementById("actBtn").onclick=act;
    };

    const enemyTurn=()=>{
      const dmg=Math.round(rand(cfg.atk[0],cfg.atk[1]) * (cfg.rigged?1.3:1));
      me.hp=Math.max(0,me.hp-dmg);
      this._fx={target:"me", dmg:dmg};
      log.push(`${cfg.name} 反击，你 -${dmg}`);
      if(me.hp<=0){ ended=true; render();
        setTimeout(()=>cfg.onLose&&cfg.onLose(),700); return; }
      busy=false; render();
    };

    const act=()=>{
      if(busy||ended) return; busy=true;
      if(isLandscape()){
        // 攻击
        let dmg=rand(8,16) + (s.hasBaton?rand(6,12):0);
        if(cfg.rigged) dmg=Math.round(dmg*0.55); // 序幕削弱：打不过
        en.hp=Math.max(0,en.hp-dmg);
        this._fx={target:"enemy", dmg:dmg};
        log.push(`你${s.hasBaton?"抡起甩棍":"挥拳"}，造成 ${dmg} 伤害`);
        render();
        if(en.hp<=0){ ended=true; setTimeout(()=>cfg.onWin&&cfg.onWin(),700); return; }
        setTimeout(enemyTurn,500);
      }else{
        // 回血/降攻
        const heal=rand(6,14);
        me.hp=Math.min(me.max,me.hp+heal);
        this._fx={target:"me", dmg:heal, heal:true};
        log.push(`你刷抖音回了口气，+${heal} 状态`);
        render();
        setTimeout(enemyTurn,500);
      }
    };

    this._battleResize=render;
    render();
  },
};

/* ---------------- 工具函数 ---------------- */
function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function fmt(n){return Math.round(n).toLocaleString("en-US");}
function cursym(){return ({CNY:"¥",EUR:"€",GBP:"£"})[Game.s&&Game.s.cur]||"¥";}
function mny(n){return cursym()+fmt(n);}
function avgGpa(s){ if(!s.gpaCount) return s.gpaSys==="de5"?"0.0":"0";
  const a=s.gpaTotal/s.gpaCount; return s.gpaSys==="de5"?a.toFixed(1):Math.round(a); }
function isLandscape(){
  if(window.matchMedia) return window.matchMedia("(orientation: landscape)").matches;
  return window.innerWidth>window.innerHeight;
}

/* 渲染一个场景：内容 + 选项按钮 */
function sceneRaw(html, choices, opts){
  opts=opts||{};
  const scr=document.getElementById("screen");
  let btns="";
  if(choices&&choices.length){
    btns=`<div class="choices">`+choices.map((c,i)=>
      `<button class="choice ${c.cls||''}" ${c.id?`id="${c.id}"`:''} data-i="${i}">${c.t}${c.sub?`<span class="sub">${c.sub}</span>`:''}</button>`
    ).join("")+`</div>`;
  }
  scr.innerHTML=html+btns;
  scr.scrollTop=0; window.scrollTo(0,0);
  // 入场动画：顶层元素依次淡入上滑（战斗等高频刷新场景跳过）
  if(opts.anim!==false){
    let i=0;
    const stag=el=>{ el.classList.add("anim-in"); el.style.animationDelay=(i*0.07)+"s"; i++; };
    [...scr.children].forEach(el=>{
      if(el.classList.contains("chat")||el.classList.contains("choices")) [...el.children].forEach(stag);
      else stag(el);
    });
  }
  if(choices) choices.forEach((c,i)=>{
    const b=scr.querySelector(`button[data-i="${i}"]`);
    if(b) b.onclick=()=>c.f();
  });
}

/* 逐字打字机：依次显示气泡并打字，点击任意处跳过 */
function typeChat(scr){
  const msgs=[...scr.querySelectorAll(".chat .msg")];
  if(!msgs.length) return;
  const ch=scr.querySelector(".choices");
  if(ch) ch.style.display="none";
  const full=msgs.map(m=>{ const b=m.querySelector(".bub"); const t=b.textContent; b.textContent=""; return t; });
  msgs.forEach(m=>{ m.style.opacity="0"; });
  let i=0, timer=null, done=false;
  const finishAll=()=>{
    done=true; if(timer)clearInterval(timer);
    msgs.forEach((m,k)=>{ m.style.opacity="1"; const b=m.querySelector(".bub"); b.textContent=full[k]; b.classList.remove("typing"); });
    if(ch) ch.style.display="";
    scr.removeEventListener("click", skip, true);
  };
  const skip=e=>{ if(done)return; finishAll(); };
  const nextMsg=()=>{
    if(i>=msgs.length){ finishAll(); return; }
    const m=msgs[i], b=m.querySelector(".bub");
    m.style.opacity="1"; m.classList.add("anim-in"); m.style.animationDelay="0s";
    const chars=Array.from(full[i]); let ci=0; b.classList.add("typing");
    timer=setInterval(()=>{
      ci++; b.textContent=chars.slice(0,ci).join("");
      if(ci>=chars.length){ clearInterval(timer); b.classList.remove("typing"); i++; setTimeout(nextMsg,300); }
    }, 26);
  };
  scr.addEventListener("click", skip, true);
  nextMsg();
}
/* 对话场景：{loc, title, art, lines:[[who,text,{think,big}],...], choices, anim, tw} */
function D(o){
  let html="";
  if(o.loc)   html+=`<div class="loc">${o.loc}</div>`;
  if(o.title) html+=`<h1 class="title">${o.title}</h1>`;
  if(o.art)   html+=art(o.art);
  if(o.lines&&o.lines.length) html+=`<div class="chat">`+o.lines.map(renderLine).join("")+`</div>`;
  if(o.extra) html+=o.extra;
  sceneRaw(html, o.choices, {anim:o.tw?false:o.anim});
  if(o.tw) typeChat(document.getElementById("screen"));
}

    death:    {g:["#1a1a22","#070709"], hero:["💀"], p:"", pn:0},
  }[key];
  if(!T) return "";
  const heroes=T.hero.map((h,i)=>`<div class="hero${i?' b':''}${T.neon?' neon':''}${T.hero.length>2?' sm':''}">${h}</div>`).join("");
  return `<div class="stage" style="--g1:${T.g[0]};--g2:${T.g[1]}">
    ${T.sun?'<div class="sun">☀️</div>':''}
    ${T.pn?particles(T.p,T.pn):''}
    ${heroes}
  </div>`;
}

/* 画轮盘 */
function drawWheel(id, segs, isCn){
  const cv=document.getElementById(id); if(!cv) return;
  const ctx=cv.getContext("2d"); const n=segs.length; const R=130; const cx=130, cy=130;
  const colors=["#ff7a3c","#ffcc4d","#3fb950","#58a6ff","#bc8cff","#ff8ecb","#ff5b5b","#4dd0e1","#9ccc65"];
  cv.style.transform="rotate(0deg)";
  ctx.clearRect(0,0,260,260);
  for(let i=0;i<n;i++){
    const a0=(i/n)*2*Math.PI - Math.PI/2 - Math.PI/n;
    const a1=((i+1)/n)*2*Math.PI - Math.PI/2 - Math.PI/n;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,R,a0,a1); ctx.closePath();
    ctx.fillStyle=colors[i%colors.length]; ctx.fill();
    // 文本
    ctx.save(); ctx.translate(cx,cy); ctx.rotate((a0+a1)/2);
    ctx.fillStyle="#0d1117"; ctx.font="bold 16px sans-serif"; ctx.textAlign="right";
    ctx.fillText(isCn?segs[i]:segs[i].toFixed(1), R-12, 6); ctx.restore();
  }
  // 中心
  ctx.beginPath(); ctx.arc(cx,cy,18,0,2*Math.PI); ctx.fillStyle="#161b22"; ctx.fill();
  ctx.strokeStyle="#ffcc4d"; ctx.lineWidth=3; ctx.stroke();
}

function endingStats(s){
  return `<div class="narr sys">📜 人生小结：
年龄 ${s.age} 岁　·　金钱 ${(s.cur==="EUR"?"€":"¥")}${fmt(s.money)}　·　健康 ${s.health}
兄弟义气 ${s.bro}　·　情商 ${s.eq}　·　事业度 ${s.career}
🪪 学生证 ${s.studentIds.length} 张${s.studentIds.length?"（"+s.studentIds.join("、")+"）":""}
🎓 毕业证 ${s.diplomas.length} 张${s.diplomas.length?"（"+s.diplomas.join("、")+"）":""}</div>`;
}

/* 监听屏幕方向变化（战斗时刷新） */
window.addEventListener("resize",()=>{ if(Game._battleResize&&Game._scene===null) Game._battleResize(); });
window.addEventListener("orientationchange",()=>{ setTimeout(()=>{ if(Game._battleResize&&Game._scene===null) Game._battleResize(); },200); });

/* ---------------- 启动 ---------------- */
(function boot(){
  // 自动续档：有存档直接继续上次进度（关掉再打开不会重开）；无存档才从头开始
  Game.s=Game.fresh(); Game.render();
  let loaded=false;
  try{ if(localStorage.getItem(SAVE_KEY)) loaded=Game.load(); }catch(e){}
  if(!loaded) Game.start();
})();
</script>
